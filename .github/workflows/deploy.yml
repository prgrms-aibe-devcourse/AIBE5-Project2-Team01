name: Keep Render Awake

on:
  schedule:
    # 10분마다 실행
    - cron: "*/10 * * * *"

  # GitHub Actions 화면에서 수동 실행도 가능하게 함
  workflow_dispatch:

jobs:
  keep-awake:
    runs-on: ubuntu-latest

    steps:
      - name: Call Meetball Render URL
        run: |
          curl -L --fail https://meetball.onrender.com/ || exit 1
