spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:meetball;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
