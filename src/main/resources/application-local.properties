spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./.local/meetballdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

app.seed.enabled=${APP_SEED_ENABLED:true}

google.client.id=${GOOGLE_CLIENT_ID:875769361485-fv0ftg781tnpodgcd24b5jaalkuou7v7.apps.googleusercontent.com}
