<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - Meetball</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl shadow-indigo-100 border border-gray-100 p-10 fade-in">
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center text-white font-bold text-3xl shadow-xl shadow-indigo-200 mx-auto mb-6">
                M
            </div>
            <h1 class="text-3xl font-black text-gray-900 tracking-tight">반가워요!</h1>
            <p class="text-gray-500 font-medium mt-2 leading-relaxed">밋볼에서 함께 성장할 <br>팀원들을 만나보세요.</p>
        </div>

        <div class="space-y-4">
            <button onclick="location.href='/'" class="w-full flex items-center justify-center gap-4 py-4 bg-white border-2 border-gray-100 rounded-2xl font-bold text-gray-700 hover:bg-gray-50 transition-all hover:scale-[1.02] active:scale-[0.98]">
                <img src="https://www.google.com/favicon.ico" class="w-5 h-5">
                구글로 시작하기
            </button>
            <button onclick="location.href='/'" class="w-full flex items-center justify-center gap-4 py-4 bg-[#FEE500] rounded-2xl font-bold text-[#3C1E1E] hover:opacity-90 transition-all hover:scale-[1.02] active:scale-[0.98]">
                <i class="fa-solid fa-comment text-xl"></i>
                카카오로 시작하기
            </button>
            <button onclick="location.href='/'" class="w-full flex items-center justify-center gap-4 py-4 bg-[#03C75A] rounded-2xl font-bold text-white hover:opacity-90 transition-all hover:scale-[1.02] active:scale-[0.98]">
                <span class="font-black text-xl">N</span>
                네이버로 시작하기
            </button>
        </div>

        <div class="mt-10 pt-10 border-t border-gray-50 text-center">
            <p class="text-sm text-gray-400 font-medium italic">"Great things in business are never done by one person."</p>
        </div>
    </div>
</body>
</html>
