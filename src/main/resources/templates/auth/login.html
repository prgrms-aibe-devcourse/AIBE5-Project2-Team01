<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: commonHead('로그인')}"></head>

<body class="bg-poodle-100 flex items-center justify-center min-h-screen p-6 overflow-hidden relative">
    <div class="max-w-md w-full bg-poodle-50/90 backdrop-blur-2xl rounded-5xl shadow-[0_40px_80px_-15px_rgba(101,55,40,0.16)] border border-white/80 p-12 animate-fade-in-up relative z-10">
        <div class="text-center mb-12">
            <div class="w-24 h-24 bg-white rounded-[2.5rem] flex items-center justify-center shadow-[0_16px_34px_rgba(240,127,55,0.24)] mx-auto mb-8 group overflow-hidden border border-poodle-100">
                <img th:src="@{/img/logo.png}" src="/img/logo.png" alt="Meetball"
                     class="w-full h-full object-contain p-2 group-hover:scale-110 transition-all duration-500 animate-tail-wag">
            </div>
            <h1 class="text-4xl font-black text-poodle-900 tracking-tighter mb-4">반가워요!</h1>
            <p class="text-poodle-500 font-bold leading-relaxed text-sm italic">같이 할 사람, 여기서 만나요.<br>미트볼 푸들이 팀원을 찾아드릴게요.</p>
        </div>

        <div class="space-y-4">
            <div th:if="${googleLoginEnabled}" class="flex justify-center">
                <div id="g_id_onload"
                     th:attr="data-client_id=${googleClientId}"
                     data-callback="handleGoogleCredentialResponse"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin"
                     data-type="standard"
                     data-shape="pill"
                     data-theme="outline"
                     data-text="continue_with"
                     data-size="medium"
                     data-logo_alignment="left"
                     data-width="320">
                </div>
            </div>
            <button th:unless="${googleLoginEnabled}" type="button" disabled
                    class="w-full flex items-center justify-center gap-4 py-4 bg-white border border-poodle-100 rounded-2xl font-black text-poodle-300 cursor-not-allowed shadow-sm">
                <img src="https://www.google.com/favicon.ico" class="w-5 h-5 grayscale transition-all" alt="">
                <span class="text-sm">Google 로그인을 설정 중입니다</span>
            </button>
            <p id="loginError" class="hidden text-center text-xs font-black text-red-400 bg-red-50 border border-red-100 rounded-2xl px-4 py-3"></p>
        </div>

        <div class="mt-12 pt-10 border-t border-poodle-50 text-center space-y-4">
            <p class="text-[10px] text-poodle-300 font-black uppercase tracking-[0.2em] italic">"Smart Matching, Great Teamwork"</p>
            <div class="flex justify-center gap-6">
                <a th:href="@{/}" class="text-[10px] font-black text-poodle-400 hover:text-meatball transition-colors underline underline-offset-4">둘러보기</a>
                <a href="#" class="text-[10px] font-black text-poodle-400 hover:text-meatball transition-colors underline underline-offset-4">도움말</a>
            </div>
        </div>
    </div>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        function getRedirectTarget() {
            const redirect = new URLSearchParams(window.location.search).get('redirect');
            if (redirect && redirect.startsWith('/') && !redirect.startsWith('//')) {
                return redirect;
            }
            return '/';
        }

        function showLoginError(message) {
            const errorBox = document.getElementById('loginError');
            errorBox.textContent = message;
            errorBox.classList.remove('hidden');
        }

        async function handleGoogleCredentialResponse(response) {
            if (!response || !response.credential) {
                showLoginError('Google 인증 정보를 받을 수 없습니다.');
                return;
            }

            try {
                const result = await meetballFetch('/api/auth/google', {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ credential: response.credential })
                });

                if (!result.ok) {
                    showLoginError('Google 로그인에 실패했습니다.');
                    return;
                }

                window.location.href = getRedirectTarget();
            } catch (error) {
                showLoginError('네트워크 오류가 발생했습니다.');
            }
        }
    </script>
</body>

</html>
