<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: commonHead('로그인')}"></head>

<body class="bg-poodle-50 flex items-center justify-center min-h-screen p-6 overflow-hidden relative">
    <!-- Premium Decoration -->
    <div class="absolute top-0 right-0 w-[600px] h-[600px] bg-meatball/5 rounded-full blur-[120px] -mr-40 -mt-40"></div>
    <div class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-poodle-200/20 rounded-full blur-[100px] -ml-20 -mb-20"></div>

    <div class="max-w-md w-full bg-white/80 backdrop-blur-2xl rounded-5xl shadow-[0_40px_80px_-15px_rgba(62,39,35,0.12)] border border-white p-12 animate-fade-in-up relative z-10">
        <div class="text-center mb-12">
            <div class="w-20 h-20 bg-meatball rounded-[2.5rem] flex items-center justify-center text-white shadow-[0_15px_30px_rgba(255,107,53,0.3)] mx-auto mb-8 group overflow-hidden">
                <i class="fa-solid fa-dog text-3xl group-hover:scale-125 transition-all duration-500 animate-tail-wag"></i>
            </div>
            <h1 class="text-4xl font-black text-poodle-900 tracking-tighter mb-4">반가워요!</h1>
            <p class="text-poodle-400 font-bold leading-relaxed text-sm italic">미트볼 푸들이 엄선한 <br>최고의 팀원들을 만나보세요.</p>
        </div>

        <!-- Google Identity Services -->
        <script src="https://accounts.google.com/gsi/client" async defer></script>
        
        <div class="space-y-4">
            <!-- Google Login Button Container -->
            <div id="g_id_onload"
                 th:data-client_id="${googleClientId}"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="true">
            </div>

            <div class="g_id_signin w-full"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="outline"
                 data-text="signin_with"
                 data-size="large"
                 data-logo_alignment="left"
                 data-width="400">
            </div>

            <div class="mt-8 pt-8 border-t border-poodle-50 text-center">
                <a th:href="@{/}" class="text-[11px] font-black text-poodle-200 uppercase tracking-widest hover:text-meatball transition-colors italic">
                    Back to Home
                </a>
            </div>
        </div>

        <script th:inline="javascript">
            function handleCredentialResponse(response) {
                // 구글로부터 받은 ID 토큰(Credential)을 백엔드로 전송
                fetch('/api/auth/google', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        credential: response.credential
                    })
                })
                .then(res => {
                    if (res.ok) {
                        // 로그인 성공 시 메인 페이지로 이동
                        window.location.href = '/';
                    } else {
                        alert('로그인 처리 중 오류가 발생했습니다.');
                    }
                })
                .catch(err => {
                    console.error('Error:', err);
                    alert('서버와 통신할 수 없습니다.');
                });
            }
        </script>

        <div class="mt-12 pt-10 border-t border-poodle-50 text-center space-y-4">
            <p class="text-[10px] text-poodle-200 font-black uppercase tracking-[0.2em] italic">"Smart Matching, Great Teamwork"</p>
            <div class="flex justify-center gap-6">
                <a th:href="@{/}" class="text-[10px] font-black text-poodle-400 hover:text-meatball transition-colors underline underline-offset-4">둘러보기</a>
                <a href="#" class="text-[10px] font-black text-poodle-400 hover:text-meatball transition-colors underline underline-offset-4">도움말</a>
            </div>
        </div>
    </div>
</body>

</html>
