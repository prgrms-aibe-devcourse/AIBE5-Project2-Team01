<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: commonHead('오류')}"></head>
<body class="bg-poodle-50 text-poodle-900 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-2xl w-full text-center space-y-8 animate-fade-in-up flex flex-col items-center">
        <!-- Decoration Error Dog -->
        <div class="relative inline-block">
            <div class="w-48 h-48 bg-poodle-100 rounded-[3rem] shadow-2xl flex items-center justify-center relative z-10 mx-auto border border-white overflow-hidden">
                <img th:src="@{/img/logo.png}" src="/img/logo.png" alt="Meetball"
                     class="w-full h-full object-contain p-4">
            </div>
        </div>

        <div class="space-y-4">
            <h1 class="text-7xl font-black text-meatball tracking-tighter" th:text="${status ?: 'Oops!'}">404</h1>
            <h2 class="text-3xl font-black text-poodle-900 tracking-tight" th:text="${error ?: '페이지를 찾을 수 없습니다.'}">길을 잃은 멍멍이</h2>
            <p class="text-poodle-400 font-bold text-lg leading-relaxed max-w-lg mx-auto"
               th:text="${message ?: '요청하신 페이지가 존재하지 않거나, 일시적인 오류가 발생했습니다. 미트볼 푸들과 함께 홈으로 돌아갈까요?'}">
                요청하신 페이지가 존재하지 않거나, 일시적인 오류가 발생했습니다. 미트볼 푸들과 함께 홈으로 돌아갈까요?
            </p>
        </div>

        <div class="pt-8">
            <a href="/"
               class="inline-flex items-center gap-3 px-10 py-5 bg-poodle-600 text-white rounded-2xl font-black text-lg hover:bg-meatball hover:text-poodle-900 transition-all shadow-xl hover:scale-105 active:scale-95 group">
                <i class="fa-solid fa-house group-hover:-translate-y-1 transition-transform"></i> 홈으로 돌아가기
            </a>
        </div>
    </div>
</body>
</html>
