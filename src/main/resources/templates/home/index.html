<!DOCTYPE html>
<!-- AI Recommendation Feature Updated: 2026-04-27 -->
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: commonHead(
    '프로젝트 팀원 모집·매칭',
    'MeetBall에서 프로젝트, 스터디, 공모전, 해커톤, 창업, 포트폴리오 팀원을 모집하고 매칭하세요. 팀원을 찾는 사람과 팀에 합류하고 싶은 사람을 AI 추천과 지원자 관리 흐름으로 연결합니다.',
    '',
    'index, follow'
)}"></head>

<body class="text-poodle-900 flex flex-col min-h-screen">
    <header th:replace="~{fragments/header :: mainHeader}"></header>

    <main class="w-full flex-grow mx-auto max-w-7xl px-4 py-12 animate-fade-in-up">
        <section id="hero-section"
                 class="mb-12 relative min-h-[31rem] md:min-h-[34rem] bg-poodle-100 rounded-[3rem] px-8 md:px-14 py-12 md:py-16 overflow-hidden shadow-[0_28px_70px_rgba(101,55,40,0.12)] border border-white/80 flex items-center transition-all duration-700">
            <div id="mascot-container" class="absolute transition-all duration-1000 ease-in-out z-20 pointer-events-none mascot-wrap-idle">
                <div id="mascot-tooltip" class="absolute -top-6 md:-top-10 left-1/2 -translate-x-1/2 bg-white text-poodle-900 text-sm font-black px-4 py-2.5 rounded-2xl shadow-xl opacity-0 transition-all duration-300 pointer-events-none whitespace-nowrap scale-95 origin-bottom">
                    다른 추천도 찾아볼까? 🐾
                    <div class="absolute -bottom-2 left-1/2 -translate-x-1/2 border-t-8 border-t-white border-l-8 border-l-transparent border-r-8 border-r-transparent"></div>
                </div>
                <img id="main-mascot" th:src="@{/img/logo.png}" src="/img/logo.png" alt="Meetball mascot"
                     class="w-[20rem] md:w-[28rem] max-w-none object-contain opacity-20 md:opacity-95 select-none transition-all duration-500">

                <button id="restart-journey-btn" type="button" onclick="RecommendationJourney.restart()"
                        onmouseenter="MascotHover.enter()"
                        onmouseleave="MascotHover.leave()"
                        class="hidden pointer-events-auto absolute bottom-16 left-1/2 -translate-x-1/2 px-6 py-3 bg-white text-poodle-600 hover:bg-meatball hover:text-white border-2 border-poodle-100 hover:border-meatball rounded-full text-[14px] font-black shadow-lg hover:shadow-xl hover:-translate-y-1 active:scale-95 transition-all whitespace-nowrap group">
                    다시 찾아볼까?
                    <i class="fa-solid fa-rotate-right ml-1 group-hover:animate-spin"></i>
                </button>
            </div>

            <div id="hero-idle-state" class="relative z-10 max-w-2xl transition-all duration-500">
                <div class="inline-flex items-center gap-2 px-4 py-2 bg-white/70 backdrop-blur-md rounded-full border border-white text-poodle-600 text-[14px] font-black uppercase tracking-widest mb-6 animate-bounce-subtle">
                    <i class="fa-solid fa-paw text-meatball"></i> Meetball: Smart Matching
                </div>
                <h1 class="text-4xl md:text-6xl font-black text-poodle-600 tracking-tighter mb-5 leading-tight">
                    같이 할 사람,<br>여기서 만나요
                </h1>
                <p class="text-[14px] md:text-base text-poodle-500 font-bold mb-8 max-w-2xl leading-relaxed break-keep">
                    밋볼이가 프로필 냄새를 맡고, 지금 나와 잘 맞는 프로젝트를 단계별로 골라드릴게요.
                </p>
                <button th:if="${isLoggedIn}" type="button" onclick="RecommendationJourney.start()"
                        onmouseenter="document.getElementById('main-mascot').classList.add('pose-happy')"
                        onmouseleave="document.getElementById('main-mascot').classList.remove('pose-happy')"
                        class="group relative inline-flex items-center gap-4 px-10 py-5 bg-poodle-600 text-white rounded-2xl font-black text-lg overflow-hidden shadow-xl shadow-poodle-600/20 hover:bg-meatball hover:text-white hover:scale-105 active:scale-95 transition-all border-none outline-none text-left">
                    <span class="relative z-10">밋볼아, 찾아줘! 🐾</span>
                    <i class="fa-solid fa-bone relative z-10 transition-transform duration-300"></i>
                </button>
                <button th:unless="${isLoggedIn}" type="button" onclick="openLoginRequiredModal(window.location.pathname + window.location.search, 'AI 추천은 로그인 후 이용할 수 있어요.')"
                        class="group relative inline-flex items-center gap-4 px-10 py-5 bg-poodle-600 text-white rounded-2xl font-black text-lg overflow-hidden shadow-xl shadow-poodle-600/20 hover:bg-meatball hover:text-white hover:scale-105 active:scale-95 transition-all border-none outline-none text-left">
                    <span class="relative z-10">밋볼아, 찾아줘! 🐾</span>
                    <i class="fa-solid fa-bone relative z-10 transition-transform duration-300"></i>
                </button>
            </div>

            <div id="hero-journey-stage" class="hidden relative z-10 w-full flex flex-col items-center justify-center opacity-0 transition-opacity duration-500">
                <div id="journey-tag-cloud" class="absolute inset-0 pointer-events-none hidden"></div>
                <div id="journey-search-cloud" class="absolute inset-0 pointer-events-none hidden"></div>

                <div id="journey-analyzing-text" class="hidden absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex-col items-center gap-4 z-20">
                    <div class="relative w-24 h-24 bg-white rounded-full shadow-lg border-4 border-poodle-100 flex flex-col items-center justify-center z-10">
                        <i class="fa-solid fa-user text-poodle-300 text-3xl mb-1"></i>
                        <span class="text-[14px] font-black text-poodle-600">내 프로필</span>
                    </div>
                    <h3 class="text-xl md:text-2xl font-black text-poodle-900 bg-white/80 px-6 py-2 rounded-full shadow-sm backdrop-blur-sm whitespace-nowrap z-20">밋볼이가 프로필 냄새를 맡고 있어요...</h3>
                </div>

                <div id="journey-searching-text" class="hidden absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col items-center gap-4 z-20">
                    <div class="relative w-36 h-36 flex items-end justify-center">
                        <svg viewBox="0 0 100 100" class="absolute bottom-0 w-full h-full text-white z-10 drop-shadow-md" fill="currentColor">
                            <path d="M50 10 L10 40 L10 90 L90 90 L90 40 Z" stroke="#653728" stroke-width="3" stroke-linejoin="round"/>
                            <path d="M5 45 L50 10 L95 45" fill="none" stroke="#653728" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M35 90 L35 55 Q50 45 65 55 L65 90 Z" fill="#653728"/>
                        </svg>
                    </div>
                    <h3 class="text-xl md:text-2xl font-black text-poodle-900 bg-white/80 px-6 py-2 rounded-full shadow-sm backdrop-blur-sm whitespace-nowrap z-30">프로젝트 더미를 파헤치고 있어요...</h3>
                </div>

                <div id="journey-interaction" class="max-w-3xl mx-auto space-y-6">
                    <div id="journey-question-wrap" class="space-y-2 text-center relative z-20">
                        <p id="journey-axis-label" class="text-[14px] font-black text-meatball uppercase tracking-[0.25em] animate-fade-in"></p>
                        <h2 id="journey-question-text" class="text-2xl md:text-[28px] font-black text-poodle-900 leading-tight"></h2>
                    </div>
                    <div id="journey-bubbles" class="flex flex-wrap justify-center gap-3 py-2 relative z-20"></div>
                </div>

                <div id="journey-result" class="hidden w-full space-y-6 animate-fade-in -mt-2">
                    <div class="flex flex-col items-center gap-2">
                        <div id="selected-bubble-chip" class="px-4 py-1.5 bg-meatball text-white rounded-full text-[14px] md:text-[15px] font-black shadow-md"></div>
                        <h3 class="text-xl md:text-2xl font-black text-poodle-900 mb-1">이 프로젝트는 어떠세요?</h3>
                    </div>
                    <div id="journey-result-grid" class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-5 w-full max-w-5xl mx-auto items-stretch"></div>
                </div>
            </div>
        </section>

        <style>
            @keyframes happy-jump {
                0% { transform: translateY(0) scale(1); }
                25% { transform: translateY(-18px) scale(0.94); }
                50% { transform: translateY(0) scale(1.06); }
                75% { transform: translateY(-9px) scale(0.97); }
                100% { transform: translateY(0) scale(1); }
            }

            @keyframes happy-jump-loop {
                0%, 100% { transform: translateY(0) scale(1); }
                30% { transform: translateY(-18px) scale(0.94); }
                60% { transform: translateY(0) scale(1.06); }
                80% { transform: translateY(-9px) scale(0.97); }
            }

            @keyframes wag {
                0%, 100% { transform: rotate(-3deg); }
                50% { transform: rotate(3deg); }
            }

            @keyframes dig {
                0%, 100% { transform: translate(-10%, 10%) rotate(-5deg); }
                50% { transform: translate(-10%, 10%) rotate(5deg) translateY(-5px); }
            }

            @keyframes orbit {
                0% { transform: translate(-30%, -10%) scale(0.9); z-index: 5; }
                25% { transform: translate(0%, -30%) scale(0.8); z-index: 5; }
                50% { transform: translate(30%, -10%) scale(1.1); z-index: 25; }
                75% { transform: translate(0%, 10%) scale(1.2); z-index: 25; }
                100% { transform: translate(-30%, -10%) scale(0.9); z-index: 5; }
            }

            @keyframes float-tag {
                0% { transform: translate(0, 0) scale(0) rotate(0deg); opacity: 0; }
                15% { transform: translate(calc(var(--tx) * 0.3), calc(var(--ty) * 0.3)) scale(1.1) rotate(calc(var(--tr) * 0.3)); opacity: 1; }
                85% { transform: translate(calc(var(--tx) * 0.8), calc(var(--ty) * 0.8)) scale(1) rotate(calc(var(--tr) * 0.8)); opacity: 1; }
                100% { transform: translate(var(--tx), var(--ty)) scale(0.9) rotate(var(--tr)); opacity: 0; }
            }

            .pose-searching { animation: dig 0.4s infinite ease-in-out !important; }
            .pose-asking { animation: wag 1s infinite ease-in-out !important; }
            .pose-happy { animation: happy-jump 0.7s ease-in-out forwards !important; }
            .pose-happy-loop { animation: happy-jump-loop 0.8s ease-in-out infinite !important; }
            .pose-analyzing { animation: orbit 4s infinite linear !important; }

            #mascot-container {
                position: absolute;
                transition: top 0.9s cubic-bezier(0.4, 0, 0.2, 1),
                            right 0.9s cubic-bezier(0.4, 0, 0.2, 1),
                            bottom 0.9s cubic-bezier(0.4, 0, 0.2, 1),
                            left 0.9s cubic-bezier(0.4, 0, 0.2, 1),
                            transform 0.9s cubic-bezier(0.4, 0, 0.2, 1),
                            opacity 0.6s ease;
            }

            .mascot-wrap-idle { top: auto; bottom: -3rem; left: auto; right: -5rem; transform: none; opacity: 1; }
            @media (min-width: 768px) {
                .mascot-wrap-idle { right: 2rem; }
            }

            .mascot-wrap-analyzing { top: 48%; bottom: auto; left: 50%; right: auto; transform: translate(-50%, -50%); opacity: 0.85; }
            .mascot-wrap-searching { top: 55%; bottom: auto; left: 50%; right: auto; transform: translate(-50%, -50%); opacity: 0.85; }
            .mascot-wrap-asking { top: auto; bottom: -1rem; left: auto; right: 1rem; transform: scale(0.75); opacity: 0.9; }
            @media (min-width: 768px) {
                .mascot-wrap-asking { right: 4%; bottom: -2rem; transform: scale(0.85); }
            }

            .mascot-wrap-result { top: auto; bottom: -4rem; left: auto; right: -3rem; transform: scale(0.7); opacity: 0.9; }
            @media (min-width: 768px) {
                .mascot-wrap-result { right: -1rem; bottom: -3rem; transform: scale(0.8); }
            }

            .mascot-base { opacity: 0.9 !important; }
            .mascot-analyzing { transform: scale(0.55); opacity: 0.7 !important; }
            .mascot-searching { transform: scale(0.5); opacity: 0.75 !important; }
            .mascot-asking { transform: scale(0.7) rotate(-5deg); opacity: 1 !important; }
            .mascot-result-compact { transform: scale(0.4) rotate(-8deg); opacity: 0.9 !important; }

            .journey-tag,
            .journey-tag-search {
                position: absolute;
                padding: 6px 12px;
                border-radius: 10px;
                font-size: 14px;
                font-weight: 900;
                color: #653728;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
                white-space: nowrap;
                pointer-events: none;
                z-index: 8;
            }

            .journey-tag {
                background: white;
                animation: float-tag 3s infinite linear;
            }

            .journey-tag-search {
                background: rgba(255, 255, 255, 0.8);
                border: 1px solid var(--color-poodle-100);
                animation: float-tag 2.5s infinite linear;
            }

            #journey-tag-cloud,
            #journey-search-cloud {
                overflow: hidden;
                z-index: 8;
            }

            #hero-section.journey-active {
                background-color: #fdf8f4;
            }

            #hero-section.result-active {
                padding-top: 3rem;
                padding-bottom: 3rem;
            }

            #journey-analyzing-text,
            #journey-searching-text {
                z-index: 30;
            }

            .mini-card {
                background: white;
                border: 1px solid #fdf8f4;
                border-radius: 2rem;
                padding: 1.75rem;
                text-align: left;
                transition: all 0.3s;
                position: relative;
                overflow: hidden;
                box-shadow: 0 8px 30px rgba(0, 0, 0, 0.03);
                min-height: 15rem;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                height: 100%;
            }

            .mini-card:hover {
                border-color: #653728;
                transform: translateY(-6px);
                box-shadow: 0 15px 40px rgba(101, 55, 40, 0.1);
            }

            /* 1순위 카드 강조 */
            .mini-card.main-pick {
                border: 3px solid #653728;
                box-shadow: 0 25px 60px rgba(101, 55, 40, 0.15);
                background: linear-gradient(to bottom right, #ffffff, #fdf8f4);
            }

            /* 태그 하이라이트 애니메이션 */
            @keyframes pulse-highlight {
                0% { box-shadow: 0 0 0 0 rgba(101, 55, 40, 0.4); }
                70% { box-shadow: 0 0 0 10px rgba(101, 55, 40, 0); }
                100% { box-shadow: 0 0 0 0 rgba(101, 55, 40, 0); }
            }
            .tag-highlight-strong {
                animation: pulse-highlight 2s infinite;
            }
        </style>

        <!-- Search & Filter Section -->
        <section id="projects" class="relative z-20 mb-16 animate-fade-in-up" style="animation-delay: 0.2s;">
            <div class="meetball-card relative z-20 rounded-[3rem] border border-white/80 px-6 py-6 shadow-[0_25px_70px_rgba(101,55,40,0.12)] md:px-8 md:py-8">
                <div class="grid grid-cols-1 gap-3 xl:grid-cols-[auto_auto_auto_1fr_auto_auto_auto_auto] items-stretch">
                    <div class="relative z-30">
                        <button type="button" id="projectPurposeDropdownBtn" onclick="toggleProjectPurposeDropdown()"
                                class="inline-flex w-full whitespace-nowrap items-center justify-between rounded-[1.35rem] border border-poodle-100 bg-white px-5 py-4 text-base font-black text-poodle-700 shadow-sm transition-all hover:border-meatball/20 hover:text-meatball">
                            <span id="projectPurposeSelectedText">목적</span>
                            <i id="projectPurposeDropdownIcon" class="fa-solid fa-chevron-down ml-2 text-sm text-poodle-200 transition-all duration-300"></i>
                        </button>
                        <div id="projectPurposeDropdownMenu"
                             class="hidden fixed inset-x-4 bottom-4 z-[120] max-h-[72vh] overflow-y-auto rounded-[2.25rem] border border-poodle-100 bg-white p-5 shadow-[0_35px_80px_rgba(101,55,40,0.18)] md:absolute md:inset-x-auto md:bottom-auto md:left-0 md:top-full md:mt-3 md:max-h-[24rem] md:w-[24rem]">
                            <div class="mb-4 flex justify-center md:hidden">
                                <span class="h-1.5 w-12 rounded-full bg-poodle-100"></span>
                            </div>
                            <div class="grid grid-cols-2 gap-3" id="projectPurposeOptionsList">
                                <button type="button" data-project-purpose-option="" onclick="setProjectPurposeFilter('')"
                                        class="rounded-2xl bg-poodle-50 px-4 py-4 text-sm font-black text-poodle-600 transition-all hover:bg-poodle-100">
                                    전체
                                </button>
                                <button th:each="option : ${meetballProjectPurposeOptions}"
                                        type="button"
                                        th:attr="data-project-purpose-option=${option.code}"
                                        onclick="setProjectPurposeFilter(this.dataset.projectPurposeOption)"
                                        class="rounded-2xl bg-poodle-50 px-4 py-4 text-sm font-black text-poodle-600 transition-all hover:bg-poodle-100"
                                        th:text="${option.label}">
                                    프로젝트
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="relative z-30">
                        <button type="button" id="roleDropdownBtn" onclick="toggleRoleDropdown()"
                                class="inline-flex w-full whitespace-nowrap items-center justify-between rounded-[1.35rem] border border-poodle-100 bg-white px-5 py-4 text-base font-black text-poodle-700 shadow-sm transition-all hover:border-meatball/20 hover:text-meatball">
                            <span id="roleSelectedText">포지션</span>
                            <i id="roleDropdownIcon" class="fa-solid fa-chevron-down ml-2 text-sm text-poodle-200 transition-all duration-300"></i>
                        </button>
                        <div id="roleDropdownMenu"
                             class="hidden fixed inset-x-4 bottom-4 z-[120] max-h-[72vh] overflow-y-auto rounded-[2.25rem] border border-poodle-100 bg-white p-5 shadow-[0_35px_80px_rgba(101,55,40,0.18)] md:absolute md:inset-x-auto md:bottom-auto md:left-0 md:top-full md:mt-3 md:max-h-[24rem] md:w-[24rem]">
                            <div class="mb-4 flex justify-center md:hidden">
                                <span class="h-1.5 w-12 rounded-full bg-poodle-100"></span>
                            </div>
                            <div class="grid grid-cols-2 gap-3 md:grid-cols-2" id="roleOptionsList"></div>
                        </div>
                    </div>

                    <div class="relative z-30">
                        <button type="button" id="techStackMainBtn" onclick="toggleTechStackPanel()"
                                class="inline-flex w-full whitespace-nowrap items-center justify-between rounded-[1.35rem] border border-poodle-100 bg-white px-5 py-4 text-base font-black text-poodle-700 shadow-sm transition-all hover:border-meatball/20 hover:text-meatball">
                            <span id="techStackSelectedText">기술스택</span>
                            <i id="techStackPanelIcon" class="fa-solid fa-chevron-down ml-2 text-sm text-poodle-200 transition-all duration-300"></i>
                        </button>
                        <div id="techStackPanel"
                             class="hidden fixed inset-x-4 bottom-4 z-[120] max-h-[72vh] overflow-y-auto rounded-[2.25rem] border border-poodle-100 bg-white p-5 shadow-[0_35px_80px_rgba(101,55,40,0.18)] md:absolute md:inset-x-auto md:bottom-auto md:left-0 md:right-auto md:top-full md:mt-3 md:max-h-[28rem] md:w-[min(48rem,calc(100vw-6rem))]">
                            <div class="mb-4 flex justify-center md:hidden">
                                <span class="h-1.5 w-12 rounded-full bg-poodle-100"></span>
                            </div>
                            <div class="flex flex-col gap-4 border-b border-poodle-50 pb-5 lg:flex-row lg:items-start lg:justify-between">
                                <div id="techStackTabs" class="flex flex-wrap gap-3"></div>
                                <div class="flex justify-end shrink-0 lg:min-w-[7.75rem]">
                                    <button id="techStackClearBtn" type="button" onclick="clearTechStackFilter(event)"
                                            class="invisible pointer-events-none opacity-0 inline-flex items-center gap-2 rounded-[1.1rem] border border-poodle-100 bg-white px-4 py-2.5 text-sm font-black text-poodle-500 transition-all hover:text-red-400">
                                        <i class="fa-solid fa-rotate-left text-xs"></i>
                                        초기화
                                    </button>
                                </div>
                            </div>
                            <div id="techStackFilterOptions" class="mt-5 flex flex-wrap gap-4"></div>
                        </div>
                    </div>

                    <label class="flex items-center gap-3 rounded-[1.35rem] border border-poodle-100 bg-white px-4 py-4 shadow-sm transition-all focus-within:border-meatball/30 focus-within:shadow-lg">
                        <i class="fa-solid fa-magnifying-glass text-2xl text-poodle-200"></i>
                        <input type="text" id="keywordInput" placeholder="제목 또는 설명 검색"
                               class="w-full border-none bg-transparent text-base font-black text-poodle-700 placeholder:text-poodle-200 focus:outline-none">
                    </label>

                    <button type="button" id="bookmarkedFilterBtn" onclick="toggleBookmarkedOnly()"
                            class="group/filter inline-flex h-full min-h-[4rem] whitespace-nowrap items-center justify-center gap-2 rounded-[1.35rem] border border-poodle-100 bg-white px-5 py-4 text-base font-black text-poodle-600 shadow-sm transition-all hover:border-meatball/30 hover:bg-poodle-50/50 hover:shadow-md active:scale-95">
                        <i class="fa-regular fa-heart text-lg text-meatball/40 group-hover/filter:text-meatball transition-colors"></i>
                        관심 프로젝트
                    </button>

                    <button type="button" id="openOnlyFilterBtn" onclick="toggleOpenOnly()"
                            class="group/filter inline-flex h-full min-h-[4rem] whitespace-nowrap items-center justify-center gap-2 rounded-[1.35rem] border border-poodle-100 bg-white px-5 py-4 text-base font-black text-poodle-600 shadow-sm transition-all hover:border-blue-300/30 hover:bg-blue-50/30 hover:shadow-md active:scale-95">
                        <i class="fa-regular fa-circle-check text-lg text-blue-400/40 group-hover/filter:text-blue-500 transition-colors"></i>
                        모집 중
                    </button>

                    <button type="button" onclick="resetAllFilters()"
                            class="inline-flex h-full min-h-[4rem] whitespace-nowrap items-center justify-center rounded-[1.35rem] border border-transparent bg-meatball/5 px-5 py-4 text-base font-black text-meatball shadow-sm transition-all hover:bg-meatball hover:text-white group">
                        <i class="fa-solid fa-rotate-left mr-2 transition-transform group-hover:rotate-[-45deg]"></i>
                        초기화
                    </button>

                    <div class="hidden items-center justify-center rounded-[1.35rem] border border-poodle-100 bg-white p-1 shadow-sm md:flex">
                        <button type="button" id="btn-grid" onclick="setViewMode('grid')"
                                class="view-btn active inline-flex h-12 w-14 items-center justify-center rounded-[1rem] bg-poodle-600 text-white transition-all">
                            <i class="fa-solid fa-table-cells-large text-2xl"></i>
                        </button>
                        <button type="button" id="btn-list" onclick="setViewMode('list')"
                                class="view-btn inline-flex h-12 w-14 items-center justify-center rounded-[1rem] text-poodle-300 transition-all hover:text-meatball">
                            <i class="fa-solid fa-list text-2xl"></i>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Project List (Slim Cards) -->
        <section class="mb-24 animate-fade-in-up" style="animation-delay: 0.4s;">
            <p id="projectCountSummary" class="sr-only">최신등록순으로 프로젝트를 불러오는 중입니다.</p>

            <!-- Project Container (Dynamic via JS) -->
            <div id="projectContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Project Cards will be injected here -->
            </div>

            <!-- Pagination Controls -->
            <div class="mt-12 flex items-center justify-center gap-4" id="paginationContainer">
            </div>
        </section>
    </main>

    <footer th:replace="~{fragments/footer :: mainFooter}"></footer>

    <script th:inline="javascript">
        const escapeHtml = window.meetballEscapeHtml;
        const safeUrl = window.meetballSafeUrl;
        const HOME_LOGGED_IN = Boolean(/*[[${isLoggedIn}]]*/ false);
        const CURRENT_PROFILE_ID = /*[[${currentProfile != null ? currentProfile.id : null}]]*/ null;
        const HOME_PAGE_SIZE = 6;
        const MOBILE_MEDIA_QUERY = window.matchMedia('(max-width: 767px)');
        const RECOMMENDATION_STORAGE_KEY = CURRENT_PROFILE_ID ? `meetball_home_journey_${CURRENT_PROFILE_ID}` : null;
        const RECENT_AXES_STORAGE_KEY = CURRENT_PROFILE_ID ? `meetball_home_recent_axes_${CURRENT_PROFILE_ID}` : 'MEETBALL_HOME_RECENT_AXES';

        let filterState = {
            keyword: '',
            projectPurpose: '',
            bookmarkedOnly: false,
            openOnly: false,
            position: '',
            techStacks: [],
            viewMode: 'grid',
            page: 0
        };
        let activeTechCategory = '모두보기';
        let searchDebounceTimer = null;
        let activeFetchToken = 0;
        let currentProjects = [];
        let currentPageData = null;

        function normalizeViewMode(mode) {
            if (MOBILE_MEDIA_QUERY.matches) {
                return 'grid';
            }
            return mode === 'list' ? 'list' : 'grid';
        }

        function buildFilterUrl(state = filterState) {
            const params = new URLSearchParams();
            if (state.keyword) params.set('keyword', state.keyword);
            if (state.projectPurpose) params.set('projectPurpose', state.projectPurpose);
            if (state.bookmarkedOnly) params.set('bookmarkedOnly', 'true');
            if (state.openOnly) params.set('openOnly', 'true');
            if (state.position) params.set('position', state.position);
            if (state.techStacks.length) params.set('techStack', state.techStacks.join(','));
            const normalizedViewMode = normalizeViewMode(state.viewMode);
            if (normalizedViewMode === 'list') params.set('view', 'list');
            if (state.page > 0) params.set('page', String(state.page));
            const queryString = params.toString();
            return queryString ? `${window.location.pathname}?${queryString}` : window.location.pathname;
        }

        function syncUrlWithFilterState() {
            window.history.replaceState({}, '', buildFilterUrl());
        }

        function hydrateFilterStateFromUrl() {
            const params = new URLSearchParams(window.location.search);
            filterState.keyword = params.get('keyword') || '';
            filterState.projectPurpose = params.get('projectPurpose') || '';
            filterState.bookmarkedOnly = HOME_LOGGED_IN && params.get('bookmarkedOnly') === 'true';
            filterState.openOnly = params.get('openOnly') === 'true';
            filterState.position = params.get('position') || '';
            filterState.techStacks = (params.get('techStack') || '')
                .split(',')
                .map(value => value.trim())
                .filter(Boolean);
            filterState.viewMode = normalizeViewMode(params.get('view') || 'grid');
            filterState.page = Math.max(Number(params.get('page') || 0) || 0, 0);

            const keywordInput = document.getElementById('keywordInput');
            if (keywordInput) {
                keywordInput.value = filterState.keyword;
            }
        }

        function syncBookmarkedButton() {
            const button = document.getElementById('bookmarkedFilterBtn');
            if (!button) return;
            const icon = button.querySelector('i');
            const isActive = filterState.bookmarkedOnly;
            
            if (isActive) {
                button.className = "group/filter inline-flex h-full min-h-[4rem] whitespace-nowrap items-center justify-center gap-2 rounded-[1.35rem] border-transparent bg-meatball px-5 py-4 text-base font-black text-white shadow-lg shadow-meatball/20 transition-all active:scale-95";
                if (icon) {
                    icon.className = "fa-solid fa-heart text-lg text-white";
                }
            } else {
                button.className = "group/filter inline-flex h-full min-h-[4rem] whitespace-nowrap items-center justify-center gap-2 rounded-[1.35rem] border border-poodle-100 bg-white px-5 py-4 text-base font-black text-poodle-600 shadow-sm transition-all hover:border-meatball/30 hover:bg-poodle-50/50 hover:shadow-md active:scale-95";
                if (icon) {
                    icon.className = "fa-regular fa-heart text-lg text-meatball/40 group-hover/filter:text-meatball transition-colors";
                }
            }
        }

        function syncOpenOnlyButton() {
            const button = document.getElementById('openOnlyFilterBtn');
            if (!button) return;
            const icon = button.querySelector('i');
            const isActive = filterState.openOnly;
            
            if (isActive) {
                button.className = "group/filter inline-flex h-full min-h-[4rem] whitespace-nowrap items-center justify-center gap-2 rounded-[1.35rem] border-transparent bg-blue-500 px-5 py-4 text-base font-black text-white shadow-lg shadow-blue-500/20 transition-all active:scale-95";
                if (icon) {
                    icon.className = "fa-solid fa-circle-check text-lg text-white";
                }
            } else {
                button.className = "group/filter inline-flex h-full min-h-[4rem] whitespace-nowrap items-center justify-center gap-2 rounded-[1.35rem] border border-poodle-100 bg-white px-5 py-4 text-base font-black text-poodle-600 shadow-sm transition-all hover:border-blue-300/30 hover:bg-blue-50/30 hover:shadow-md active:scale-95";
                if (icon) {
                    icon.className = "fa-regular fa-circle-check text-lg text-blue-400/40 group-hover/filter:text-blue-500 transition-colors";
                }
            }
        }

        function updateProjectPurposeButtonLabel() {
            const selectedText = document.getElementById('projectPurposeSelectedText');
            if (!selectedText) return;
            if (!filterState.projectPurpose) {
                selectedText.textContent = '목적';
                return;
            }
            const activeButton = Array.from(document.querySelectorAll('[data-project-purpose-option]'))
                .find(button => button.dataset.projectPurposeOption === filterState.projectPurpose);
            selectedText.textContent = activeButton?.textContent?.trim() || '목적';
        }

        function updatePositionButtonLabel() {
            const selectedText = document.getElementById('roleSelectedText');
            if (selectedText) {
                selectedText.textContent = filterState.position || '포지션';
            }
        }

        function updateTechStackButtonLabel() {
            const selectedText = document.getElementById('techStackSelectedText');
            if (!selectedText) return;
            if (filterState.techStacks.length === 0) {
                selectedText.textContent = '기술스택';
                return;
            }
            if (filterState.techStacks.length === 1) {
                selectedText.textContent = filterState.techStacks[0];
                return;
            }
            selectedText.textContent = `${filterState.techStacks[0]} 외 ${filterState.techStacks.length - 1}`;
        }

        function setProjectPurposeFilter(value, { skipFetch = false } = {}) {
            filterState.projectPurpose = value;
            filterState.page = 0;
            const purposeOptions = document.querySelectorAll('[data-project-purpose-option]');
            purposeOptions.forEach(button => {
                const isActive = button.dataset.projectPurposeOption === value || (value === '' && button.dataset.projectPurposeOption === '');
                button.classList.toggle('bg-poodle-600', isActive);
                button.classList.toggle('text-white', isActive);
                button.classList.toggle('shadow-lg', isActive);
                button.classList.toggle('shadow-poodle-600/10', isActive);
                button.classList.toggle('bg-poodle-50', !isActive);
                button.classList.toggle('text-poodle-600', !isActive);
            });
            updateProjectPurposeButtonLabel();
            closeProjectPurposeDropdown();
            if (!skipFetch) {
                fetchProjects(0);
            }
        }

        function toggleProjectPurposeDropdown() {
            const menu = document.getElementById('projectPurposeDropdownMenu');
            const icon = document.getElementById('projectPurposeDropdownIcon');
            if (!menu) return;
            const nextOpen = menu.classList.contains('hidden');
            menu.classList.toggle('hidden');
            icon?.classList.toggle('rotate-180', nextOpen);
        }

        function closeProjectPurposeDropdown() {
            document.getElementById('projectPurposeDropdownMenu')?.classList.add('hidden');
            document.getElementById('projectPurposeDropdownIcon')?.classList.remove('rotate-180');
        }

        function toggleBookmarkedOnly() {
            if (!HOME_LOGGED_IN) {
                const targetUrl = buildFilterUrl({ ...filterState, bookmarkedOnly: true, page: 0 });
                openLoginRequiredModal(targetUrl);
                return;
            }
            filterState.bookmarkedOnly = !filterState.bookmarkedOnly;
            filterState.page = 0;
            syncBookmarkedButton();
            fetchProjects(0);
        }

        function toggleOpenOnly() {
            filterState.openOnly = !filterState.openOnly;
            filterState.page = 0;
            syncOpenOnlyButton();
            fetchProjects(0);
        }

        function resetAllFilters() {
            // 필터 상태 초기화
            filterState.keyword = '';
            filterState.projectPurpose = '';
            filterState.bookmarkedOnly = false;
            filterState.openOnly = false;
            filterState.position = '';
            filterState.techStacks = [];
            filterState.page = 0;

            // UI 요소 갱신
            const keywordInput = document.getElementById('keywordInput');
            if (keywordInput) keywordInput.value = '';

            syncBookmarkedButton();
            syncOpenOnlyButton();
            updateProjectPurposeButtonLabel();
            
            // 포지션/역할 필터 초기화
            const roleOptions = document.querySelectorAll('[data-role-option]');
            roleOptions.forEach(button => {
                const isActive = button.dataset.roleOption === '';
                button.classList.toggle('bg-poodle-600', isActive);
                button.classList.toggle('text-white', isActive);
                button.classList.toggle('shadow-lg', isActive);
                button.classList.toggle('bg-poodle-50', !isActive);
                button.classList.toggle('text-poodle-600', !isActive);
            });
            updatePositionButtonLabel();

            // 기술 스택 초기화
            activeTechCategory = '모두보기';
            renderTechStackTabs();
            renderTechStackOptions();

            // 데이터 다시 불러오기
            fetchProjects(0);
        }

        function handleKeywordInput() {
            filterState.keyword = document.getElementById('keywordInput')?.value.trim() || '';
            filterState.page = 0;
            window.clearTimeout(searchDebounceTimer);
            searchDebounceTimer = window.setTimeout(() => fetchProjects(0), 250);
        }

        function setPositionFilter(value, { skipFetch = false } = {}) {
            filterState.position = value;
            filterState.page = 0;
            const roleOptions = document.querySelectorAll('[data-role-option]');
            roleOptions.forEach(button => {
                const isActive = button.dataset.roleOption === value || (value === '' && button.dataset.roleOption === '');
                button.classList.toggle('bg-poodle-600', isActive);
                button.classList.toggle('text-white', isActive);
                button.classList.toggle('shadow-lg', isActive);
                button.classList.toggle('shadow-poodle-600/10', isActive);
                button.classList.toggle('bg-poodle-50', !isActive);
                button.classList.toggle('text-poodle-600', !isActive);
            });
            updatePositionButtonLabel();
            closeRoleDropdown();
            if (!skipFetch) {
                fetchProjects(0);
            }
        }

        function toggleTechStackPanel() {
            const panel = document.getElementById('techStackPanel');
            const icon = document.getElementById('techStackPanelIcon');
            if (!panel) return;
            const nextOpen = panel.classList.contains('hidden');
            panel.classList.toggle('hidden');
            icon?.classList.toggle('rotate-180', nextOpen);
        }

        function toggleRoleDropdown() {
            const menu = document.getElementById('roleDropdownMenu');
            const icon = document.getElementById('roleDropdownIcon');
            if (!menu) return;
            const nextOpen = menu.classList.contains('hidden');
            menu.classList.toggle('hidden');
            icon?.classList.toggle('rotate-180', nextOpen);
        }

        function closeRoleDropdown() {
            document.getElementById('roleDropdownMenu')?.classList.add('hidden');
            document.getElementById('roleDropdownIcon')?.classList.remove('rotate-180');
        }

        function closeTechStackPanel() {
            document.getElementById('techStackPanel')?.classList.add('hidden');
            document.getElementById('techStackPanelIcon')?.classList.remove('rotate-180');
        }

        function setTechCategory(event, category) {
            event?.preventDefault();
            event?.stopPropagation();
            activeTechCategory = category;
            renderTechStackFilter();
        }

        function toggleTechStackFilter(event, tech) {
            event?.preventDefault();
            event?.stopPropagation();
            const index = filterState.techStacks.indexOf(tech);
            if (index >= 0) {
                filterState.techStacks.splice(index, 1);
            } else {
                filterState.techStacks.push(tech);
            }
            filterState.page = 0;
            renderTechStackFilter();
            updateTechStackButtonLabel();
            fetchProjects(0);
        }

        function clearTechStackFilter(event) {
            event?.preventDefault();
            event?.stopPropagation();
            filterState.techStacks = [];
            filterState.page = 0;
            renderTechStackFilter();
            updateTechStackButtonLabel();
            fetchProjects(0);
        }

        function initPositionFilter() {
            const list = document.getElementById('roleOptionsList');
            if (!list) return;
            list.innerHTML = [
                `<button type="button" data-role-option="" onclick="setPositionFilter('')" class="rounded-2xl bg-poodle-600 px-4 py-4 text-sm font-black text-white shadow-lg shadow-poodle-600/10 transition-all">전체</button>`,
                ...window.meetballPositionOptions.map(position => `
                    <button type="button" data-role-option="${escapeHtml(position)}" onclick="setPositionFilter('${escapeHtml(position)}')" class="rounded-2xl bg-poodle-50 px-4 py-4 text-sm font-black text-poodle-600 transition-all hover:bg-poodle-100">
                        ${escapeHtml(position)}
                    </button>
                `)
            ].join('');
            setPositionFilter(filterState.position, { skipFetch: true });
        }

        function initProjectPurposeFilter() {
            setProjectPurposeFilter(filterState.projectPurpose, { skipFetch: true });
        }

        function renderTechStackFilter() {
            const tabs = document.getElementById('techStackTabs');
            const options = document.getElementById('techStackFilterOptions');
            const clearBtn = document.getElementById('techStackClearBtn');
            if (!tabs || !options || !clearBtn) return;

            const orderedCategories = ['모두보기', '인기', '프론트엔드', '백엔드', '모바일', '기타']
                .filter(category => Object.prototype.hasOwnProperty.call(window.meetballTechStackCategories, category));

            tabs.innerHTML = orderedCategories.map(category => {
                const active = category === activeTechCategory;
                return `<button type="button" onclick="setTechCategory(event, '${escapeHtml(category)}')"
                                class="rounded-[1.2rem] px-5 py-3 text-sm font-black transition-all ${active ? 'bg-poodle-600 text-white shadow-lg shadow-poodle-600/10' : 'text-poodle-400 hover:bg-poodle-50 hover:text-poodle-700'}">${escapeHtml(category)}</button>`;
            }).join('');

            const visibleTechs = window.meetballTechStackCategories[activeTechCategory] || window.meetballTechStackOptions;
            options.innerHTML = visibleTechs.map(tech => {
                const selected = filterState.techStacks.includes(tech);
                return `<button type="button" onclick="toggleTechStackFilter(event, '${escapeHtml(tech)}')" class="tech-filter-option">${window.meetballTechStackChipHtml(tech, { selected })}</button>`;
            }).join('');

            const hasSelectedTechStacks = filterState.techStacks.length > 0;
            clearBtn.classList.toggle('invisible', !hasSelectedTechStacks);
            clearBtn.classList.toggle('opacity-0', !hasSelectedTechStacks);
            clearBtn.classList.toggle('pointer-events-none', !hasSelectedTechStacks);
        }

        function setViewMode(mode) {
            filterState.viewMode = normalizeViewMode(mode);
            updateViewButtons();
            renderProjects(currentProjects);
            syncUrlWithFilterState();
        }

        function updateViewButtons() {
            filterState.viewMode = normalizeViewMode(filterState.viewMode);
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-poodle-600', 'text-white');
                btn.classList.add('text-poodle-300');
            });
            const activeBtn = document.getElementById(filterState.viewMode === 'grid' ? 'btn-grid' : 'btn-list');
            if (activeBtn) {
                activeBtn.classList.add('active', 'bg-poodle-600', 'text-white');
                activeBtn.classList.remove('text-poodle-300');
            }
        }

        const MascotHover = {
            enter() {
                const mascot = document.getElementById('main-mascot');
                const tooltip = document.getElementById('mascot-tooltip');
                if (mascot) {
                    mascot.classList.add('pose-happy-loop');
                }
                if (tooltip) {
                    tooltip.classList.remove('opacity-0', 'scale-95');
                    tooltip.classList.add('opacity-100', 'scale-100');
                }
            },
            leave() {
                const mascot = document.getElementById('main-mascot');
                const tooltip = document.getElementById('mascot-tooltip');
                if (mascot) {
                    mascot.classList.remove('pose-happy-loop', 'pose-happy');
                }
                if (tooltip) {
                    tooltip.classList.remove('opacity-100', 'scale-100');
                    tooltip.classList.add('opacity-0', 'scale-95');
                }
            }
        };

        const RecommendationJourney = {
            state: 'idle',
            data: null,
            selectedBubbleIndex: null,
            selectedBubbleValue: null,
            selectedBubbleLabel: null,
            excludeIds: [],
            recentAxes: [],

            async start(force = false) {
                if (!HOME_LOGGED_IN) {
                    openLoginRequiredModal(window.location.pathname + window.location.search, 'AI 추천은 로그인 후 이용할 수 있어요.');
                    return;
                }
                if (!force && this.state !== 'idle') {
                    return;
                }

                this.setState('analyzing');

                if (this.recentAxes.length === 0 && RECENT_AXES_STORAGE_KEY) {
                    try {
                        const storedAxes = sessionStorage.getItem(RECENT_AXES_STORAGE_KEY);
                        if (storedAxes) {
                            this.recentAxes = JSON.parse(storedAxes) || [];
                        }
                    } catch (error) {
                        console.error('Failed to restore recent recommendation axes', error);
                    }
                }

                this.renderAnalyzingTags();

                try {
                    const params = new URLSearchParams({ t: String(Date.now()) });
                    this.excludeIds.forEach(projectId => params.append('excludeIds', String(projectId)));
                    this.recentAxes.forEach(axis => params.append('recentAxes', axis));

                    const fetchPromise = fetch(`/api/recommendations?${params.toString()}`).then(response => {
                        if (response.status === 401) {
                            openLoginRequiredModal(window.location.pathname + window.location.search);
                            throw new Error('unauthorized');
                        }
                        if (!response.ok) {
                            throw new Error(`Recommendation fetch failed: ${response.status}`);
                        }
                        return response.json();
                    });

                    await new Promise(resolve => setTimeout(resolve, 2500));

                    this.setState('searching');
                    this.renderSearchingTags();

                    const [data] = await Promise.all([
                        fetchPromise,
                        new Promise(resolve => setTimeout(resolve, 1500))
                    ]);

                    this.data = data;
                    this.selectedBubbleIndex = null;
                    this.selectedBubbleValue = null;
                    this.selectedBubbleLabel = null;

                    if (data?.axis && !this.recentAxes.includes(data.axis)) {
                        this.recentAxes.push(data.axis);
                        if (this.recentAxes.length > 3) {
                            this.recentAxes.shift();
                        }
                        if (RECENT_AXES_STORAGE_KEY) {
                            sessionStorage.setItem(RECENT_AXES_STORAGE_KEY, JSON.stringify(this.recentAxes));
                        }
                    }

                    this.setState('asking');
                } catch (error) {
                    if (error.message !== 'unauthorized') {
                        console.error('Journey error:', error);
                        await window.meetballAlert('AI 추천을 불러오는 중 오류가 발생했습니다.', { type: 'error' });
                    }
                    this.reset();
                }
            },

            asking() {
                const axis = this.data?.axis;
                const bubbles = this.data?.bubbles || [];
                const llmQuestion = this.data?.question;
                const axisLabel = document.getElementById('journey-axis-label');
                const questionText = document.getElementById('journey-question-text');
                const bubbleWrap = document.getElementById('journey-bubbles');

                if (!axisLabel || !questionText || !bubbleWrap) {
                    return;
                }

                const fallbackQuestionMap = {
                    '진행 방식': '어떤 방식으로 팀을 만나고 싶으세요?',
                    '프로젝트 성격': '어떤 성격의 프로젝트가 끌리세요?',
                    '모집 포지션': '어떤 역할로 참여하면 가장 즐거우실까요?'
                };
                const fallbackQuestion = fallbackQuestionMap[axis] || '오늘은 어떤 분위기의 프로젝트가 좋으세요?';

                axisLabel.textContent = axis || 'AI 분석 결과';
                questionText.textContent = llmQuestion || fallbackQuestion;
                bubbleWrap.innerHTML = bubbles.map((bubble, index) => {
                    const label = typeof bubble === 'object' ? bubble.label : bubble;
                    return `
                        <button type="button" onclick="RecommendationJourney.selectBubble(${index})"
                                class="px-6 py-3.5 bg-white border-2 border-poodle-100 hover:border-meatball hover:text-meatball hover:bg-meatball/5 text-poodle-700 rounded-full text-[14px] md:text-[15px] font-black shadow-sm hover:shadow-md transition-all hover:scale-105 active:scale-95 animate-fade-in-up"
                                style="animation-delay: ${index * 0.1}s">
                            ${escapeHtml(label)}
                        </button>
                    `;
                }).join('');
            },

            selectBubble(index) {
                const bubble = this.data.bubbles[index];
                this.selectedBubbleIndex = index;
                this.selectedBubbleLabel = typeof bubble === 'object' ? bubble.label : bubble;
                this.selectedBubbleValue = typeof bubble === 'object' ? bubble.value : bubble;

                const interaction = document.getElementById('journey-interaction');
                if (interaction) {
                    interaction.classList.add('opacity-0', 'scale-95');
                }

                if (this.selectedBubbleValue && this.data.recommendations) {
                    this.data.recommendations.sort((a, b) => {
                        const scoreA = this._calculateSemanticScore(this.selectedBubbleValue, a);
                        const scoreB = this._calculateSemanticScore(this.selectedBubbleValue, b);
                        if (scoreA !== scoreB) return scoreB - scoreA;
                        
                        const aOriginalIndex = this.data.recommendations.indexOf(a);
                        const bOriginalIndex = this.data.recommendations.indexOf(b);
                        return aOriginalIndex - bOriginalIndex;
                    });
                    this.selectedBubbleIndex = 0;
                }

                setTimeout(() => {
                    this.setState('result');
                }, 400);
            },

            _calculateSemanticScore(bubbleValue, project) {
                if (!bubbleValue || !project) return 0;
                let score = 0;
                const vNorm = bubbleValue.toLowerCase().replace(/\s/g, '');

                const checkExactMatch = (val, bonus) => {
                    if (!val) return;
                    const tagNorm = val.toLowerCase().replace(/\s/g, '');
                    if (tagNorm === vNorm) {
                        score += bonus;
                        return true;
                    }
                    if (tagNorm.includes(vNorm)) {
                        score += bonus * 0.5;
                        return true;
                    }
                    return false;
                };

                // value와 태그의 직접 매칭 우선
                checkExactMatch(project.progressMethod, 1000);
                checkExactMatch(project.projectType, 1000);
                checkExactMatch(project.axisValue, 500);

                return score;
            },

            renderResult() {
                const recommendations = this.data?.recommendations || [];
                const grid = document.getElementById('journey-result-grid');
                const chip = document.getElementById('selected-bubble-chip');

                if (chip) chip.textContent = this.selectedBubbleLabel || '나의 선택';

                const top3 = recommendations.slice(0, 3);
                const displayItems = [];
                if (top3.length > 0) displayItems.push({ item: top3[1] || top3[0], isMain: false, delay: 0.1 });

            checkHighlight(tagText, bubbleValue, axisValue) {
                const raw = (tagText || '').trim();
                if (!raw || !bubbleValue) return 'bg-poodle-50 text-poodle-400';
                
                const vNorm = bubbleValue.toLowerCase().replace(/\s/g, '');
                const tagNorm = raw.toLowerCase().replace(/\s/g, '');
                
                // exact match 또는 1:1 매칭 우선
                if (tagNorm === vNorm || tagNorm.includes(vNorm) || 
                    (axisValue && tagNorm.includes(axisValue.toLowerCase().replace(/\s/g, '')))) {
                    return 'bg-poodle-600 text-white shadow-md tag-highlight-strong';
                }
                return 'bg-poodle-50 text-poodle-500';
            },

            setState(newState) {
                const idle = document.getElementById('hero-idle-state');
                const journey = document.getElementById('hero-journey-stage');
                const mascotWrap = document.getElementById('mascot-container');
                const mascot = document.getElementById('main-mascot');
                const heroSection = document.getElementById('hero-section');
                const analyzingText = document.getElementById('journey-analyzing-text');
                const searchingText = document.getElementById('journey-searching-text');
                const tagCloud = document.getElementById('journey-tag-cloud');
                const searchCloud = document.getElementById('journey-search-cloud');
                const interaction = document.getElementById('journey-interaction');
                const result = document.getElementById('journey-result');
                const restartButton = document.getElementById('restart-journey-btn');

                if (!idle || !journey || !mascotWrap || !mascot || !heroSection || !interaction || !result) {
                    return;
                }

                this.state = newState;

                mascotWrap.classList.remove('mascot-wrap-idle', 'mascot-wrap-analyzing', 'mascot-wrap-searching', 'mascot-wrap-asking', 'mascot-wrap-result');
                mascot.classList.remove('pose-analyzing', 'pose-asking', 'pose-happy', 'pose-searching', 'mascot-base', 'mascot-analyzing', 'mascot-searching', 'mascot-asking', 'mascot-result-compact');
                heroSection.classList.remove('journey-active', 'result-active');

                analyzingText?.classList.add('hidden');
                analyzingText?.classList.remove('flex');
                searchingText?.classList.add('hidden');
                searchingText?.classList.remove('flex');
                tagCloud?.classList.add('hidden');
                searchCloud?.classList.add('hidden');

                if (newState === 'idle') {
                    mascotWrap.classList.add('mascot-wrap-idle');
                    mascot.classList.add('mascot-base');
                    idle.classList.remove('hidden');
                    window.setTimeout(() => idle.classList.remove('opacity-0'), 10);
                    journey.classList.add('hidden');
                } else {
                    idle.classList.add('hidden');
                    journey.classList.remove('hidden');
                    window.setTimeout(() => journey.classList.add('opacity-100'), 10);
                    heroSection.classList.add('journey-active');

                    if (newState === 'analyzing') {
                        mascotWrap.classList.add('mascot-wrap-analyzing');
                        mascot.classList.add('mascot-analyzing', 'pose-analyzing');
                        tagCloud?.classList.remove('hidden');
                        interaction.classList.add('hidden');
                        result.classList.add('hidden');
                        analyzingText?.classList.remove('hidden');
                        analyzingText?.classList.add('flex');
                    } else if (newState === 'searching') {
                        mascotWrap.classList.add('mascot-wrap-searching');
                        mascot.classList.add('mascot-searching', 'pose-searching');
                        searchCloud?.classList.remove('hidden');
                        interaction.classList.add('hidden');
                        result.classList.add('hidden');
                        searchingText?.classList.remove('hidden');
                        searchingText?.classList.add('flex');
                    } else if (newState === 'asking') {
                        mascotWrap.classList.add('mascot-wrap-asking');
                        mascot.classList.add('mascot-asking', 'pose-asking');
                        tagCloud?.classList.add('hidden');
                        interaction.classList.remove('hidden', 'opacity-0', 'scale-95');
                        result.classList.add('hidden');
                        this.asking();
                    } else if (newState === 'result') {
                        mascotWrap.classList.add('mascot-wrap-result');
                        mascot.classList.add('mascot-result-compact', 'pose-happy');
                        heroSection.classList.add('result-active');
                        interaction.classList.add('hidden');
                        result.classList.remove('hidden');
                        restartButton?.classList.remove('hidden');
                        this.renderResult();
                    }
                }

                if (newState !== 'result') {
                    restartButton?.classList.add('hidden');
                }
            },

            restart() {
                if (this.data?.recommendations) {
                    this.data.recommendations.forEach(recommendation => {
                        if (recommendation.projectId && !this.excludeIds.includes(recommendation.projectId)) {
                            this.excludeIds.push(recommendation.projectId);
                        }
                    });
                }
                this.start(true);
            },

                const cloud = document.getElementById('journey-tag-cloud');
                if (!cloud) {
                    return;
                }
                cloud.innerHTML = '';
                const tags = ['React', 'Spring Boot', 'Backend', 'Frontend', 'Designer', 'Planning', 'Java', 'Python', 'AI', 'Figma'];

                    const tag = document.createElement('div');

                    return;
                }

            reset() {
                this.data = null;
                this.selectedBubbleIndex = null;
                this.excludeIds = [];
                if (RECOMMENDATION_STORAGE_KEY) {
                    sessionStorage.removeItem(RECOMMENDATION_STORAGE_KEY);
                }
                this.setState('idle');
            }
        };

        function loadPersistedRecommendations() {
            if (!RECOMMENDATION_STORAGE_KEY) {
                return;
            }

            const isReload = (() => {
                try {
                    const entries = performance.getEntriesByType('navigation');
                    if (entries.length > 0) {
                        return entries[0].type === 'reload';
                    }
                    return performance.navigation && performance.navigation.type === 1;
                } catch (error) {
                    return false;
                }
            })();

            if (isReload) {
                sessionStorage.removeItem(RECOMMENDATION_STORAGE_KEY);
                return;
            }

            try {
                const stored = sessionStorage.getItem(RECOMMENDATION_STORAGE_KEY);
                if (!stored) {
                    return;
                }
                const parsed = JSON.parse(stored);
                if (parsed && parsed.selectedBubbleIndex !== undefined && parsed.selectedBubbleIndex !== null) {
                    RecommendationJourney.data = parsed;
                    RecommendationJourney.selectedBubbleIndex = parsed.selectedBubbleIndex;
                    RecommendationJourney.setState('result');
                }
            } catch (error) {
                console.error('Failed to restore recommendation journey', error);
            }
        }

        window.MascotHover = MascotHover;
        window.RecommendationJourney = RecommendationJourney;

        async function fetchProjects(page = filterState.page) {
            filterState.page = page;
            filterState.viewMode = normalizeViewMode(filterState.viewMode);
            syncUrlWithFilterState();

            const requestToken = ++activeFetchToken;
            try {
                const query = new URLSearchParams({
                    page: String(filterState.page),
                    size: String(HOME_PAGE_SIZE),
                    keyword: filterState.keyword,
                    projectPurpose: filterState.projectPurpose,
                    position: filterState.position,
                    techStack: filterState.techStacks.join(','),
                    bookmarkedOnly: String(filterState.bookmarkedOnly),
                    openOnly: String(filterState.openOnly)
                }).toString();

                const res = await fetch(`/api/projects?${query}`);
                if (!res.ok) throw new Error('API fetch error');
                const data = await res.json();
                if (requestToken !== activeFetchToken) return;

                currentProjects = data.content || [];
                currentPageData = data;
                renderProjects(currentProjects);
                renderPagination(data);

                // 페이지 전환 시 프로젝트 목록 상단으로 부드럽게 이동
                if (page > 0 || filterState.page > 0) {
                    const projectsSection = document.getElementById('projects');
                    if (projectsSection) {
                        const offset = projectsSection.getBoundingClientRect().top + window.scrollY - 120;
                        window.scrollTo({ top: offset, behavior: 'smooth' });
                    }
                }
            } catch (error) {
                console.error('Error fetching projects:', error);
            }
        }

        async function toggleHomeBookmark(event, projectId) {
            event?.preventDefault();
            event?.stopPropagation();
            if (!projectId) return;

            if (!HOME_LOGGED_IN) {
                openLoginRequiredModal(window.location.pathname + window.location.search);
                return;
            }

            try {
                const res = await window.meetballFetch(`/api/projects/${encodeURIComponent(projectId)}/bookmarks`, { method: 'POST' });
                if (!res.ok) throw new Error('Bookmark toggle failed');
                updateHomeBookmark(projectId, await res.json());
            } catch (error) {
                console.error('Bookmark toggle error:', error);
                await meetballAlert('관심 프로젝트 변경에 실패했습니다.', { type: 'error' });
            }
        }

        function updateHomeBookmark(projectId, data) {
            const domProjectId = String(projectId).replace(/[^0-9A-Za-z_-]/g, '');
            const isBookmarked = Boolean(data.bookmarked ?? data.isBookmarked);
            const count = Number(data.totalBookmarks ?? data.bookmarkCount ?? 0);
            const countNode = document.getElementById(`homeBookmarkCount-${domProjectId}`);
            const icon = document.getElementById(`homeBookmarkIcon-${domProjectId}`);
            const button = document.getElementById(`homeBookmarkButton-${domProjectId}`);

            if (countNode) countNode.textContent = String(count);
            if (icon) {
                icon.classList.toggle('fa-solid', isBookmarked);
                icon.classList.toggle('fa-regular', !isBookmarked);
                icon.classList.toggle('text-meatball', isBookmarked);
            }
            if (button) {
                button.classList.toggle('text-meatball', isBookmarked);
                button.classList.toggle('bg-white', isBookmarked);
                button.classList.toggle('border-meatball/20', isBookmarked);
                button.classList.toggle('text-poodle-300', !isBookmarked);
                button.classList.toggle('bg-poodle-50', !isBookmarked);
                button.classList.toggle('border-poodle-100', !isBookmarked);
            }
        }

                                <div class="h-full bg-meatball rounded-full" style="width: ${percentage}%"></div>
                            </div>
                            <div class="flex justify-end">
                                ${projectMetrics}
                            </div>
                        </div>
                        <div class="shrink-0 flex items-center gap-2">
                            ${bookmarkButton}
                            <a href="/projects/${projectId}" class="inline-flex justify-center py-3.5 px-5 bg-poodle-600 text-white rounded-xl text-xs font-black hover:bg-meatball hover:text-poodle-900 transition-all shadow-lg active:scale-95">
                                보기
                            </a>
                        </div>
                    </div>
                </div>
            </article>`;
                }

                return `
            <article onclick="window.location.href='/projects/${projectId}'"
                     class="project-card cursor-pointer bg-white rounded-[2.5rem] border border-poodle-50 flex flex-col h-full overflow-hidden group hover:border-meatball/20 transition-all shadow-sm hover:shadow-2xl hover:-translate-y-2">
                <!-- Image Section -->
                <div class="relative h-44 overflow-hidden">
                    <img src="${escapeHtml(thumbnailUrl)}" alt="${title}"
                         class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                    <div class="absolute top-4 left-4">
                        <span class="text-[9px] font-black text-poodle-900 bg-meatball px-3 py-1 rounded-full shadow-lg pointer-events-none">${deadlineLabel}</span>
                    </div>
                    <div class="absolute top-4 right-4">
                        ${bookmarkButton}
                    </div>
                </div>

                <div class="p-6 flex flex-col flex-grow">
                    <div class="flex flex-wrap gap-2 mb-4">
                        <span class="px-2.5 py-1 bg-poodle-50 text-poodle-700 rounded-lg text-[9px] font-black border border-poodle-100 uppercase italic">${projectPurpose}</span>
                        <span class="px-2.5 py-1 bg-meatball/5 text-meatball rounded-lg text-[9px] font-black border border-meatball/10 uppercase italic">${position}</span>
                    </div>

                    <h3 class="text-xl font-black text-poodle-900 mb-2 leading-tight group-hover:text-meatball transition-colors line-clamp-1">${title}</h3>
                    <p class="text-[11px] text-poodle-400 font-bold leading-relaxed mb-4 line-clamp-2">${summary}</p>

                    <div class="flex flex-wrap gap-1.5 mb-6">
                        ${techBadges}
                    </div>

                    <div class="mt-auto pt-4 border-t border-poodle-50">
                        <div class="flex items-center justify-between mb-3">
                            <span class="text-[9px] font-black text-poodle-200 uppercase tracking-widest italic">Recruit Status</span>
                            <span class="text-xs font-black text-poodle-900">
                                <span class="text-meatball">${currentRecruit}</span> <span class="text-poodle-100">/</span> <span>${totalRecruit}</span>
                            </span>
                        </div>
                        <div class="w-full h-1.5 bg-poodle-50 rounded-full overflow-hidden mb-5">
                            <div class="h-full bg-meatball rounded-full" style="width: ${percentage}%"></div>
                        </div>
                        <div class="flex items-center justify-between">
                            ${projectMetrics}
                            <a href="/projects/${projectId}" class="w-full max-w-[140px] inline-flex justify-center py-3 bg-poodle-600 text-white rounded-xl text-xs font-black hover:bg-meatball hover:text-poodle-900 transition-all shadow-lg active:scale-95 group/btn">
                                프로젝트 보기
                            </a>
                        </div>
                    </div>
                </div>
            </article>`;
            }).join('');
        }

        function formatPositionSummary(value) {
            const positions = String(value || '')
                .split(',')
                .map(token => token.split(':')[0].trim())
                .filter(Boolean);
            return positions.length ? positions.join(', ') : '미지정';
        }

        function renderPagination(pageData) {
            const wrap = document.getElementById('paginationContainer');
            if (pageData.totalPages <= 1) {
                wrap.innerHTML = '';
                return;
            }

            let html = '';
            html += `<button onclick="fetchProjects(${pageData.number - 1})" ${pageData.first ? 'disabled' : ''} class="w-10 h-10 flex items-center justify-center rounded-2xl bg-white border border-poodle-100 text-poodle-400 hover:text-meatball hover:border-meatball transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                     <i class="fa-solid fa-chevron-left text-xs"></i>
                 </button>`;

            for (let i = 0; i < pageData.totalPages; i++) {
                if (i === pageData.number) {
                    html += `<button class="w-10 h-10 flex items-center justify-center rounded-2xl bg-meatball text-poodle-900 font-black shadow-lg shadow-meatball/20 transition-all">${i + 1}</button>`;
                } else {
                    html += `<button onclick="fetchProjects(${i})" class="w-10 h-10 flex items-center justify-center rounded-2xl bg-white border border-poodle-100 text-poodle-400 hover:text-poodle-900 transition-all font-black">${i + 1}</button>`;
                }
            }

            html += `<button onclick="fetchProjects(${pageData.number + 1})" ${pageData.last ? 'disabled' : ''} class="w-10 h-10 flex items-center justify-center rounded-2xl bg-white border border-poodle-100 text-poodle-400 hover:text-meatball hover:border-meatball transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                     <i class="fa-solid fa-chevron-right text-xs"></i>
                 </button>`;

            wrap.innerHTML = html;
        }

        function handleViewportChange() {
            filterState.viewMode = normalizeViewMode(filterState.viewMode);
            updateViewButtons();
            if (currentProjects.length > 0) {
                renderProjects(currentProjects);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            hydrateFilterStateFromUrl();
            initProjectPurposeFilter();
            initPositionFilter();
            renderTechStackFilter();
            updateProjectPurposeButtonLabel();
            updateTechStackButtonLabel();
            syncBookmarkedButton();
            syncOpenOnlyButton();
            updateViewButtons();

            const keywordInput = document.getElementById('keywordInput');
            keywordInput?.addEventListener('input', handleKeywordInput);

            loadPersistedRecommendations();
            fetchProjects(filterState.page);
        });

        MOBILE_MEDIA_QUERY.addEventListener('change', handleViewportChange);

        document.addEventListener('click', event => {
            if (!event.target.closest('#projectPurposeDropdownBtn') && !event.target.closest('#projectPurposeDropdownMenu')) {
                closeProjectPurposeDropdown();
            }
            if (!event.target.closest('#roleDropdownBtn') && !event.target.closest('#roleDropdownMenu')) {
                closeRoleDropdown();
            }
            if (!event.target.closest('#techStackMainBtn') && !event.target.closest('#techStackPanel')) {
                closeTechStackPanel();
            }
        });
    </script>
</body>

</html>
