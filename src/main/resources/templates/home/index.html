<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: commonHead('홈')}"></head>

<body class="text-poodle-900 flex flex-col min-h-screen">
    <header th:replace="~{fragments/header :: mainHeader}"></header>

    <main class="flex-grow container mx-auto px-4 py-12 animate-fade-in-up">
        <!-- Hero Section (Slim Version) -->
        <section
            class="mb-12 relative min-h-[26rem] bg-poodle-100 rounded-[3rem] px-8 md:px-14 py-12 md:py-16 overflow-hidden shadow-[0_28px_70px_rgba(101,55,40,0.12)] border border-white/80 flex items-center">
            <img th:src="@{/img/logo.png}" src="/img/logo.png" alt="Meetball mascot"
                 class="absolute right-[-5rem] md:right-8 bottom-[-3rem] w-[20rem] md:w-[28rem] max-w-none object-contain opacity-20 md:opacity-95 pointer-events-none select-none">

            <div class="relative z-10 max-w-2xl">
                <div
                    class="inline-flex items-center gap-2 px-4 py-2 bg-white/70 backdrop-blur-md rounded-full border border-white text-poodle-600 text-[10px] font-black uppercase tracking-widest mb-6 animate-bounce-subtle">
                    <i class="fa-solid fa-paw text-meatball"></i> Meetball: Smart Matching
                </div>
                <h1 class="text-4xl md:text-6xl font-black text-poodle-600 tracking-tighter mb-5 leading-tight">
                    같이 할 사람,<br>여기서 만나요
                </h1>
                <p
                    class="text-sm md:text-base text-poodle-500 font-bold mb-8 max-w-lg leading-relaxed">
                    미트볼에서 프로젝트 팀원을 찾아보세요. 따뜻한 매칭 흐름으로 나에게 맞는 팀과 더 빨리 만날 수 있습니다.
                </p>
                <a th:href="@{/projects}"
                    class="group relative inline-flex items-center gap-4 px-10 py-5 bg-poodle-600 text-white rounded-2xl font-black text-lg overflow-hidden shadow-xl shadow-poodle-600/20 hover:bg-meatball hover:text-poodle-900 hover:scale-105 active:scale-95 transition-all">
                    <span class="relative z-10">지금 바로 팀원 찾기</span>
                    <i
                        class="fa-solid fa-arrow-right-long relative z-10 group-hover:translate-x-2 transition-transform duration-300"></i>
                </a>
            </div>
        </section>

        <!-- Search & Filter Section -->
        <section class="mb-16 animate-fade-in-up" style="animation-delay: 0.2s;">
            <div class="meetball-card p-8 rounded-[3rem] space-y-6">
                <!-- Keyword Search -->
                <div
                    class="flex items-center bg-poodle-50/50 rounded-2xl p-2 border border-poodle-100 focus-within:border-meatball/30 focus-within:bg-white transition-all">
                    <div class="px-4 text-poodle-300"><i class="fa-solid fa-magnifying-glass"></i></div>
                    <input type="text" id="keywordInput" placeholder="관심 있는 프로젝트명이나 기술 스택을 검색해보세요!"
                        class="w-full bg-transparent border-none outline-none text-poodle-800 font-bold placeholder-poodle-300 text-sm py-2"
                        onkeypress="if(event.key === 'Enter') fetchProjects()">
                    <button onclick="fetchProjects()"
                        class="px-6 py-3 bg-poodle-600 text-white rounded-xl font-black text-xs hover:bg-meatball hover:text-poodle-900 transition-all">검색</button>
                </div>

                <div class="h-px bg-poodle-50/50 w-full"></div>

                <!-- Filters -->
                <div class="flex flex-col gap-6">
                    <!-- Project Type -->
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div class="flex flex-wrap gap-3 items-center">
                            <span
                                class="text-[11px] font-black text-poodle-200 uppercase tracking-widest italic w-16">Type</span>
                            <button onclick="setFilter('projectType', '')"
                                class="filter-btn type-filter active px-4 py-1.5 rounded-xl bg-poodle-600 text-white text-[11px] font-black transition-all">전체</button>
                            <button onclick="setFilter('projectType', '사이드 프로젝트')"
                                class="filter-btn type-filter px-4 py-1.5 rounded-xl border border-poodle-50 text-poodle-400 text-[11px] font-black hover:bg-poodle-50 transition-all">사이드
                                프로젝트</button>
                            <button onclick="setFilter('projectType', '공모전')"
                                class="filter-btn type-filter px-4 py-1.5 rounded-xl border border-poodle-50 text-poodle-400 text-[11px] font-black hover:bg-poodle-50 transition-all">공모전</button>
                        </div>
                        <!-- Progress Method -->
                        <div class="flex flex-wrap gap-3 items-center">
                            <span
                                class="text-[11px] font-black text-poodle-200 uppercase tracking-widest italic w-16">Method</span>
                            <button onclick="setFilter('progressMethod', '')"
                                class="filter-btn method-filter active px-4 py-1.5 rounded-xl bg-poodle-600 text-white text-[11px] font-black transition-all">전체</button>
                            <button onclick="setFilter('progressMethod', '온라인')"
                                class="filter-btn method-filter px-4 py-1.5 rounded-xl border border-poodle-50 text-poodle-400 text-[11px] font-black hover:bg-poodle-50 transition-all">온라인</button>
                            <button onclick="setFilter('progressMethod', '오프라인')"
                                class="filter-btn method-filter px-4 py-1.5 rounded-xl border border-poodle-50 text-poodle-400 text-[11px] font-black hover:bg-poodle-50 transition-all">오프라인</button>
                        </div>
                        <!-- Position -->
                        <div class="flex flex-wrap gap-3 items-center">
                            <span
                                class="text-[11px] font-black text-poodle-200 uppercase tracking-widest italic w-16">Role</span>
                            <button onclick="setFilter('position', '')"
                                class="filter-btn position-filter active px-4 py-1.5 rounded-xl bg-poodle-600 text-white text-[11px] font-black transition-all">전체</button>
                            <button onclick="setFilter('position', '프론트엔드')"
                                class="filter-btn position-filter px-4 py-1.5 rounded-xl border border-poodle-50 text-poodle-400 text-[11px] font-black hover:bg-poodle-50 transition-all">프론트엔드</button>
                            <button onclick="setFilter('position', '백엔드')"
                                class="filter-btn position-filter px-4 py-1.5 rounded-xl border border-poodle-50 text-poodle-400 text-[11px] font-black hover:bg-poodle-50 transition-all">백엔드</button>
                            <button onclick="setFilter('position', '디자인')"
                                class="filter-btn position-filter px-4 py-1.5 rounded-xl border border-poodle-50 text-poodle-400 text-[11px] font-black hover:bg-poodle-50 transition-all">디자인</button>
                            <button onclick="setFilter('position', 'AI')"
                                class="filter-btn position-filter px-4 py-1.5 rounded-xl border border-poodle-50 text-poodle-400 text-[11px] font-black hover:bg-poodle-50 transition-all">AI/데이터</button>
                        </div>
                        <!-- Tech Stack -->
                        <div class="flex flex-col sm:flex-row gap-3 sm:items-center">
                            <span
                                class="text-[11px] font-black text-poodle-200 uppercase tracking-widest italic w-16 shrink-0">Tech</span>
                            <div class="flex items-center gap-2 bg-poodle-50/50 rounded-xl px-3 py-2 border border-poodle-100 flex-grow">
                                <input type="text" id="techStackInput" placeholder="Spring, React 등"
                                    class="w-full bg-transparent outline-none text-xs font-black text-poodle-700 placeholder:text-poodle-200"
                                    onkeypress="if(event.key === 'Enter') applyTechStackFilter()">
                                <button onclick="applyTechStackFilter()" class="w-8 h-8 rounded-lg bg-white text-poodle-400 hover:text-meatball border border-poodle-100 transition-all">
                                    <i class="fa-solid fa-check text-[10px]"></i>
                                </button>
                                <button onclick="clearTechStackFilter()" class="w-8 h-8 rounded-lg bg-white text-poodle-200 hover:text-red-400 border border-poodle-100 transition-all">
                                    <i class="fa-solid fa-xmark text-[10px]"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Personalized Recommendations -->
        <section th:if="${isLoggedIn}" id="recommendationSection" class="mb-16 hidden animate-fade-in-up">
            <div class="flex items-center justify-between mb-6">
                <div>
                    <p class="text-[10px] font-black text-meatball uppercase tracking-[0.25em] mb-2">Smart Matching</p>
                    <h2 class="text-2xl font-black text-poodle-900 tracking-tight">나에게 맞는 추천 프로젝트</h2>
                </div>
                <a th:href="@{/user/mypage}" class="text-xs font-black text-poodle-300 hover:text-meatball transition-colors">
                    프로필 보러가기 <i class="fa-solid fa-chevron-right ml-1"></i>
                </a>
            </div>
            <div id="recommendationContainer" class="grid grid-cols-1 md:grid-cols-3 gap-5">
                <div class="p-8 bg-white rounded-[2rem] border border-poodle-50 text-sm font-bold text-poodle-300">추천을 불러오는 중...</div>
            </div>
        </section>

        <!-- Project List (Slim Cards) -->
        <section class="mb-24 animate-fade-in-up" style="animation-delay: 0.4s;">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-3xl font-black text-poodle-900 tracking-tight">모집 중인 프로젝트</h2>
                <div class="flex items-center gap-3">
                    <div class="flex items-center gap-2 p-1 bg-white border border-poodle-50 rounded-2xl shadow-sm">
                        <button type="button" id="btn-grid" onclick="setViewMode('grid')"
                            class="view-btn active w-11 h-11 rounded-xl bg-poodle-600 text-white transition-all">
                            <i class="fa-solid fa-table-cells-large text-xs"></i>
                        </button>
                        <button type="button" id="btn-list" onclick="setViewMode('list')"
                            class="view-btn w-11 h-11 rounded-xl text-poodle-300 hover:text-meatball transition-all">
                            <i class="fa-solid fa-list text-xs"></i>
                        </button>
                    </div>
                    <a th:href="@{/register}"
                        class="px-6 py-4 bg-poodle-600 text-white rounded-2xl text-xs font-black shadow-xl shadow-poodle-600/10 hover:bg-meatball hover:text-poodle-900 transition-all flex items-center gap-2">
                        <i class="fa-solid fa-plus text-[10px]"></i> 프로젝트 등록
                    </a>
                </div>
            </div>

            <!-- Project Container (Dynamic via JS) -->
            <div id="projectContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Project Cards will be injected here -->
            </div>

            <!-- Pagination Controls -->
            <div class="mt-12 flex items-center justify-center gap-4" id="paginationContainer">
            </div>
        </section>
    </main>

    <footer th:replace="~{fragments/footer :: mainFooter}"></footer>

    <script>
        const escapeHtml = window.meetballEscapeHtml;
        const safeUrl = window.meetballSafeUrl;

        let filterState = {
            keyword: '',
            projectType: '',
            progressMethod: '',
            position: '',
            techStack: '',
            viewMode: 'grid',
            page: 0
        };

        function setFilter(type, value) {
            filterState[type] = value;
            filterState.page = 0; // 필터 시 1페이지로 리셋

            // UI 버튼 활성화 토글 로직
            const parent = document.querySelectorAll(`.${type}-filter`);
            if (parent.length > 0) {
                parent.forEach(btn => {
                    btn.classList.remove('active', 'bg-poodle-600', 'bg-poodle-900', 'text-white');
                    btn.classList.add('border', 'border-poodle-50', 'text-poodle-400');
                });
                // 선택된 버튼 처리 (value='' 인 경우 '전체' 버튼 찾기 위해 임시 우회)
                const activeBtn = Array.from(parent).find(b => {
                    return (value === '' && b.innerText === '전체') || b.innerText === value;
                });
                if (activeBtn) {
                    activeBtn.classList.add('active', 'bg-poodle-600', 'text-white');
                    activeBtn.classList.remove('border', 'border-poodle-50', 'text-poodle-400');
                }
            }

            fetchProjects();
        }

        function applyTechStackFilter() {
            filterState.techStack = document.getElementById('techStackInput').value.trim();
            filterState.page = 0;
            fetchProjects();
        }

        function clearTechStackFilter() {
            document.getElementById('techStackInput').value = '';
            filterState.techStack = '';
            filterState.page = 0;
            fetchProjects();
        }

        function setViewMode(mode) {
            filterState.viewMode = mode === 'list' ? 'list' : 'grid';
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-poodle-600', 'bg-poodle-900', 'text-white');
                btn.classList.add('text-poodle-300');
            });
            const activeBtn = document.getElementById(filterState.viewMode === 'grid' ? 'btn-grid' : 'btn-list');
            if (activeBtn) {
                activeBtn.classList.add('active', 'bg-poodle-600', 'text-white');
                activeBtn.classList.remove('text-poodle-300');
            }
            fetchProjects(filterState.page);
        }

        async function fetchProjects(page = 0) {
            filterState.page = page;

            // 검색어 반영
            const keywordInput = document.getElementById('keywordInput').value;
            filterState.keyword = keywordInput;

            try {
                const query = new URLSearchParams({
                    page: filterState.page,
                    size: 6,
                    keyword: filterState.keyword,
                    projectType: filterState.projectType,
                    progressMethod: filterState.progressMethod,
                    position: filterState.position,
                    techStack: filterState.techStack
                }).toString();

                const res = await fetch(`/api/projects?${query}`);
                if (!res.ok) throw new Error('API fetch error');
                const data = await res.json();

                renderProjects(data.content);
                renderPagination(data);
            } catch (error) {
                console.error('Error fetching projects:', error);
            }
        }

        function renderProjects(projects) {
            const container = document.getElementById('projectContainer');
            if (!projects || projects.length === 0) {
                container.className = 'block';
                container.innerHTML = `
                <div class="py-32 text-center bg-white rounded-[3rem] border border-poodle-100 w-full">
                    <div class="w-24 h-24 bg-poodle-100 rounded-[1.5rem] flex items-center justify-center mx-auto mb-6 overflow-hidden">
                        <img src="/img/logo.png" alt="" class="w-full h-full object-contain p-2 opacity-70">
                    </div>
                    <p class="text-poodle-900 font-black text-xl">조건에 맞는 프로젝트가 없습니다.</p>
                </div>`;
                return;
            }

            container.className = filterState.viewMode === 'list'
                ? 'grid grid-cols-1 gap-5'
                : 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8';
            container.innerHTML = projects.map(p => {
                const currentRecruit = Number(p.currentRecruitment || 0);
                const totalRecruit = Number(p.totalRecruitment || 0);
                const percentage = totalRecruit > 0 ? Math.min(100, Math.max(0, currentRecruit * 100 / totalRecruit)) : 0;
                const title = escapeHtml(p.title || '프로젝트 제목 없음');
                const projectId = encodeURIComponent(String(p.id ?? ''));
                const thumbnailUrl = safeUrl(p.thumbnailUrl, 'https://picsum.photos/seed/project/600/400');
                const deadlineLabel = escapeHtml(p.deadlineLabel || '-');
                const projectType = escapeHtml(p.projectType || '');
                const position = escapeHtml(p.position || '미지정');
                const summary = escapeHtml(p.summary || '');

                // 기술 스택 (Array 처리)
                const techBadges = (p.techStacks || []).map(tech =>
                    `<span class="px-2 py-1 bg-poodle-50 text-poodle-300 rounded-md text-[10px] font-black">${escapeHtml(tech)}</span>`
                ).join('');

                if (filterState.viewMode === 'list') {
                    return `
            <article class="project-card bg-white rounded-[2rem] border border-poodle-50 overflow-hidden group hover:border-meatball/10 transition-all shadow-sm hover:shadow-xl">
                <div class="grid grid-cols-1 md:grid-cols-[15rem_1fr_auto] gap-0 md:gap-6 items-stretch">
                    <a href="/projects/${projectId}" class="relative h-48 md:h-full min-h-[12rem] overflow-hidden bg-poodle-50">
                        <img src="${escapeHtml(thumbnailUrl)}" alt="${title}"
                             class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                        <span class="absolute top-4 left-4 text-[9px] font-black text-poodle-900 bg-meatball px-3 py-1 rounded-full shadow-lg">${deadlineLabel}</span>
                    </a>
                    <div class="p-6 md:p-7 flex flex-col justify-between gap-5">
                        <div>
                            <div class="flex flex-wrap gap-2 mb-3">
                                <span class="px-2.5 py-1 bg-poodle-50 text-poodle-700 rounded-lg text-[9px] font-black border border-poodle-100 uppercase italic">${projectType}</span>
                                <span class="px-2.5 py-1 bg-meatball/5 text-meatball rounded-lg text-[9px] font-black border border-meatball/10 uppercase italic">${position}</span>
                            </div>
                            <h3 class="text-2xl font-black text-poodle-900 mb-2 leading-tight group-hover:text-meatball transition-colors">${title}</h3>
                            <p class="text-sm text-poodle-400 font-bold leading-relaxed line-clamp-2">${summary}</p>
                        </div>
                        <div class="flex flex-wrap gap-1.5">${techBadges}</div>
                    </div>
                    <div class="p-6 md:p-7 md:w-56 flex md:flex-col items-center md:items-stretch justify-between gap-5 border-t md:border-t-0 md:border-l border-poodle-50">
                        <div class="w-full">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-[9px] font-black text-poodle-200 uppercase tracking-widest italic">Recruit</span>
                                <span class="text-xs font-black text-poodle-900"><span class="text-meatball">${currentRecruit}</span> / ${totalRecruit}</span>
                            </div>
                            <div class="w-full h-1.5 bg-poodle-50 rounded-full overflow-hidden">
                                <div class="h-full bg-meatball rounded-full" style="width: ${percentage}%"></div>
                            </div>
                        </div>
                        <a href="/projects/${projectId}" class="shrink-0 inline-flex justify-center py-3.5 px-5 bg-poodle-600 text-white rounded-xl text-xs font-black hover:bg-meatball hover:text-poodle-900 transition-all shadow-lg active:scale-95">
                            보기 <i class="fa-solid fa-chevron-right ml-1.5"></i>
                        </a>
                    </div>
                </div>
            </article>`;
                }

                return `
            <article class="project-card bg-white rounded-[2.5rem] border border-poodle-50 flex flex-col h-full overflow-hidden group hover:border-meatball/10 transition-all shadow-sm hover:shadow-xl">
                <!-- Image Section -->
                <div class="relative h-44 overflow-hidden">
                    <img src="${escapeHtml(thumbnailUrl)}" alt="${title}"
                         class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                    <div class="absolute top-4 left-4">
                        <span class="text-[9px] font-black text-poodle-900 bg-meatball px-3 py-1 rounded-full shadow-lg">${deadlineLabel}</span>
                    </div>
                </div>

                <div class="p-6 flex flex-col flex-grow">
                    <div class="flex flex-wrap gap-2 mb-4">
                        <span class="px-2.5 py-1 bg-poodle-50 text-poodle-700 rounded-lg text-[9px] font-black border border-poodle-100 uppercase italic">${projectType}</span>
                        <span class="px-2.5 py-1 bg-meatball/5 text-meatball rounded-lg text-[9px] font-black border border-meatball/10 uppercase italic">${position}</span>
                    </div>

                    <h3 class="text-xl font-black text-poodle-900 mb-2 leading-tight group-hover:text-meatball transition-colors line-clamp-1">${title}</h3>
                    <p class="text-[11px] text-poodle-400 font-bold leading-relaxed mb-4 line-clamp-2">${summary}</p>

                    <div class="flex flex-wrap gap-1.5 mb-6">
                        ${techBadges}
                    </div>

                    <div class="mt-auto pt-4 border-t border-poodle-50">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-[9px] font-black text-poodle-200 uppercase tracking-widest italic">Recruit Status</span>
                            <span class="text-xs font-black text-poodle-900">
                                <span class="text-meatball">${currentRecruit}</span> <span class="text-poodle-100">/</span> <span>${totalRecruit}</span>
                            </span>
                        </div>
                        <div class="w-full h-1.5 bg-poodle-50 rounded-full overflow-hidden mb-5">
                            <div class="h-full bg-meatball rounded-full" style="width: ${percentage}%"></div>
                        </div>
                        <a href="/projects/${projectId}" class="w-full inline-flex justify-center py-3.5 bg-poodle-600 text-white rounded-xl text-xs font-black hover:bg-meatball hover:text-poodle-900 transition-all shadow-lg active:scale-95 group/btn">
                            프로젝트 보기 <i class="fa-solid fa-chevron-right ml-1.5 group-hover:translate-x-1 transition-transform"></i>
                        </a>
                    </div>
                </div>
            </article>`;
            }).join('');
        }

        function renderPagination(pageData) {
            const wrap = document.getElementById('paginationContainer');
            if (pageData.totalPages <= 1) {
                wrap.innerHTML = '';
                return;
            }

            let html = '';
            html += `<button onclick="fetchProjects(${pageData.number - 1})" ${pageData.first ? 'disabled' : ''} class="w-10 h-10 flex items-center justify-center rounded-2xl bg-white border border-poodle-100 text-poodle-400 hover:text-meatball hover:border-meatball transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                     <i class="fa-solid fa-chevron-left text-xs"></i>
                 </button>`;

            for (let i = 0; i < pageData.totalPages; i++) {
                if (i === pageData.number) {
                    html += `<button class="w-10 h-10 flex items-center justify-center rounded-2xl bg-meatball text-poodle-900 font-black shadow-lg shadow-meatball/20 transition-all">${i + 1}</button>`;
                } else {
                    html += `<button onclick="fetchProjects(${i})" class="w-10 h-10 flex items-center justify-center rounded-2xl bg-white border border-poodle-100 text-poodle-400 hover:text-poodle-900 transition-all font-black">${i + 1}</button>`;
                }
            }

            html += `<button onclick="fetchProjects(${pageData.number + 1})" ${pageData.last ? 'disabled' : ''} class="w-10 h-10 flex items-center justify-center rounded-2xl bg-white border border-poodle-100 text-poodle-400 hover:text-meatball hover:border-meatball transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                     <i class="fa-solid fa-chevron-right text-xs"></i>
                 </button>`;

            wrap.innerHTML = html;
        }

        async function fetchRecommendations() {
            const section = document.getElementById('recommendationSection');
            const container = document.getElementById('recommendationContainer');
            if (!section || !container) return;

            try {
                const res = await fetch('/api/recommendations');
                if (!res.ok) return;
                const recommendations = await res.json();
                if (!recommendations || recommendations.length === 0) return;

                section.classList.remove('hidden');
                container.innerHTML = recommendations.slice(0, 3).map(item => {
                    const projectId = encodeURIComponent(String(item.projectId ?? ''));
                    const title = escapeHtml(item.title || '추천 프로젝트');
                    const score = Number(item.score || 0);
                    const reasons = (item.reasons || []).slice(0, 2).map(reason =>
                        `<span class="px-3 py-1 bg-poodle-50 text-poodle-500 rounded-lg text-[10px] font-black">${escapeHtml(reason)}</span>`
                    ).join('');

                    return `
                        <a href="/projects/${projectId}" class="group p-7 bg-white border border-poodle-50 rounded-[2rem] shadow-sm hover:border-meatball/20 hover:shadow-xl transition-all">
                            <div class="flex items-center justify-between mb-5">
                                <span class="px-3 py-1 bg-meatball/10 text-meatball rounded-lg text-[10px] font-black">MATCH ${score}</span>
                                <i class="fa-solid fa-arrow-up-right-from-square text-poodle-200 group-hover:text-meatball transition-colors"></i>
                            </div>
                            <h3 class="text-lg font-black text-poodle-900 leading-snug mb-4 group-hover:text-meatball transition-colors">${title}</h3>
                            <div class="flex flex-wrap gap-2">${reasons}</div>
                        </a>
                    `;
                }).join('');
            } catch (error) {
                console.error('Recommendation fetch error:', error);
            }
        }

        // 초기에 0페이지 목록 로드
        document.addEventListener('DOMContentLoaded', () => {
            fetchRecommendations();
            fetchProjects(0);
        });
    </script>
</body>

</html>
