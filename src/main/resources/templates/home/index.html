<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: commonHead('홈')}"></head>

<body class="text-poodle-900 flex flex-col min-h-screen">
<header th:replace="~{fragments/header :: mainHeader}"></header>

<main class="flex-grow container mx-auto px-4 py-12 animate-fade-in-up">
    <!-- Hero Section (Slim Version) -->
    <section class="mb-12 relative py-12 md:py-16 bg-gradient-to-br from-poodle-700 via-poodle-600 to-poodle-900 rounded-[3rem] px-8 md:px-12 overflow-hidden shadow-2xl flex flex-col items-center justify-center text-center">
        <div class="absolute top-0 right-0 w-[400px] h-[400px] bg-white/5 rounded-full blur-[80px] -mr-20 -mt-20 pointer-events-none"></div>
        <div class="absolute bottom-0 left-0 w-[300px] h-[300px] bg-meatball/10 rounded-full blur-[80px] -ml-16 -mb-16 pointer-events-none"></div>
        
        <div class="relative z-10 max-w-4xl w-full mx-auto">
            <div class="inline-flex items-center gap-2 px-4 py-2 bg-white/10 backdrop-blur-md rounded-full border border-white/10 text-white text-[10px] font-black uppercase tracking-widest mb-6 animate-bounce-subtle">
                <i class="fa-solid fa-paw text-meatball"></i> Meetball: Smart Matching
            </div>
            <h1 class="text-4xl md:text-5xl font-black text-white tracking-tighter mb-5 leading-tight">
                사이드 프로젝트 팀원을<br>구하는 가장 똑똑한 방법
            </h1>
            <p class="text-sm md:text-base text-poodle-100 font-bold mb-8 opacity-80 max-w-xl mx-auto leading-relaxed">
                갈색 푸들 마스코트와 함께 나에게 딱 맞는 팀을 찾아보세요.
            </p>
            <a th:href="@{/projects}" class="group relative inline-flex items-center gap-4 px-10 py-5 bg-meatball text-white rounded-2xl font-black text-lg overflow-hidden shadow-xl hover:scale-105 active:scale-95 transition-all border-2 border-white/10">
                <span class="relative z-10">지금 바로 팀원 찾기</span>
                <i class="fa-solid fa-arrow-right-long relative z-10 group-hover:translate-x-2 transition-transform duration-300"></i>
                <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-[1.5s]"></div>
            </a>
        </div>
    </section>

    <!-- Filter Section (Slim) -->
    <section class="mb-16 animate-fade-in-up" style="animation-delay: 0.2s;">
        <div class="bg-white p-8 rounded-[3rem] border border-poodle-50 shadow-sm space-y-6">
            <div class="flex flex-wrap gap-4 items-center">
                <span class="text-[11px] font-black text-poodle-200 uppercase tracking-widest italic w-16">Position</span>
                <button class="px-5 py-2 rounded-xl bg-poodle-900 text-white text-xs font-black">전체</button>
                <button class="px-5 py-2 rounded-xl border border-poodle-50 text-poodle-400 text-xs font-black hover:bg-poodle-50 transition-all">프론트엔드</button>
                <button class="px-5 py-2 rounded-xl border border-poodle-50 text-poodle-400 text-xs font-black hover:bg-poodle-50 transition-all">백엔드</button>
            </div>
            <div class="h-px bg-poodle-50/50 w-full"></div>
            <div class="flex flex-wrap gap-4 items-center">
                <span class="text-[11px] font-black text-poodle-200 uppercase tracking-widest italic w-16">Tech</span>
                <div class="flex flex-wrap gap-2 text-meatball">
                    <span class="px-3 py-1.5 bg-meatball/5 border border-meatball/10 rounded-lg text-[10px] font-black">Spring Boot</span>
                    <span class="px-3 py-1.5 bg-meatball/5 border border-meatball/10 rounded-lg text-[10px] font-black">MySQL</span>
                </div>
            </div>
        </div>
    </section>

    <!-- Project List (Slim Cards) -->
    <section class="mb-24 animate-fade-in-up" style="animation-delay: 0.4s;">
        <div class="flex items-center justify-between mb-8">
            <h2 class="text-3xl font-black text-poodle-900 tracking-tight">모집 중인 프로젝트</h2>
            <a th:href="@{/register}" class="px-6 py-4 bg-poodle-900 text-white rounded-2xl text-xs font-black shadow-xl shadow-poodle-900/10 hover:bg-meatball transition-all flex items-center gap-2">
                <i class="fa-solid fa-plus text-[10px]"></i> 프로젝트 등록
            </a>
        </div>

        <!-- Empty State -->
        <div th:if="${#lists.isEmpty(projects)}" class="py-32 text-center bg-white rounded-[3rem] border border-poodle-50">
            <div class="w-20 h-20 bg-poodle-50 rounded-[1.5rem] flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-dog text-poodle-200 text-3xl animate-tail-wag"></i>
            </div>
            <p class="text-poodle-900 font-black text-xl">등록된 프로젝트가 없습니다.</p>
        </div>

        <div th:unless="${#lists.isEmpty(projects)}" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            <article th:each="project : ${projects}" class="project-card bg-white rounded-[2.5rem] border border-poodle-50 flex flex-col h-full overflow-hidden group hover:border-meatball/10 transition-all shadow-sm hover:shadow-xl">
                <!-- Image Section (Compacted) -->
                <div class="relative h-44 overflow-hidden">
                    <img th:src="${project.thumbnailUrl}" th:alt="${project.title}" src="https://picsum.photos/seed/project/600/400"
                         class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                    <div class="absolute top-4 left-4">
                        <span th:text="${project.deadlineLabel}" class="text-[9px] font-black text-white bg-meatball px-3 py-1 rounded-full shadow-lg">D-14</span>
                    </div>
                </div>

                <div class="p-6 flex flex-col flex-grow">
                    <div class="flex flex-wrap gap-2 mb-4">
                        <span th:text="${project.projectType}" class="px-2.5 py-1 bg-poodle-50 text-poodle-700 rounded-lg text-[9px] font-black border border-poodle-100 uppercase italic">Side Project</span>
                        <span th:text="${project.position}" class="px-2.5 py-1 bg-meatball/5 text-meatball rounded-lg text-[9px] font-black border border-meatball/10 uppercase italic">Backend</span>
                    </div>

                    <h3 th:text="${project.title}" class="text-xl font-black text-poodle-900 mb-2 leading-tight group-hover:text-meatball transition-colors line-clamp-1">프로젝트 제목</h3>
                    <p th:text="${project.summary}" class="text-[11px] text-poodle-400 font-bold leading-relaxed mb-4 line-clamp-2">프로젝트의 핵심 요약 내용이 들어갑니다.</p>

                    <div class="flex flex-wrap gap-1.5 mb-6">
                        <span th:each="techStack : ${project.techStacks}" th:text="${techStack}" class="px-2 py-1 bg-poodle-50 text-poodle-300 rounded-md text-[10px] font-black">Spring Boot</span>
                    </div>

                    <div class="mt-auto pt-4 border-t border-poodle-50">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-[9px] font-black text-poodle-200 uppercase tracking-widest italic">Recruit Status</span>
                            <span class="text-xs font-black text-poodle-900">
                                <span th:text="${project.currentRecruitment}" class="text-meatball">0</span> <span class="text-poodle-100">/</span> <span th:text="${project.totalRecruitment}">0</span>
                            </span>
                        </div>
                        <div class="w-full h-1.5 bg-poodle-50 rounded-full overflow-hidden mb-5">
                            <div class="h-full bg-meatball rounded-full" th:style="'width: ' + (${project.currentRecruitment} * 100 / ${project.totalRecruitment}) + '%'"></div>
                        </div>
                        <a th:href="@{/projects/{id}(id=${project.id})}" class="w-full inline-flex justify-center py-3.5 bg-poodle-900 text-white rounded-xl text-xs font-black hover:bg-meatball transition-all shadow-lg active:scale-95 group/btn">
                            프로젝트 보기 <i class="fa-solid fa-chevron-right ml-1.5 group-hover:translate-x-1 transition-transform"></i>
                        </a>
                    </div>
                </div>
            </article>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/footer :: mainFooter}"></footer>
</body>

</html>
