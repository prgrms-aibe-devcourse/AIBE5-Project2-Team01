<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: commonHead('홈')}"></head>

<body class="text-poodle-900 flex flex-col min-h-screen">
    <header th:replace="~{fragments/header :: mainHeader}"></header>

    <main class="w-full flex-grow mx-auto max-w-7xl px-4 py-12 animate-fade-in-up">
        <!-- Hero Section (Slim Version) -->
        <section
            class="mb-12 relative min-h-[26rem] bg-poodle-100 rounded-[3rem] px-8 md:px-14 py-12 md:py-16 overflow-hidden shadow-[0_28px_70px_rgba(101,55,40,0.12)] border border-white/80 flex items-center">
            <img th:src="@{/img/logo.png}" src="/img/logo.png" alt="Meetball mascot"
                 class="absolute right-[-5rem] md:right-8 bottom-[-3rem] w-[20rem] md:w-[28rem] max-w-none object-contain opacity-20 md:opacity-95 pointer-events-none select-none">

            <div class="relative z-10 max-w-2xl">
                <div
                    class="inline-flex items-center gap-2 px-4 py-2 bg-white/70 backdrop-blur-md rounded-full border border-white text-poodle-600 text-[10px] font-black uppercase tracking-widest mb-6 animate-bounce-subtle">
                    <i class="fa-solid fa-paw text-meatball"></i> Meetball: Smart Matching
                </div>
                <h1 class="text-4xl md:text-6xl font-black text-poodle-600 tracking-tighter mb-5 leading-tight">
                    같이 할 사람,<br>여기서 만나요
                </h1>
                <p
                    class="text-sm md:text-base text-poodle-500 font-bold mb-8 max-w-lg leading-relaxed">
                    밋볼에서 프로젝트 팀원을 찾아보세요. 따뜻한 매칭 흐름으로 나에게 맞는 팀과 더 빨리 만날 수 있습니다.
                </p>
                <a th:href="@{/#projects}"
                    class="group relative inline-flex items-center gap-4 px-10 py-5 bg-poodle-600 text-white rounded-2xl font-black text-lg overflow-hidden shadow-xl shadow-poodle-600/20 hover:bg-meatball hover:text-white hover:scale-105 active:scale-95 transition-all">
                    <span class="relative z-10">밋볼이와 AI로 프로젝트 찾기!</span>
                    <i
                        class="fa-solid fa-arrow-right-long relative z-10 group-hover:translate-x-2 transition-transform duration-300"></i>
                </a>
            </div>
        </section>

        <!-- Search & Filter Section -->
        <section id="projects" class="relative z-20 mb-16 animate-fade-in-up" style="animation-delay: 0.2s;">
            <div class="meetball-card relative z-20 rounded-[3rem] border border-white/80 px-6 py-6 shadow-[0_25px_70px_rgba(101,55,40,0.12)] md:px-8 md:py-8">
                <div class="grid grid-cols-1 gap-4 xl:grid-cols-[minmax(9rem,0.72fr)_minmax(9rem,0.72fr)_minmax(12rem,0.95fr)_minmax(14rem,1.15fr)_minmax(10rem,0.82fr)_auto]">
                    <div class="relative z-30">
                        <button type="button" id="projectPurposeDropdownBtn" onclick="toggleProjectPurposeDropdown()"
                                class="inline-flex w-full items-center justify-between rounded-[1.35rem] border border-poodle-100 bg-white px-5 py-4 text-base font-black text-poodle-700 shadow-sm transition-all hover:border-meatball/20 hover:text-meatball">
                            <span id="projectPurposeSelectedText">목적</span>
                            <i id="projectPurposeDropdownIcon" class="fa-solid fa-chevron-down text-sm text-poodle-200 transition-all duration-300"></i>
                        </button>
                        <div id="projectPurposeDropdownMenu"
                             class="hidden fixed inset-x-4 bottom-4 z-[120] max-h-[72vh] overflow-y-auto rounded-[2.25rem] border border-poodle-100 bg-white p-5 shadow-[0_35px_80px_rgba(101,55,40,0.18)] md:absolute md:inset-x-auto md:bottom-auto md:left-0 md:top-full md:mt-3 md:max-h-[24rem] md:w-[24rem]">
                            <div class="mb-4 flex justify-center md:hidden">
                                <span class="h-1.5 w-12 rounded-full bg-poodle-100"></span>
                            </div>
                            <div class="grid grid-cols-2 gap-3" id="projectPurposeOptionsList">
                                <button type="button" data-project-purpose-option="" onclick="setProjectPurposeFilter('')"
                                        class="rounded-2xl bg-poodle-50 px-4 py-4 text-sm font-black text-poodle-600 transition-all hover:bg-poodle-100">
                                    전체
                                </button>
                                <button th:each="option : ${meetballProjectPurposeOptions}"
                                        type="button"
                                        th:attr="data-project-purpose-option=${option.code}"
                                        onclick="setProjectPurposeFilter(this.dataset.projectPurposeOption)"
                                        class="rounded-2xl bg-poodle-50 px-4 py-4 text-sm font-black text-poodle-600 transition-all hover:bg-poodle-100"
                                        th:text="${option.label}">
                                    프로젝트
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="relative z-30">
                        <button type="button" id="roleDropdownBtn" onclick="toggleRoleDropdown()"
                                class="inline-flex w-full items-center justify-between rounded-[1.35rem] border border-poodle-100 bg-white px-5 py-4 text-base font-black text-poodle-700 shadow-sm transition-all hover:border-meatball/20 hover:text-meatball">
                            <span id="roleSelectedText">포지션</span>
                            <i id="roleDropdownIcon" class="fa-solid fa-chevron-down text-sm text-poodle-200 transition-all duration-300"></i>
                        </button>
                        <div id="roleDropdownMenu"
                             class="hidden fixed inset-x-4 bottom-4 z-[120] max-h-[72vh] overflow-y-auto rounded-[2.25rem] border border-poodle-100 bg-white p-5 shadow-[0_35px_80px_rgba(101,55,40,0.18)] md:absolute md:inset-x-auto md:bottom-auto md:left-0 md:top-full md:mt-3 md:max-h-[24rem] md:w-[24rem]">
                            <div class="mb-4 flex justify-center md:hidden">
                                <span class="h-1.5 w-12 rounded-full bg-poodle-100"></span>
                            </div>
                            <div class="grid grid-cols-2 gap-3 md:grid-cols-2" id="roleOptionsList"></div>
                        </div>
                    </div>

                    <div class="relative z-30">
                        <button type="button" id="techStackMainBtn" onclick="toggleTechStackPanel()"
                                class="inline-flex w-full items-center justify-between rounded-[1.35rem] border border-poodle-100 bg-white px-5 py-4 text-base font-black text-poodle-700 shadow-sm transition-all hover:border-meatball/20 hover:text-meatball">
                            <span id="techStackSelectedText">기술스택</span>
                            <i id="techStackPanelIcon" class="fa-solid fa-chevron-down text-sm text-poodle-200 transition-all duration-300"></i>
                        </button>
                        <div id="techStackPanel"
                             class="hidden fixed inset-x-4 bottom-4 z-[120] max-h-[72vh] overflow-y-auto rounded-[2.25rem] border border-poodle-100 bg-white p-5 shadow-[0_35px_80px_rgba(101,55,40,0.18)] md:absolute md:inset-x-auto md:bottom-auto md:left-0 md:right-auto md:top-full md:mt-3 md:max-h-[28rem] md:w-[min(48rem,calc(100vw-6rem))]">
                            <div class="mb-4 flex justify-center md:hidden">
                                <span class="h-1.5 w-12 rounded-full bg-poodle-100"></span>
                            </div>
                            <div class="flex flex-col gap-4 border-b border-poodle-50 pb-5 lg:flex-row lg:items-start lg:justify-between">
                                <div id="techStackTabs" class="flex flex-wrap gap-3"></div>
                                <div class="flex justify-end shrink-0 lg:min-w-[7.75rem]">
                                    <button id="techStackClearBtn" type="button" onclick="clearTechStackFilter(event)"
                                            class="invisible pointer-events-none opacity-0 inline-flex items-center gap-2 rounded-[1.1rem] border border-poodle-100 bg-white px-4 py-2.5 text-sm font-black text-poodle-500 transition-all hover:text-red-400">
                                        <i class="fa-solid fa-rotate-left text-xs"></i>
                                        초기화
                                    </button>
                                </div>
                            </div>
                            <div id="techStackFilterOptions" class="mt-5 flex flex-wrap gap-4"></div>
                        </div>
                    </div>

                    <label class="flex items-center gap-3 rounded-[1.35rem] border border-poodle-100 bg-white px-4 py-4 shadow-sm transition-all focus-within:border-meatball/30 focus-within:shadow-lg">
                        <i class="fa-solid fa-magnifying-glass text-2xl text-poodle-200"></i>
                        <input type="text" id="keywordInput" placeholder="제목 또는 설명 검색"
                               class="w-full border-none bg-transparent text-base font-black text-poodle-700 placeholder:text-poodle-200 focus:outline-none">
                    </label>

                    <button type="button" id="bookmarkedFilterBtn" onclick="toggleBookmarkedOnly()"
                            class="inline-flex h-full min-h-[4rem] items-center justify-center rounded-[1.35rem] border border-poodle-100 bg-poodle-50 px-5 py-4 text-base font-black text-poodle-600 shadow-sm transition-all hover:border-meatball/20 hover:bg-white hover:text-meatball">
                        관심 프로젝트
                    </button>

                    <div class="hidden items-center justify-center rounded-[1.35rem] border border-poodle-100 bg-white p-1 shadow-sm md:flex">
                        <button type="button" id="btn-grid" onclick="setViewMode('grid')"
                                class="view-btn active inline-flex h-12 w-14 items-center justify-center rounded-[1rem] bg-poodle-600 text-white transition-all">
                            <i class="fa-solid fa-table-cells-large text-2xl"></i>
                        </button>
                        <button type="button" id="btn-list" onclick="setViewMode('list')"
                                class="view-btn inline-flex h-12 w-14 items-center justify-center rounded-[1rem] text-poodle-300 transition-all hover:text-meatball">
                            <i class="fa-solid fa-list text-2xl"></i>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Project List (Slim Cards) -->
        <section class="mb-24 animate-fade-in-up" style="animation-delay: 0.4s;">
            <p id="projectCountSummary" class="sr-only">최신등록순으로 프로젝트를 불러오는 중입니다.</p>

            <!-- Project Container (Dynamic via JS) -->
            <div id="projectContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Project Cards will be injected here -->
            </div>

            <!-- Pagination Controls -->
            <div class="mt-12 flex items-center justify-center gap-4" id="paginationContainer">
            </div>
        </section>
    </main>

    <footer th:replace="~{fragments/footer :: mainFooter}"></footer>

    <script th:inline="javascript">
        const escapeHtml = window.meetballEscapeHtml;
        const safeUrl = window.meetballSafeUrl;
        const HOME_LOGGED_IN = Boolean(/*[[${isLoggedIn}]]*/ false);
        const HOME_PAGE_SIZE = 6;
        const MOBILE_MEDIA_QUERY = window.matchMedia('(max-width: 767px)');

        let filterState = {
            keyword: '',
            projectPurpose: '',
            bookmarkedOnly: false,
            position: '',
            techStacks: [],
            viewMode: 'grid',
            page: 0
        };
        let activeTechCategory = '모두보기';
        let searchDebounceTimer = null;
        let activeFetchToken = 0;
        let currentProjects = [];
        let currentPageData = null;

        function normalizeViewMode(mode) {
            if (MOBILE_MEDIA_QUERY.matches) {
                return 'grid';
            }
            return mode === 'list' ? 'list' : 'grid';
        }

        function buildFilterUrl(state = filterState) {
            const params = new URLSearchParams();
            if (state.keyword) params.set('keyword', state.keyword);
            if (state.projectPurpose) params.set('projectPurpose', state.projectPurpose);
            if (state.bookmarkedOnly) params.set('bookmarkedOnly', 'true');
            if (state.position) params.set('position', state.position);
            if (state.techStacks.length) params.set('techStack', state.techStacks.join(','));
            const normalizedViewMode = normalizeViewMode(state.viewMode);
            if (normalizedViewMode === 'list') params.set('view', 'list');
            if (state.page > 0) params.set('page', String(state.page));
            const queryString = params.toString();
            return queryString ? `${window.location.pathname}?${queryString}` : window.location.pathname;
        }

        function syncUrlWithFilterState() {
            window.history.replaceState({}, '', buildFilterUrl());
        }

        function hydrateFilterStateFromUrl() {
            const params = new URLSearchParams(window.location.search);
            filterState.keyword = params.get('keyword') || '';
            filterState.projectPurpose = params.get('projectPurpose') || '';
            filterState.bookmarkedOnly = HOME_LOGGED_IN && params.get('bookmarkedOnly') === 'true';
            filterState.position = params.get('position') || '';
            filterState.techStacks = (params.get('techStack') || '')
                .split(',')
                .map(value => value.trim())
                .filter(Boolean);
            filterState.viewMode = normalizeViewMode(params.get('view') || 'grid');
            filterState.page = Math.max(Number(params.get('page') || 0) || 0, 0);

            const keywordInput = document.getElementById('keywordInput');
            if (keywordInput) {
                keywordInput.value = filterState.keyword;
            }
        }

        function syncBookmarkedButton() {
            const button = document.getElementById('bookmarkedFilterBtn');
            if (!button) return;
            const isActive = filterState.bookmarkedOnly;
            button.classList.toggle('bg-poodle-600', isActive);
            button.classList.toggle('text-white', isActive);
            button.classList.toggle('border-transparent', isActive);
            button.classList.toggle('shadow-lg', isActive);
            button.classList.toggle('shadow-poodle-600/15', isActive);
            button.classList.toggle('hover:bg-meatball', isActive);
            button.classList.toggle('hover:text-white', isActive);

            button.classList.toggle('bg-poodle-50', !isActive);
            button.classList.toggle('text-poodle-600', !isActive);
            button.classList.toggle('border-poodle-100', !isActive);
            button.classList.toggle('shadow-sm', !isActive);
            button.classList.toggle('hover:border-meatball/20', !isActive);
            button.classList.toggle('hover:bg-white', !isActive);
            button.classList.toggle('hover:text-meatball', !isActive);
        }

        function updateProjectPurposeButtonLabel() {
            const selectedText = document.getElementById('projectPurposeSelectedText');
            if (!selectedText) return;
            if (!filterState.projectPurpose) {
                selectedText.textContent = '목적';
                return;
            }
            const activeButton = Array.from(document.querySelectorAll('[data-project-purpose-option]'))
                .find(button => button.dataset.projectPurposeOption === filterState.projectPurpose);
            selectedText.textContent = activeButton?.textContent?.trim() || '목적';
        }

        function updatePositionButtonLabel() {
            const selectedText = document.getElementById('roleSelectedText');
            if (selectedText) {
                selectedText.textContent = filterState.position || '포지션';
            }
        }

        function updateTechStackButtonLabel() {
            const selectedText = document.getElementById('techStackSelectedText');
            if (!selectedText) return;
            if (filterState.techStacks.length === 0) {
                selectedText.textContent = '기술스택';
                return;
            }
            if (filterState.techStacks.length === 1) {
                selectedText.textContent = filterState.techStacks[0];
                return;
            }
            selectedText.textContent = `${filterState.techStacks[0]} 외 ${filterState.techStacks.length - 1}`;
        }

        function setProjectPurposeFilter(value, { skipFetch = false } = {}) {
            filterState.projectPurpose = value;
            filterState.page = 0;
            const purposeOptions = document.querySelectorAll('[data-project-purpose-option]');
            purposeOptions.forEach(button => {
                const isActive = button.dataset.projectPurposeOption === value || (value === '' && button.dataset.projectPurposeOption === '');
                button.classList.toggle('bg-poodle-600', isActive);
                button.classList.toggle('text-white', isActive);
                button.classList.toggle('shadow-lg', isActive);
                button.classList.toggle('shadow-poodle-600/10', isActive);
                button.classList.toggle('bg-poodle-50', !isActive);
                button.classList.toggle('text-poodle-600', !isActive);
            });
            updateProjectPurposeButtonLabel();
            closeProjectPurposeDropdown();
            if (!skipFetch) {
                fetchProjects(0);
            }
        }

        function toggleProjectPurposeDropdown() {
            const menu = document.getElementById('projectPurposeDropdownMenu');
            const icon = document.getElementById('projectPurposeDropdownIcon');
            if (!menu) return;
            const nextOpen = menu.classList.contains('hidden');
            menu.classList.toggle('hidden');
            icon?.classList.toggle('rotate-180', nextOpen);
        }

        function closeProjectPurposeDropdown() {
            document.getElementById('projectPurposeDropdownMenu')?.classList.add('hidden');
            document.getElementById('projectPurposeDropdownIcon')?.classList.remove('rotate-180');
        }

        function toggleBookmarkedOnly() {
            if (!HOME_LOGGED_IN) {
                const targetUrl = buildFilterUrl({ ...filterState, bookmarkedOnly: true, page: 0 });
                openLoginRequiredModal(targetUrl);
                return;
            }
            filterState.bookmarkedOnly = !filterState.bookmarkedOnly;
            filterState.page = 0;
            syncBookmarkedButton();
            fetchProjects(0);
        }

        function handleKeywordInput() {
            filterState.keyword = document.getElementById('keywordInput')?.value.trim() || '';
            filterState.page = 0;
            window.clearTimeout(searchDebounceTimer);
            searchDebounceTimer = window.setTimeout(() => fetchProjects(0), 250);
        }

        function setPositionFilter(value, { skipFetch = false } = {}) {
            filterState.position = value;
            filterState.page = 0;
            const roleOptions = document.querySelectorAll('[data-role-option]');
            roleOptions.forEach(button => {
                const isActive = button.dataset.roleOption === value || (value === '' && button.dataset.roleOption === '');
                button.classList.toggle('bg-poodle-600', isActive);
                button.classList.toggle('text-white', isActive);
                button.classList.toggle('shadow-lg', isActive);
                button.classList.toggle('shadow-poodle-600/10', isActive);
                button.classList.toggle('bg-poodle-50', !isActive);
                button.classList.toggle('text-poodle-600', !isActive);
            });
            updatePositionButtonLabel();
            closeRoleDropdown();
            if (!skipFetch) {
                fetchProjects(0);
            }
        }

        function toggleTechStackPanel() {
            const panel = document.getElementById('techStackPanel');
            const icon = document.getElementById('techStackPanelIcon');
            if (!panel) return;
            const nextOpen = panel.classList.contains('hidden');
            panel.classList.toggle('hidden');
            icon?.classList.toggle('rotate-180', nextOpen);
        }

        function toggleRoleDropdown() {
            const menu = document.getElementById('roleDropdownMenu');
            const icon = document.getElementById('roleDropdownIcon');
            if (!menu) return;
            const nextOpen = menu.classList.contains('hidden');
            menu.classList.toggle('hidden');
            icon?.classList.toggle('rotate-180', nextOpen);
        }

        function closeRoleDropdown() {
            document.getElementById('roleDropdownMenu')?.classList.add('hidden');
            document.getElementById('roleDropdownIcon')?.classList.remove('rotate-180');
        }

        function closeTechStackPanel() {
            document.getElementById('techStackPanel')?.classList.add('hidden');
            document.getElementById('techStackPanelIcon')?.classList.remove('rotate-180');
        }

        function setTechCategory(event, category) {
            event?.preventDefault();
            event?.stopPropagation();
            activeTechCategory = category;
            renderTechStackFilter();
        }

        function toggleTechStackFilter(event, tech) {
            event?.preventDefault();
            event?.stopPropagation();
            const index = filterState.techStacks.indexOf(tech);
            if (index >= 0) {
                filterState.techStacks.splice(index, 1);
            } else {
                filterState.techStacks.push(tech);
            }
            filterState.page = 0;
            renderTechStackFilter();
            updateTechStackButtonLabel();
            fetchProjects(0);
        }

        function clearTechStackFilter(event) {
            event?.preventDefault();
            event?.stopPropagation();
            filterState.techStacks = [];
            filterState.page = 0;
            renderTechStackFilter();
            updateTechStackButtonLabel();
            fetchProjects(0);
        }

        function initPositionFilter() {
            const list = document.getElementById('roleOptionsList');
            if (!list) return;
            list.innerHTML = [
                `<button type="button" data-role-option="" onclick="setPositionFilter('')" class="rounded-2xl bg-poodle-600 px-4 py-4 text-sm font-black text-white shadow-lg shadow-poodle-600/10 transition-all">전체</button>`,
                ...window.meetballPositionOptions.map(position => `
                    <button type="button" data-role-option="${escapeHtml(position)}" onclick="setPositionFilter('${escapeHtml(position)}')" class="rounded-2xl bg-poodle-50 px-4 py-4 text-sm font-black text-poodle-600 transition-all hover:bg-poodle-100">
                        ${escapeHtml(position)}
                    </button>
                `)
            ].join('');
            setPositionFilter(filterState.position, { skipFetch: true });
        }

        function initProjectPurposeFilter() {
            setProjectPurposeFilter(filterState.projectPurpose, { skipFetch: true });
        }

        function renderTechStackFilter() {
            const tabs = document.getElementById('techStackTabs');
            const options = document.getElementById('techStackFilterOptions');
            const clearBtn = document.getElementById('techStackClearBtn');
            if (!tabs || !options || !clearBtn) return;

            const orderedCategories = ['모두보기', '인기', '프론트엔드', '백엔드', '모바일', '기타']
                .filter(category => Object.prototype.hasOwnProperty.call(window.meetballTechStackCategories, category));

            tabs.innerHTML = orderedCategories.map(category => {
                const active = category === activeTechCategory;
                return `<button type="button" onclick="setTechCategory(event, '${escapeHtml(category)}')"
                                class="rounded-[1.2rem] px-5 py-3 text-sm font-black transition-all ${active ? 'bg-poodle-600 text-white shadow-lg shadow-poodle-600/10' : 'text-poodle-400 hover:bg-poodle-50 hover:text-poodle-700'}">${escapeHtml(category)}</button>`;
            }).join('');

            const visibleTechs = window.meetballTechStackCategories[activeTechCategory] || window.meetballTechStackOptions;
            options.innerHTML = visibleTechs.map(tech => {
                const selected = filterState.techStacks.includes(tech);
                return `<button type="button" onclick="toggleTechStackFilter(event, '${escapeHtml(tech)}')" class="tech-filter-option">${window.meetballTechStackChipHtml(tech, { selected })}</button>`;
            }).join('');

            const hasSelectedTechStacks = filterState.techStacks.length > 0;
            clearBtn.classList.toggle('invisible', !hasSelectedTechStacks);
            clearBtn.classList.toggle('opacity-0', !hasSelectedTechStacks);
            clearBtn.classList.toggle('pointer-events-none', !hasSelectedTechStacks);
        }

        function setViewMode(mode) {
            filterState.viewMode = normalizeViewMode(mode);
            updateViewButtons();
            renderProjects(currentProjects);
            syncUrlWithFilterState();
        }

        function updateViewButtons() {
            filterState.viewMode = normalizeViewMode(filterState.viewMode);
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-poodle-600', 'text-white');
                btn.classList.add('text-poodle-300');
            });
            const activeBtn = document.getElementById(filterState.viewMode === 'grid' ? 'btn-grid' : 'btn-list');
            if (activeBtn) {
                activeBtn.classList.add('active', 'bg-poodle-600', 'text-white');
                activeBtn.classList.remove('text-poodle-300');
            }
        }

        async function fetchProjects(page = filterState.page) {
            filterState.page = page;
            filterState.viewMode = normalizeViewMode(filterState.viewMode);
            syncUrlWithFilterState();

            const requestToken = ++activeFetchToken;
            try {
                const query = new URLSearchParams({
                    page: String(filterState.page),
                    size: String(HOME_PAGE_SIZE),
                    keyword: filterState.keyword,
                    projectPurpose: filterState.projectPurpose,
                    position: filterState.position,
                    techStack: filterState.techStacks.join(','),
                    bookmarkedOnly: String(filterState.bookmarkedOnly)
                }).toString();

                const res = await fetch(`/api/projects?${query}`);
                if (!res.ok) throw new Error('API fetch error');
                const data = await res.json();
                if (requestToken !== activeFetchToken) return;

                currentProjects = data.content || [];
                currentPageData = data;
                renderProjects(currentProjects);
                renderPagination(data);
            } catch (error) {
                console.error('Error fetching projects:', error);
            }
        }

        async function toggleHomeBookmark(event, projectId) {
            event?.preventDefault();
            event?.stopPropagation();
            if (!projectId) return;

            if (!HOME_LOGGED_IN) {
                openLoginRequiredModal(window.location.pathname + window.location.search);
                return;
            }

            try {
                const res = await window.meetballFetch(`/api/projects/${encodeURIComponent(projectId)}/bookmarks`, { method: 'POST' });
                if (!res.ok) throw new Error('Bookmark toggle failed');
                updateHomeBookmark(projectId, await res.json());
            } catch (error) {
                console.error('Bookmark toggle error:', error);
                await meetballAlert('관심 프로젝트 변경에 실패했습니다.', { type: 'error' });
            }
        }

        function updateHomeBookmark(projectId, data) {
            const domProjectId = String(projectId).replace(/[^0-9A-Za-z_-]/g, '');
            const isBookmarked = Boolean(data.bookmarked ?? data.isBookmarked);
            const count = Number(data.totalBookmarks ?? data.bookmarkCount ?? 0);
            const countNode = document.getElementById(`homeBookmarkCount-${domProjectId}`);
            const icon = document.getElementById(`homeBookmarkIcon-${domProjectId}`);
            const button = document.getElementById(`homeBookmarkButton-${domProjectId}`);

            if (countNode) countNode.textContent = String(count);
            if (icon) {
                icon.classList.toggle('fa-solid', isBookmarked);
                icon.classList.toggle('fa-regular', !isBookmarked);
                icon.classList.toggle('text-meatball', isBookmarked);
            }
            if (button) {
                button.classList.toggle('text-meatball', isBookmarked);
                button.classList.toggle('bg-white', isBookmarked);
                button.classList.toggle('border-meatball/20', isBookmarked);
                button.classList.toggle('text-poodle-300', !isBookmarked);
                button.classList.toggle('bg-poodle-50', !isBookmarked);
                button.classList.toggle('border-poodle-100', !isBookmarked);
            }
        }

        function renderProjects(projects) {
            const container = document.getElementById('projectContainer');
            const countSummary = document.getElementById('projectCountSummary');
            const totalElements = Number(currentPageData?.totalElements ?? projects?.length ?? 0);
            if (countSummary) {
                countSummary.textContent = totalElements > 0
                    ? `최신등록순 · ${totalElements.toLocaleString('ko-KR')}개의 프로젝트`
                    : filterState.bookmarkedOnly
                        ? '관심 프로젝트 조건에 맞는 결과가 없습니다.'
                        : '조건에 맞는 프로젝트가 없습니다.';
            }
            if (!projects || projects.length === 0) {
                container.className = 'block';
                container.innerHTML = `
                <div class="flex flex-col items-center justify-center py-24 text-center animate-fade-in w-full bg-white rounded-[3rem] border border-poodle-50 shadow-sm">
                    <div class="relative mb-8">
                        <div class="w-32 h-32 bg-poodle-50 rounded-[2rem] flex items-center justify-center relative z-10 border-2 border-dashed border-poodle-100">
                            <img src="/img/meetball.png" alt="" class="w-20 h-20 object-contain opacity-80">
                        </div>
                        <div class="absolute inset-0 bg-poodle-100/30 rounded-full blur-3xl -z-10"></div>
                    </div>
                    <div class="space-y-2">
                        <h3 class="text-xl font-black text-poodle-900 tracking-tight">${filterState.bookmarkedOnly ? '관심 프로젝트가 아직 없어요.' : '아직 조건에 맞는 프로젝트가 없어요.'}</h3>
                        <p class="text-xs font-bold text-poodle-300 leading-relaxed">
                            ${filterState.bookmarkedOnly
                                ? '관심 프로젝트로 담은 프로젝트가 없거나 조건과 함께 맞는 결과가 없습니다.<br>프로젝트를 둘러보고 하트를 눌러 담아보세요.'
                                : '조건에 맞는 프로젝트를 찾지 못했습니다.<br>새로운 프로젝트를 직접 만들어볼까요?'}
                        </p>
                    </div>
                    <div class="mt-8">
                        <a href="/register" class="inline-flex items-center gap-2 px-6 py-3 bg-poodle-900 text-white rounded-xl font-black text-xs hover:bg-meatball transition-all active:scale-95">
                            <i class="fa-solid fa-plus"></i> 프로젝트 생성하기
                        </a>
                    </div>
                </div>`;
                return;
            }

            container.className = filterState.viewMode === 'list'
                ? 'grid grid-cols-1 gap-5'
                : 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8';
            container.innerHTML = projects.map(p => {
                const currentRecruit = Number(p.currentRecruitment || 0);
                const totalRecruit = Number(p.totalRecruitment || 0);
                const percentage = totalRecruit > 0 ? Math.min(100, Math.max(0, currentRecruit * 100 / totalRecruit)) : 0;
                const title = escapeHtml(p.title || '프로젝트 제목 없음');
                const rawProjectId = String(p.id ?? '');
                const projectId = encodeURIComponent(rawProjectId);
                const domProjectId = rawProjectId.replace(/[^0-9A-Za-z_-]/g, '');
                const thumbnailUrl = safeUrl(p.thumbnailUrl, '/img/meetball.png');
                const deadlineLabel = escapeHtml(p.deadlineLabel || '-');
                const projectPurpose = escapeHtml(p.projectPurpose || '');
                const position = escapeHtml(formatPositionSummary(p.position));
                const summary = escapeHtml(p.summary || '');
                const readCount = Number(p.readCount ?? 0);
                const bookmarkCount = Number(p.bookmarkCount ?? p.totalBookmarks ?? 0);
                const isBookmarked = Boolean(p.bookmarked ?? p.isBookmarked);
                const bookmarkButtonClass = isBookmarked
                    ? 'bg-white text-meatball border-meatball/20'
                    : 'bg-poodle-50 text-poodle-300 border-poodle-100';
                const bookmarkIconClass = isBookmarked ? 'fa-solid text-meatball' : 'fa-regular';
                const projectMetrics = `
                    <div class="flex items-center gap-4 text-[10px] font-black text-poodle-300">
                        <span class="inline-flex items-center gap-1.5">
                            <i class="fa-regular fa-eye"></i>
                            <span>${readCount}</span>
                        </span>
                        <span class="inline-flex items-center gap-1.5">
                            <i class="fa-regular fa-heart"></i>
                            <span id="homeBookmarkCount-${domProjectId}">${bookmarkCount}</span>
                        </span>
                    </div>`;
                const bookmarkButton = `
                    <button type="button" id="homeBookmarkButton-${domProjectId}" onclick="toggleHomeBookmark(event, '${domProjectId}')"
                            class="inline-flex w-10 h-10 items-center justify-center rounded-xl border ${bookmarkButtonClass} hover:bg-white hover:text-meatball transition-all active:scale-95"
                            aria-label="찜하기">
                        <i id="homeBookmarkIcon-${domProjectId}" class="fa-heart ${bookmarkIconClass}"></i>
                    </button>`;

                // 기술 스택 (Array 처리)
	                const techBadges = (p.techStacks || []).map(tech =>
	                    window.meetballTechStackChipHtml(tech, {
	                        className: 'inline-flex items-center gap-2 px-2.5 py-1.5 rounded-full border text-[10px] font-black'
	                    })
	                ).join('');

                if (filterState.viewMode === 'list') {
                    return `
            <article class="project-card bg-white rounded-[2rem] border border-poodle-50 overflow-hidden group hover:border-meatball/10 transition-all shadow-sm hover:shadow-xl">
                <div class="grid grid-cols-1 md:grid-cols-[15rem_1fr_auto] gap-0 md:gap-6 items-stretch">
                    <a href="/projects/${projectId}" class="relative h-48 md:h-full min-h-[12rem] overflow-hidden bg-poodle-50">
                        <img src="${escapeHtml(thumbnailUrl)}" alt="${title}"
                             class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                        <span class="absolute top-4 left-4 text-[9px] font-black text-poodle-900 bg-meatball px-3 py-1 rounded-full shadow-lg">${deadlineLabel}</span>
                    </a>
                    <div class="p-6 md:p-7 flex flex-col justify-between gap-5">
                        <div>
                            <div class="flex flex-wrap gap-2 mb-3">
                                <span class="px-2.5 py-1 bg-poodle-50 text-poodle-700 rounded-lg text-[9px] font-black border border-poodle-100 uppercase italic">${projectPurpose}</span>
                                <span class="px-2.5 py-1 bg-meatball/5 text-meatball rounded-lg text-[9px] font-black border border-meatball/10 uppercase italic">${position}</span>
                            </div>
                            <h3 class="text-2xl font-black text-poodle-900 mb-2 leading-tight group-hover:text-meatball transition-colors">${title}</h3>
                            <p class="text-sm text-poodle-400 font-bold leading-relaxed line-clamp-2">${summary}</p>
                        </div>
                        <div class="space-y-4">
                            <div class="flex flex-wrap gap-1.5">${techBadges}</div>
                            ${projectMetrics}
                        </div>
                    </div>
                    <div class="p-6 md:p-7 md:w-56 flex md:flex-col items-center md:items-stretch justify-between gap-5 border-t md:border-t-0 md:border-l border-poodle-50">
                        <div class="w-full">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-[9px] font-black text-poodle-200 uppercase tracking-widest italic">Recruit</span>
                                <span class="text-xs font-black text-poodle-900"><span class="text-meatball">${currentRecruit}</span> / ${totalRecruit}</span>
                            </div>
                            <div class="w-full h-1.5 bg-poodle-50 rounded-full overflow-hidden">
                                <div class="h-full bg-meatball rounded-full" style="width: ${percentage}%"></div>
                            </div>
                        </div>
                        <div class="shrink-0 flex items-center gap-2">
                            ${bookmarkButton}
                            <a href="/projects/${projectId}" class="inline-flex justify-center py-3.5 px-5 bg-poodle-600 text-white rounded-xl text-xs font-black hover:bg-meatball hover:text-poodle-900 transition-all shadow-lg active:scale-95">
                                보기 <i class="fa-solid fa-chevron-right ml-1.5"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </article>`;
                }

                return `
            <article class="project-card bg-white rounded-[2.5rem] border border-poodle-50 flex flex-col h-full overflow-hidden group hover:border-meatball/10 transition-all shadow-sm hover:shadow-xl">
                <!-- Image Section -->
                <div class="relative h-44 overflow-hidden">
                    <img src="${escapeHtml(thumbnailUrl)}" alt="${title}"
                         class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                    <div class="absolute top-4 left-4">
                        <span class="text-[9px] font-black text-poodle-900 bg-meatball px-3 py-1 rounded-full shadow-lg">${deadlineLabel}</span>
                    </div>
                    <div class="absolute top-4 right-4">
                        ${bookmarkButton}
                    </div>
                </div>

                <div class="p-6 flex flex-col flex-grow">
                    <div class="flex flex-wrap gap-2 mb-4">
                        <span class="px-2.5 py-1 bg-poodle-50 text-poodle-700 rounded-lg text-[9px] font-black border border-poodle-100 uppercase italic">${projectPurpose}</span>
                        <span class="px-2.5 py-1 bg-meatball/5 text-meatball rounded-lg text-[9px] font-black border border-meatball/10 uppercase italic">${position}</span>
                    </div>

                    <h3 class="text-xl font-black text-poodle-900 mb-2 leading-tight group-hover:text-meatball transition-colors line-clamp-1">${title}</h3>
                    <p class="text-[11px] text-poodle-400 font-bold leading-relaxed mb-4 line-clamp-2">${summary}</p>

                    <div class="flex flex-wrap gap-1.5 mb-6">
                        ${techBadges}
                    </div>
                    <div class="mb-5">
                        ${projectMetrics}
                    </div>

                    <div class="mt-auto pt-4 border-t border-poodle-50">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-[9px] font-black text-poodle-200 uppercase tracking-widest italic">Recruit Status</span>
                            <span class="text-xs font-black text-poodle-900">
                                <span class="text-meatball">${currentRecruit}</span> <span class="text-poodle-100">/</span> <span>${totalRecruit}</span>
                            </span>
                        </div>
                        <div class="w-full h-1.5 bg-poodle-50 rounded-full overflow-hidden mb-5">
                            <div class="h-full bg-meatball rounded-full" style="width: ${percentage}%"></div>
                        </div>
                        <a href="/projects/${projectId}" class="w-full inline-flex justify-center py-3.5 bg-poodle-600 text-white rounded-xl text-xs font-black hover:bg-meatball hover:text-poodle-900 transition-all shadow-lg active:scale-95 group/btn">
                            프로젝트 보기 <i class="fa-solid fa-chevron-right ml-1.5 group-hover:translate-x-1 transition-transform"></i>
                        </a>
                    </div>
                </div>
            </article>`;
            }).join('');
        }

        function formatPositionSummary(value) {
            const positions = String(value || '')
                .split(',')
                .map(token => token.split(':')[0].trim())
                .filter(Boolean);
            return positions.length ? positions.join(', ') : '미지정';
        }

        function renderPagination(pageData) {
            const wrap = document.getElementById('paginationContainer');
            if (pageData.totalPages <= 1) {
                wrap.innerHTML = '';
                return;
            }

            let html = '';
            html += `<button onclick="fetchProjects(${pageData.number - 1})" ${pageData.first ? 'disabled' : ''} class="w-10 h-10 flex items-center justify-center rounded-2xl bg-white border border-poodle-100 text-poodle-400 hover:text-meatball hover:border-meatball transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                     <i class="fa-solid fa-chevron-left text-xs"></i>
                 </button>`;

            for (let i = 0; i < pageData.totalPages; i++) {
                if (i === pageData.number) {
                    html += `<button class="w-10 h-10 flex items-center justify-center rounded-2xl bg-meatball text-poodle-900 font-black shadow-lg shadow-meatball/20 transition-all">${i + 1}</button>`;
                } else {
                    html += `<button onclick="fetchProjects(${i})" class="w-10 h-10 flex items-center justify-center rounded-2xl bg-white border border-poodle-100 text-poodle-400 hover:text-poodle-900 transition-all font-black">${i + 1}</button>`;
                }
            }

            html += `<button onclick="fetchProjects(${pageData.number + 1})" ${pageData.last ? 'disabled' : ''} class="w-10 h-10 flex items-center justify-center rounded-2xl bg-white border border-poodle-100 text-poodle-400 hover:text-meatball hover:border-meatball transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                     <i class="fa-solid fa-chevron-right text-xs"></i>
                 </button>`;

            wrap.innerHTML = html;
        }

        function handleViewportChange() {
            filterState.viewMode = normalizeViewMode(filterState.viewMode);
            updateViewButtons();
            if (currentProjects.length > 0) {
                renderProjects(currentProjects);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            hydrateFilterStateFromUrl();
            initProjectPurposeFilter();
            initPositionFilter();
            renderTechStackFilter();
            updateProjectPurposeButtonLabel();
            updateTechStackButtonLabel();
            syncBookmarkedButton();
            updateViewButtons();

            const keywordInput = document.getElementById('keywordInput');
            keywordInput?.addEventListener('input', handleKeywordInput);

            fetchProjects(filterState.page);
        });

        MOBILE_MEDIA_QUERY.addEventListener('change', handleViewportChange);

        document.addEventListener('click', event => {
            if (!event.target.closest('#projectPurposeDropdownBtn') && !event.target.closest('#projectPurposeDropdownMenu')) {
                closeProjectPurposeDropdown();
            }
            if (!event.target.closest('#roleDropdownBtn') && !event.target.closest('#roleDropdownMenu')) {
                closeRoleDropdown();
            }
            if (!event.target.closest('#techStackMainBtn') && !event.target.closest('#techStackPanel')) {
                closeTechStackPanel();
            }
        });
    </script>
</body>

</html>
