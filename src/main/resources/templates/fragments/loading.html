<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="globalLoading" id="global-loader" class="fixed inset-0 z-[9999] show flex items-center justify-center pointer-events-none opacity-0 transition-opacity duration-500">
        <!-- Backdrop with high-end blur -->
        <div class="absolute inset-0 bg-white/80 backdrop-blur-xl"></div>
        
        <!-- Content Container -->
        <div class="relative flex flex-col items-center gap-8">
            <!-- Animation Stage -->
            <div class="relative w-48 h-48 flex items-center justify-center">
                <!-- Poodle-Meatball Character Image -->
                <div class="relative animate-poodle-bounce">
                    <img th:src="@{/img/meetball.png}" src="/img/meetball.png" 
                         alt="Loading meetball" class="w-32 h-32 object-contain drop-shadow-2xl">
                </div>
                
                <!-- Ground Shadow -->
                <div class="absolute bottom-6 w-20 h-3 bg-poodle-900/10 rounded-full blur-md animate-shadow-scale"></div>
            </div>

            <!-- Loading Text -->
            <div class="text-center space-y-2">
                <h3 class="text-2xl font-black text-poodle-900 tracking-tighter italic">MEETBALL!</h3>
                <p class="text-[11px] font-black text-poodle-300 animate-pulse tracking-widest">밋볼이가 찾는 중이에요...</p>
            </div>

            <!-- Custom Progress Bar -->
            <div class="w-56 h-2 bg-poodle-50 rounded-full overflow-hidden shadow-inner border border-poodle-100">
                <div class="h-full bg-meatball w-0 animate-progress-load rounded-full shadow-[0_0_10px_rgba(255,107,53,0.4)]"></div>
            </div>
        </div>

        <style>
            @keyframes poodle-bounce {
                0%, 100% { transform: translateY(-50px) scaleX(1) scaleY(1); }
                45% { transform: translateY(10px) scaleX(1.05) scaleY(0.95); }
                50% { transform: translateY(20px) scaleX(1.2) scaleY(0.8); } /* 착지 시 찌그러짐 */
                55% { transform: translateY(10px) scaleX(1.05) scaleY(0.95); }
            }
            @keyframes shadow-scale {
                0%, 100% { transform: scale(0.6); opacity: 0.2; }
                50% { transform: scale(1.2); opacity: 0.5; }
            }
            .animate-poodle-bounce {
                animation: poodle-bounce 0.9s infinite cubic-bezier(0.45, 0, 0.55, 1);
            }
            .animate-shadow-scale {
                animation: shadow-scale 0.9s infinite cubic-bezier(0.45, 0, 0.55, 1);
            }
            @keyframes progress-load {
                0% { width: 0%; }
                50% { width: 70%; }
                100% { width: 100%; }
            }
            .animate-progress-load {
                animation: progress-load 2s infinite ease-in-out;
            }
            #global-loader.show {
                opacity: 1;
                pointer-events: auto;
            }
        </style>
    </div>
</body>
</html>
