<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
</head>
<body>
    <header th:fragment="mainHeader" class="sticky top-0 z-50 bg-white/70 backdrop-blur-xl border-b border-white/20 transition-all shadow-sm">
        <div class="container mx-auto px-4 h-20 flex items-center justify-between">
            <!-- Logo area -->
            <div class="flex items-center gap-12">
                <a th:href="@{/}" class="flex items-center gap-3 cursor-pointer select-none group">
                    <div class="relative">
                        <img th:src="@{/img/logo.png}" src="https://api.dicebear.com/7.x/adventurer/svg?seed=poodle" alt="Meetball" 
                             class="w-11 h-11 rounded-2xl object-cover shadow-poodle-100 shadow-xl group-hover:scale-105 group-hover:rotate-[-5deg] transition-all duration-500">
                        <div class="absolute -top-1 -right-1 w-3.5 h-3.5 bg-meatball rounded-full border-2 border-white animate-bounce-subtle"></div>
                    </div>
                    <span class="text-2xl font-black tracking-tighter text-poodle-900 group-hover:text-meatball transition-colors">Meetball</span>
                </a>

                <!-- Desktop Menu -->
                <nav class="hidden lg:flex items-center gap-8">
                    <a th:href="@{/projects}" class="text-sm font-black text-poodle-300 hover:text-poodle-900 transition-all relative group/nav">
                        탐색하기
                        <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-meatball transition-all group-hover/nav:w-full"></span>
                    </a>
                    <a th:href="@{/register}" class="text-sm font-black text-poodle-300 hover:text-poodle-900 transition-all relative group/nav">
                        프로젝트 등록
                        <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-meatball transition-all group-hover/nav:w-full"></span>
                    </a>
                    <a th:href="@{/user/mypage}" class="text-sm font-black text-poodle-300 hover:text-poodle-900 transition-all relative group/nav">
                        나의 프로젝트
                        <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-meatball transition-all group-hover/nav:w-full"></span>
                    </a>
                </nav>
            </div>

            <!-- Right Actions -->
            <div class="flex items-center gap-6">
                <!-- Notifications (Optional Icon) -->
                <button class="w-10 h-10 flex items-center justify-center text-poodle-300 hover:text-poodle-900 transition-colors relative">
                    <i class="fa-regular fa-bell text-lg"></i>
                    <span class="absolute top-2 right-2 w-1.5 h-1.5 bg-meatball rounded-full"></span>
                </button>

                <!-- User Profile / Login Button -->
                <div class="relative group h-full flex items-center">
                    <!-- Case: Logged In -->
                    <div th:if="${session.userId != null}" class="flex items-center gap-3 pl-6 border-l border-poodle-100 py-2 cursor-pointer transition-all group-hover:bg-poodle-50/50 group-hover:px-4 group-hover:-mx-4 rounded-2xl">
                        <div class="relative">
                            <img th:src="'https://api.dicebear.com/7.x/adventurer/svg?seed=' + ${session.userNickname}" alt="Profile"
                                 class="w-10 h-10 rounded-2xl border-2 border-poodle-50 bg-white shadow-sm group-hover:border-meatball/20 transition-all">
                            <div class="absolute -bottom-1 -right-1 w-3.5 h-3.5 bg-green-500 rounded-full border-2 border-white"></div>
                        </div>
                        <div class="hidden sm:block">
                            <p th:text="${session.userNickname}" class="text-sm font-black text-poodle-900 tracking-tight transition-colors group-hover:text-meatball">사용자</p>
                        </div>
                    </div>

                    <!-- Case: Not Logged In -->
                    <a th:if="${session.userId == null}" th:href="@{/login}" 
                       class="px-6 py-2.5 bg-meatball text-white rounded-xl text-xs font-black shadow-lg shadow-meatball/20 hover:scale-105 transition-all">
                        로그인
                    </a>

                    <!-- Profile Dropdown (Only for Logged In) -->
                    <div th:if="${session.userId != null}" class="absolute right-0 top-[4.5rem] w-56 bg-white/90 backdrop-blur-2xl rounded-[1.5rem] shadow-[0_20px_50px_rgba(62,39,35,0.1)] border border-poodle-50 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 transform origin-top-right group-hover:translate-y-0 translate-y-4 z-50 p-2 overflow-hidden">
                        <div class="p-3 mb-2 border-b border-poodle-50">
                            <p class="text-[10px] font-black text-poodle-200 uppercase tracking-widest mb-1 leading-none">Welcome back</p>
                            <p th:text="${session.userNickname}" class="text-[11px] font-bold text-poodle-600 truncate">nickname</p>
                        </div>
                        <div class="flex flex-col">
                            <a th:href="@{/user/mypage}"
                                class="px-4 py-3 text-xs font-black text-poodle-400 hover:bg-poodle-50 hover:text-meatball rounded-xl transition-all flex items-center gap-3">
                                <i class="fa-solid fa-paw opacity-50"></i> 마이페이지
                            </a>
                            <div class="h-px bg-poodle-50 my-2 mx-2"></div>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="w-full px-4 py-3 text-xs font-black text-red-400 hover:bg-red-50 rounded-xl transition-all flex items-center gap-3">
                                    <i class="fa-solid fa-right-from-bracket opacity-50"></i> 로그아웃
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 🐾 Welcome & Profile Setup Modal (First Login Only) -->
    <div id="welcomeProfileModal" th:if="${session.needsProfile}" class="fixed inset-0 z-[200] flex items-center justify-center p-6">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-poodle-900/60 backdrop-blur-md animate-fade-in"></div>
        
        <!-- Modal Content -->
        <div class="relative w-full max-w-lg bg-white rounded-[3rem] shadow-[0_50px_100px_-20px_rgba(62,39,35,0.25)] border border-white overflow-hidden animate-modal-up">
            <!-- Header Decoration -->
            <div class="h-3 bg-gradient-to-r from-meatball via-poodle-400 to-meatball"></div>
            
            <div class="p-10 md:p-12">
                <div class="flex items-center gap-6 mb-10">
                    <div class="w-16 h-16 bg-poodle-50 rounded-[1.5rem] flex items-center justify-center text-meatball text-3xl shadow-inner">
                        <i class="fa-solid fa-face-smile-wink animate-bounce-subtle"></i>
                    </div>
                    <div>
                        <h2 class="text-2xl font-black text-poodle-900 tracking-tight mb-1">환영합니다! 👋</h2>
                        <p class="text-sm text-poodle-300 font-bold italic">잠깐! 활동을 위해 프로필을 완성해 주세요.</p>
                    </div>
                </div>

                <form id="welcomeProfileForm" class="space-y-8">
                    <!-- Nickname -->
                    <div class="space-y-3">
                        <label class="text-[10px] font-black text-poodle-200 uppercase tracking-[0.2em] ml-1">Nickname</label>
                        <input type="text" name="nickname" required th:value="${session.userNickname}"
                            class="w-full px-6 py-4 bg-poodle-50 border border-poodle-100 rounded-2xl text-sm font-black text-poodle-800 focus:bg-white focus:border-meatball focus:ring-4 focus:ring-meatball/5 outline-none transition-all"
                            placeholder="사용하실 닉네임을 입력하세요">
                    </div>

                    <!-- Job Title -->
                    <div class="space-y-3">
                        <label class="text-[10px] font-black text-poodle-200 uppercase tracking-[0.2em] ml-1">Current Role / Job</label>
                        <input type="text" name="jobTitle" required
                            class="w-full px-6 py-4 bg-poodle-50 border border-poodle-100 rounded-2xl text-sm font-black text-poodle-800 focus:bg-white focus:border-meatball focus:ring-4 focus:ring-meatball/5 outline-none transition-all"
                            placeholder="예시) 백엔드 개발자, UI/UX 디자이너">
                    </div>

                    <!-- Tech Stack -->
                    <div class="space-y-3">
                        <label class="text-[10px] font-black text-poodle-200 uppercase tracking-[0.2em] ml-1">Stack (Tags)</label>
                        <input type="text" name="techStack" required
                            class="w-full px-6 py-4 bg-poodle-50 border border-poodle-100 rounded-2xl text-sm font-black text-poodle-800 focus:bg-white focus:border-meatball focus:ring-4 focus:ring-meatball/5 outline-none transition-all"
                            placeholder="예시) Java, Spring Boot, Figma">
                    </div>

                    <div class="pt-6">
                        <button type="submit"
                            class="w-full py-5 bg-poodle-900 text-white rounded-2xl font-black text-sm shadow-xl shadow-poodle-900/20 hover:bg-meatball hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-3 group">
                            <span>시작하기</span>
                            <i class="fa-solid fa-arrow-right group-hover:translate-x-1 transition-transform"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script th:if="${session.needsProfile}" th:inline="javascript">
        document.getElementById('welcomeProfileForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            data.isPublic = true; // 기본값 공개

            const userId = [[${session.userId}]];

            try {
                const response = await fetch(`/api/mypage/profile?userId=${userId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    // 성공 시 모달 닫고 페이지 새로고침
                    document.getElementById('welcomeProfileModal').style.display = 'none';
                    window.location.reload();
                } else {
                    const errorMsg = await response.text();
                    alert('저장 실패: ' + errorMsg);
                }
            } catch (err) {
                console.error(err);
                alert('서버와 통신 중 오류가 발생했습니다.');
            }
        });
    </script>
</body>
</html>
