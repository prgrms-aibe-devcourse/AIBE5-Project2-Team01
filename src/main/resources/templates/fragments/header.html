<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
</head>
<body>
    <header th:fragment="mainHeader" class="sticky top-0 z-50 bg-[#FDF8F6]/90 backdrop-blur-md border-b border-brand-200 transition-all shadow-sm">
        <div class="container mx-auto px-4 h-16 flex items-center justify-between">
            <a th:href="@{/}" class="flex items-center gap-3 cursor-pointer select-none group">
                <div class="w-12 h-12 overflow-hidden rounded-2xl shadow-xl border-2 border-brand-100 group-hover:scale-110 transition-transform duration-300 bg-white p-1">
                    <img th:src="@{/img/mascot.png}" alt="Meetball" class="w-full h-full object-contain">
                </div>
                <span class="text-2xl font-black tracking-tighter text-brand-900 group-hover:text-brand-500 transition-colors">Meetball</span>
            </a>

            <div class="hidden md:flex items-center">
                <a th:href="@{/project/register}"
                    class="font-black text-sm text-brand-600 hover:text-brand-900 transition-colors px-4 py-2 rounded-lg hover:bg-brand-50">
                    프로젝트 등록
                </a>
            </div>

            <div class="flex items-center gap-4">
                <div class="relative h-full flex items-center">
                    <button onclick="document.getElementById('notification-dropdown').classList.toggle('hidden')" class="p-2 text-gray-400 hover:text-brand-800 hover:bg-brand-50 rounded-full transition-colors relative">
                        <i class="fa-regular fa-bell text-xl"></i>
                        <span class="absolute top-1.5 right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span>
                    </button>
                    
                    <div id="notification-dropdown" class="absolute right-0 top-[3.5rem] mt-1 w-[22rem] bg-white rounded-2xl shadow-[0_10px_40px_-10px_rgba(0,0,0,0.1)] border border-brand-50 hidden z-50 overflow-hidden">
                        <div class="p-4 border-b border-gray-50 flex justify-between items-center bg-gray-50/50">
                            <h3 class="font-black text-gray-900">알림</h3>
                            <button class="text-xs font-bold text-gray-400 hover:text-brand-600" onclick="document.getElementById('notification-dropdown').classList.add('hidden')">닫기</button>
                        </div>
                        <div class="max-h-[60vh] overflow-y-auto no-scrollbar">
                            <div class="p-4 border-b border-gray-50 hover:bg-gray-50 transition-colors cursor-pointer bg-brand-50/30">
                                <div class="flex gap-3">
                                    <div class="w-8 h-8 rounded-full bg-brand-100 text-brand-600 flex items-center justify-center shrink-0 mt-1">
                                        <i class="fa-solid fa-paper-plane text-xs"></i>
                                    </div>
                                    <div>
                                        <p class="text-sm font-bold text-gray-900 mb-1 leading-snug"><span class="text-brand-600">김개발</span>님이 내 프로젝트에 지원했습니다.</p>
                                        <p class="text-xs text-gray-400 font-medium">10분 전</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="relative group cursor-pointer h-full flex items-center">
                    <div class="flex items-center gap-2 pl-4 border-l border-brand-100 py-2">
                        <div class="w-9 h-9 rounded-full border-2 border-brand-100 bg-white overflow-hidden">
                            <img th:src="@{/img/mascot_sheet.png}" alt="Profile" class="w-[500%] max-w-none ml-[-405%] mt-[-5%]">
                        </div>
                        <span class="text-sm font-bold text-gray-700 group-hover:text-brand-800 transition-colors">초코푸들</span>
                        <i class="fa-solid fa-chevron-down text-[10px] text-gray-400 group-hover:rotate-180 transition-transform duration-300"></i>
                    </div>

                    <div class="absolute right-0 top-[3.5rem] mt-1 w-48 bg-white rounded-2xl shadow-[0_10px_40px_-10px_rgba(0,0,0,0.1)] border border-brand-50 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 transform origin-top-right group-hover:translate-y-0 translate-y-2 z-50">
                        <div class="p-2 flex flex-col gap-1">
                            <a th:href="@{/mypage}"
                                class="px-4 py-2.5 text-sm font-bold text-gray-700 hover:bg-brand-50 hover:text-brand-800 rounded-xl transition-colors flex items-center gap-2">
                                <i class="fa-solid fa-user-astronaut w-4 opacity-50"></i> 마이페이지
                            </a>
                            <div class="h-px bg-brand-50 my-1 mx-2"></div>
                            <a th:href="@{/login}"
                                class="px-4 py-2.5 text-sm font-bold text-red-500 hover:bg-red-50 rounded-xl transition-colors flex items-center gap-2">
                                <i class="fa-solid fa-arrow-right-from-bracket w-4 opacity-50"></i> 로그아웃
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>
</body>
</html>
