<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
</head>
<body>
    <header th:fragment="mainHeader" class="sticky top-0 z-50 bg-white/70 backdrop-blur-xl border-b border-white/20 transition-all shadow-sm">
        <div class="container mx-auto px-4 h-20 flex items-center justify-between">
            <!-- Logo area -->
            <div class="flex items-center gap-12">
                <a th:href="@{/}" class="flex items-center gap-3 cursor-pointer select-none group">
                    <div class="relative">
                        <img th:src="@{/img/logo.png}" src="https://api.dicebear.com/7.x/adventurer/svg?seed=poodle" alt="Meetball" 
                             class="w-11 h-11 rounded-2xl object-cover shadow-poodle-100 shadow-xl group-hover:scale-105 group-hover:rotate-[-5deg] transition-all duration-500">
                        <div class="absolute -top-1 -right-1 w-3.5 h-3.5 bg-meatball rounded-full border-2 border-white animate-bounce-subtle"></div>
                    </div>
                    <span class="text-2xl font-black tracking-tighter text-poodle-900 group-hover:text-meatball transition-colors">Meetball</span>
                </a>

                <!-- Desktop Menu -->
                <nav class="hidden lg:flex items-center gap-8">
                    <a th:href="@{/projects}" class="text-sm font-black text-poodle-300 hover:text-poodle-900 transition-all relative group/nav">
                        탐색하기
                        <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-meatball transition-all group-hover/nav:w-full"></span>
                    </a>
                    <a th:href="${isLoggedIn} ? @{/register} : @{/login(redirect='/register')}" class="text-sm font-black text-poodle-300 hover:text-poodle-900 transition-all relative group/nav">
                        프로젝트 등록
                        <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-meatball transition-all group-hover/nav:w-full"></span>
                    </a>
                    <a th:if="${isLoggedIn}" th:href="@{/user/mypage}" class="text-sm font-black text-poodle-300 hover:text-poodle-900 transition-all relative group/nav">
                        나의 프로젝트
                        <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-meatball transition-all group-hover/nav:w-full"></span>
                    </a>
                </nav>
            </div>

            <!-- Right Actions -->
            <div class="flex items-center gap-6">
                <a th:if="${!isLoggedIn}" th:href="@{/login}"
                   class="inline-flex items-center gap-2 px-5 py-3 bg-poodle-900 text-white rounded-2xl text-xs font-black shadow-lg shadow-poodle-900/10 hover:bg-meatball transition-all active:scale-95">
                    <i class="fa-solid fa-right-to-bracket text-[11px]"></i>
                    로그인
                </a>

                <!-- Notifications (Optional Icon) -->
                <button th:if="${isLoggedIn}" class="w-10 h-10 flex items-center justify-center text-poodle-300 hover:text-poodle-900 transition-colors relative">
                    <i class="fa-regular fa-bell text-lg"></i>
                    <span class="absolute top-2 right-2 w-1.5 h-1.5 bg-meatball rounded-full"></span>
                </button>

                <!-- User Profile -->
                <div th:if="${isLoggedIn}" class="relative group h-full flex items-center">
                    <div class="flex items-center gap-3 pl-6 border-l border-poodle-100 py-2 cursor-pointer transition-all group-hover:bg-poodle-50/50 group-hover:px-4 group-hover:-mx-4 rounded-2xl">
                        <div class="relative">
                            <img th:src="'https://api.dicebear.com/7.x/adventurer/svg?seed=' + ${currentUser.nickname}" src="https://api.dicebear.com/7.x/adventurer/svg?seed=Lucky" alt="Profile"
                                 class="w-10 h-10 rounded-2xl border-2 border-poodle-50 bg-white shadow-sm group-hover:border-meatball/20 transition-all">
                            <div class="absolute -bottom-1 -right-1 w-3.5 h-3.5 bg-green-500 rounded-full border-2 border-white"></div>
                        </div>
                        <div class="hidden sm:block">
                            <p th:text="${currentUser.nickname}" class="text-sm font-black text-poodle-900 tracking-tight transition-colors group-hover:text-meatball">사용자</p>
                        </div>
                    </div>

                    <!-- Profile Dropdown -->
                    <div class="absolute right-0 top-[4.5rem] w-56 bg-white/90 backdrop-blur-2xl rounded-[1.5rem] shadow-[0_20px_50px_rgba(62,39,35,0.1)] border border-poodle-50 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 transform origin-top-right group-hover:translate-y-0 translate-y-4 z-50 p-2 overflow-hidden">
                        <div class="p-3 mb-2 border-b border-poodle-50">
                            <p class="text-[10px] font-black text-poodle-200 uppercase tracking-widest mb-1 leading-none">Signed in as</p>
                            <p th:text="${currentUser.email}" class="text-[11px] font-bold text-poodle-600 truncate">user@example.com</p>
                        </div>
                        <div class="flex flex-col">
                            <a th:href="@{/user/mypage}"
                                class="px-4 py-3 text-xs font-black text-poodle-400 hover:bg-poodle-50 hover:text-meatball rounded-xl transition-all flex items-center gap-3">
                                <i class="fa-solid fa-paw opacity-50"></i> 마이페이지
                            </a>
                            <a th:href="@{/user/mypage}"
                                class="px-4 py-3 text-xs font-black text-poodle-400 hover:bg-poodle-50 hover:text-meatball rounded-xl transition-all flex items-center gap-3">
                                <i class="fa-solid fa-list-check opacity-50"></i> 프로젝트 관리
                            </a>
                            <div class="h-px bg-poodle-50 my-2 mx-2"></div>
                            <button type="button"
                                onclick="fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' }).finally(() => window.location.href = '/')"
                                class="px-4 py-3 text-xs font-black text-red-400 hover:bg-red-50 rounded-xl transition-all flex items-center gap-3">
                                <i class="fa-solid fa-right-from-bracket opacity-50"></i> 로그아웃
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>
</body>
</html>
