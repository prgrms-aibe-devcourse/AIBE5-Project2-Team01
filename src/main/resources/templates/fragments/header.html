<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
</head>
<body>
    <th:block th:fragment="mainHeader">
    <div th:replace="~{fragments/loading :: globalLoading}"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loader = document.getElementById('global-loader');
            if (!loader) return;
            setTimeout(() => loader.classList.remove('show'), 350);
        });

        window.addEventListener('beforeunload', (event) => {
            // 파일 다운로드(`/download`) 링크를 클릭한 경우에는 로딩바를 띄우지 않음
            if (document.activeElement && 
                document.activeElement.tagName === 'A' && 
                (document.activeElement.getAttribute('href')?.includes('/download') || 
                 document.activeElement.hasAttribute('download'))) {
                return;
            }
            const loader = document.getElementById('global-loader');
            if (loader) loader.classList.add('show');
        });
    </script>

    <header class="sticky top-0 z-50 bg-white/95 backdrop-blur-xl border-b border-poodle-100/80 transition-all shadow-sm">
        <div class="mx-auto max-w-7xl px-4 h-24 md:h-28 flex items-center justify-between">
            <!-- Logo area -->
            <div class="flex items-center gap-4">
                <a th:href="@{/}" class="flex items-center gap-3 cursor-pointer select-none group">
                    <img th:src="@{/img/logo.png}" src="/img/logo.png" alt="Meetball"
                         class="w-11 h-11 rounded-2xl object-cover shadow-poodle-100 shadow-xl group-hover:scale-105 group-hover:rotate-[-5deg] transition-all duration-500">
                    <span class="text-2xl font-black tracking-tighter text-poodle-900 group-hover:text-meatball transition-colors">Meetball</span>
                </a>
            </div>

            <!-- Right Actions -->
            <div class="flex items-center gap-3">
                <button type="button"
                   onclick="openMeetballDrawModal()"
                   class="inline-flex h-14 items-center gap-3 px-5 bg-poodle-800 text-white rounded-2xl text-sm font-black border border-transparent shadow-[0_14px_28px_rgba(78,52,46,0.18)] hover:bg-meatball transition-all active:scale-95">
                    <i class="fa-solid fa-dice text-base"></i>
                    밋Ball 뽑기
                </button>
                <a th:if="${isLoggedIn}" th:href="@{/register}"
                   class="inline-flex h-14 items-center gap-3 px-5 bg-poodle-800 text-white rounded-2xl text-sm font-black border border-transparent shadow-[0_14px_28px_rgba(78,52,46,0.18)] hover:bg-meatball transition-all active:scale-95">
                    <i class="fa-solid fa-plus text-base"></i>
                    프로젝트 등록
                </a>
                <button th:if="${!isLoggedIn}" type="button" onclick="openLoginRequiredModal('/register')"
                   class="inline-flex h-14 items-center gap-3 px-5 bg-poodle-800 text-white rounded-2xl text-sm font-black border border-transparent shadow-[0_14px_28px_rgba(78,52,46,0.18)] hover:bg-meatball transition-all active:scale-95">
                    <i class="fa-solid fa-plus text-base"></i>
                    프로젝트 등록
                </button>
                <button th:if="${!isLoggedIn}" type="button" onclick="openLoginModal('/')"
                   class="inline-flex h-14 items-center justify-center px-5 bg-poodle-800 text-white rounded-2xl text-sm font-black shadow-[0_14px_28px_rgba(78,52,46,0.18)] hover:bg-meatball transition-all active:scale-95">
                    로그인
                </button>

                <!-- Current Profile -->
                <div th:if="${isLoggedIn}" class="relative group h-full flex items-center">
                    <div class="inline-flex h-14 items-center gap-3 px-5 bg-white border border-poodle-100 rounded-2xl cursor-pointer transition-all group-hover:border-meatball/20 group-hover:bg-poodle-50/40 shadow-sm">
                        <img th:src="@{/img/logo.png}" src="/img/logo.png" alt="Profile"
                             class="w-10 h-10 rounded-2xl border-2 border-poodle-50 bg-white object-cover shadow-sm transition-all">
                        <div class="hidden sm:block min-w-0">
                            <p th:text="${currentProfile.nickname}" class="text-base font-black text-poodle-900 tracking-tight transition-colors group-hover:text-meatball">사용자</p>
                        </div>
                    </div>

                    <!-- Profile Dropdown -->
                    <div class="absolute right-0 top-[4.5rem] w-56 bg-white/95 backdrop-blur-2xl rounded-[1.5rem] shadow-[0_20px_50px_rgba(101,55,40,0.14)] border border-poodle-100 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 transform origin-top-right group-hover:translate-y-0 translate-y-4 z-50 p-2 overflow-hidden">
                        <div class="p-3 mb-2 border-b border-poodle-50">
                            <p class="text-[10px] font-black text-poodle-200 uppercase tracking-widest mb-1 leading-none">Signed in as</p>
                            <p th:text="${currentProfile.email}" class="text-[11px] font-bold text-poodle-600 truncate">-</p>
                        </div>
                        <div class="flex flex-col">
                            <a th:href="@{/mypage}"
                                class="px-4 py-3 text-xs font-black text-poodle-400 hover:bg-poodle-50 hover:text-meatball rounded-xl transition-all flex items-center gap-3">
                                <i class="fa-solid fa-paw opacity-50"></i> 마이페이지
                            </a>
                            <div class="h-px bg-poodle-50 my-2 mx-2"></div>
                            <button type="button"
                                onclick="meetballFetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' }).finally(() => window.location.href = '/')"
                                class="px-4 py-3 text-xs font-black text-red-400 hover:bg-red-50 rounded-xl transition-all flex items-center gap-3">
                                <i class="fa-solid fa-right-from-bracket opacity-50"></i> 로그아웃
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div th:replace="~{fragments/meetball-draw :: meetballDrawModal}"></div>

    <!-- Login Required Notice Modal -->
    <div id="loginRequiredModal" th:if="${!isLoggedIn}" class="fixed inset-0 z-[189] hidden" aria-hidden="true">
        <div class="absolute inset-0 bg-black/30 backdrop-blur-sm" onclick="closeLoginRequiredModal()"></div>
        <div class="absolute inset-0 flex items-center justify-center p-6 pointer-events-none">
            <div class="relative w-full max-w-md bg-white rounded-[2rem] shadow-[0_35px_90px_rgba(0,0,0,0.16)] border border-white overflow-hidden pointer-events-auto animate-modal-up">
                <div class="px-8 py-10 md:px-10 md:py-12 text-center space-y-6">
                    <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-poodle-50 text-poodle-800 shadow-sm">
                        <i class="fa-solid fa-lock text-2xl"></i>
                    </div>
                    <div class="space-y-3">
                        <h3 class="text-3xl font-black tracking-tight text-poodle-900">로그인이 필요한 기능입니다</h3>
                        <p id="loginRequiredMessage" class="text-sm font-bold leading-relaxed text-poodle-400">
                            로그인 후 이용하실 수 있어요.
                        </p>
                    </div>
                    <div class="flex flex-col gap-3 sm:flex-row">
                        <button type="button" onclick="closeLoginRequiredModal()"
                                class="flex-1 rounded-[1.4rem] border border-poodle-100 bg-white px-6 py-4 text-sm font-black text-poodle-500 transition-all hover:border-poodle-200 hover:bg-poodle-50 hover:text-poodle-700">
                            닫기
                        </button>
                        <button type="button" onclick="proceedToLoginFromRequiredModal()"
                                class="flex-1 rounded-[1.4rem] bg-poodle-800 px-6 py-4 text-sm font-black text-white shadow-[0_14px_28px_rgba(78,52,46,0.18)] transition-all hover:bg-meatball">
                            로그인 하기
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" th:if="${!isLoggedIn}" class="fixed inset-0 z-[190] hidden" aria-hidden="true">
        <div class="absolute inset-0 bg-black/30 backdrop-blur-sm" onclick="closeLoginModal()"></div>
        <div class="absolute inset-0 flex items-center justify-center p-6 pointer-events-none">
            <div class="relative w-full max-w-2xl bg-white rounded-[2.25rem] shadow-[0_45px_100px_rgba(0,0,0,0.18)] border border-white overflow-hidden pointer-events-auto animate-modal-up">
                <button type="button" onclick="closeLoginModal()"
                        class="absolute top-7 right-7 w-11 h-11 text-black flex items-center justify-center hover:bg-poodle-50 transition-all">
                    <i class="fa-solid fa-xmark text-3xl"></i>
                </button>

                <div class="px-10 py-14 md:px-20 md:py-16 text-center space-y-8">
                    <div class="flex justify-center">
                        <div class="inline-flex items-center gap-3 select-none">
                            <img th:src="@{/img/logo.png}" src="/img/logo.png" alt="Meetball"
                                 class="w-11 h-11 rounded-2xl object-cover shadow-poodle-100 shadow-xl">
                            <span class="text-2xl md:text-3xl font-black tracking-tighter text-poodle-900">Meetball</span>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <h2 class="text-3xl md:text-4xl font-black text-black tracking-tight leading-[1.1]">Meetball에 오신 것을 환영합니다!</h2>
                        <p class="text-base md:text-xl font-bold text-zinc-500 leading-relaxed">
                            스터디와 프로젝트를 찾는 가장 쉬운 방법<br>
                            Meetball에서 함께 할 팀원들을 찾으세요!
                        </p>
                    </div>

                    <div class="space-y-4">
                        <!-- Google Login (Primary Action) -->
                        <div class="relative w-full max-w-[400px] mx-auto">
                            <div id="g_id_onload"
                                 th:if="${googleLoginEnabled}"
                                 th:attr="data-client_id=${googleClientId}"
                                 data-context="signin"
                                 data-ux_mode="popup"
                                 data-callback="handleGoogleCredentialResponse"
                                 data-auto_select="false"
                                 data-auto_prompt="false"></div>

                            <div th:if="${googleLoginEnabled}" class="flex justify-center social-login-google">
                                <div class="g_id_signin"
                                     data-type="standard"
                                     data-shape="pill"
                                     data-theme="outline"
                                     data-size="large"
                                     data-width="400"
                                     data-text="continue_with"
                                     data-logo_alignment="center"></div>
                            </div>

                            <div th:unless="${googleLoginEnabled}" class="w-full p-4 bg-poodle-50 border border-poodle-100 rounded-[2rem] text-center">
                                <p class="text-sm font-black text-poodle-800">Google 로그인 설정이 필요합니다.</p>
                            </div>
                        </div>

                        <p id="loginError" class="hidden text-xs font-bold text-red-500 leading-relaxed text-center mt-4"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style th:if="${!isLoggedIn}">
        /* Override generic styling that breaks Google button constraints */
        .social-login-google {
            width: 100%;
            max-width: 400px;
        }

        .social-login-google > div {
            width: 100% !important;
        }

        /* Ensure iframe scales nicely within bounds */
        .social-login-google iframe {
            max-width: 400px !important;
            margin: 0 auto !important;
        }

        /* Premium Scrollbar for Dropdowns */
        .welcome-dropdown-menu::-webkit-scrollbar {
            width: 5px;
        }
        .welcome-dropdown-menu::-webkit-scrollbar-track {
            background: transparent;
        }
        .welcome-dropdown-menu::-webkit-scrollbar-thumb {
            background: #EFEBE9;
            border-radius: 10px;
        }
        .welcome-dropdown-menu::-webkit-scrollbar-thumb:hover {
            background: #D7CCC8;
        }
    </style>

    <script th:if="${!isLoggedIn}" src="https://accounts.google.com/gsi/client" async defer></script>
    <script th:if="${!isLoggedIn}" th:inline="javascript">
        window.meetballLoginRedirect = '/';

        function normalizeLoginRedirect(value) {
            const raw = String(value || '/').trim();
            if (!raw || !raw.startsWith('/') || raw.startsWith('//')) return '/';
            return raw;
        }

        window.openLoginModal = function(redirect) {
            window.meetballLoginRedirect = normalizeLoginRedirect(redirect || window.location.pathname + window.location.search);
            const modal = document.getElementById('loginModal');
            if (!modal) return;
            const errorNode = document.getElementById('loginError');
            if (errorNode) {
                errorNode.textContent = '';
                errorNode.classList.add('hidden');
            }
            modal.classList.remove('hidden');
            modal.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
        };

        window.openLoginRequiredModal = function(redirect, message) {
            window.meetballLoginRedirect = normalizeLoginRedirect(redirect || window.location.pathname + window.location.search);
            const modal = document.getElementById('loginRequiredModal');
            if (!modal) {
                openLoginModal(window.meetballLoginRedirect);
                return;
            }
            const messageNode = document.getElementById('loginRequiredMessage');
            if (messageNode) {
                messageNode.textContent = String(message || '로그인 후 이용하실 수 있어요.');
            }
            modal.classList.remove('hidden');
            modal.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
        };

        window.closeLoginRequiredModal = function() {
            const modal = document.getElementById('loginRequiredModal');
            if (!modal) return;
            modal.classList.add('hidden');
            modal.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = 'auto';
        };

        window.proceedToLoginFromRequiredModal = function() {
            const modal = document.getElementById('loginRequiredModal');
            if (modal) {
                modal.classList.add('hidden');
                modal.setAttribute('aria-hidden', 'true');
            }
            openLoginModal(window.meetballLoginRedirect);
        };

        window.closeLoginModal = function() {
            const modal = document.getElementById('loginModal');
            if (!modal) return;
            modal.classList.add('hidden');
            modal.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = 'auto';
        };

        window.handleGoogleCredentialResponse = async function(response) {
            const errorNode = document.getElementById('loginError');
            if (!response?.credential) {
                if (errorNode) {
                    errorNode.textContent = 'Google 인증 응답이 비어 있습니다.';
                    errorNode.classList.remove('hidden');
                }
                return;
            }

            try {
                const loginResponse = await meetballFetch('/api/auth/google', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ credential: response.credential })
                });

                if (!loginResponse.ok) {
                    const message = await loginResponse.text();
                    throw new Error(message || 'Google 로그인에 실패했습니다.');
                }

                window.location.href = normalizeLoginRedirect(window.meetballLoginRedirect);
            } catch (error) {
                console.error('Google login error:', error);
                if (errorNode) {
                    errorNode.textContent = '로그인에 실패했습니다. 잠시 후 다시 시도해주세요.';
                    errorNode.classList.remove('hidden');
                }
                await meetballAlert('로그인에 실패했습니다. 잠시 후 다시 시도해주세요.', { type: 'error' });
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            if (params.has('login')) {
                openLoginModal(params.get('redirect') || '/');
                params.delete('login');
                params.delete('redirect');
                const cleanQuery = params.toString();
                const cleanUrl = window.location.pathname + (cleanQuery ? `?${cleanQuery}` : '') + window.location.hash;
                window.history.replaceState(null, '', cleanUrl);
            }
        });
    </script>

    <!-- 🐾 Welcome & Profile Setup Modal (First Login Only) -->
    <div id="welcomeProfileModal" th:if="${isLoggedIn && currentProfile != null && session.needsProfile == true}" class="fixed inset-0 z-[200] flex items-center justify-center p-4 md:p-6">
        <div class="absolute inset-0 bg-poodle-900/60 backdrop-blur-md animate-fade-in" onclick="closeWelcomeProfileModal()"></div>

        <div class="relative flex max-h-[calc(100vh-2rem)] w-full max-w-[72rem] flex-col overflow-visible rounded-[2.5rem] border border-white bg-white shadow-[0_50px_100px_-20px_rgba(62,39,35,0.25)] animate-modal-up md:max-h-[calc(100vh-3rem)]">
            <div id="welcomeProfileContent" class="flex-1 overflow-y-auto overscroll-contain p-8 transition-all duration-200 md:p-10 lg:px-14 lg:pt-12 lg:pb-16">
                <div id="welcomeStepIndicators" class="mx-auto mb-8 flex max-w-[360px] items-center justify-center">
                    <div data-step-indicator="1" class="flex h-12 w-12 items-center justify-center rounded-full bg-poodle-800 text-xl font-black text-white shadow-sm">1</div>
                    <div data-step-line="1" class="mx-3 h-1 flex-1 rounded-full bg-poodle-100"></div>
                    <div data-step-indicator="2" class="flex h-12 w-12 items-center justify-center rounded-full bg-poodle-100 text-xl font-black text-poodle-300">2</div>
                    <div data-step-line="2" class="mx-3 h-1 flex-1 rounded-full bg-poodle-100"></div>
                    <div data-step-indicator="3" class="flex h-12 w-12 items-center justify-center rounded-full bg-poodle-100 text-xl font-black text-poodle-300">3</div>
                </div>

                <div class="mx-auto mb-10 max-w-3xl text-center">
                    <h2 id="welcomeHeadline" class="text-4xl leading-tight md:text-5xl font-black tracking-tight text-black">
                        기본 정보를 입력해주세요
                    </h2>
                    <p id="welcomeSubtitle" class="mt-4 text-base md:text-lg font-bold text-poodle-400">
                        활동을 시작하기 전에 필요한 정보만 순서대로 받고 있어요.
                    </p>
                </div>

                <form id="welcomeProfileForm" class="space-y-8">
                    <section data-welcome-step="1" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div class="space-y-3">
                                <label for="welcomeName" class="block text-[15px] md:text-lg font-black text-poodle-700">
                                    이름을 입력해주세요 <span class="text-red-400">*</span>
                                </label>
                                <input type="text" id="welcomeName" name="name" required
                                       th:value="${currentProfile.editableAccountName}"
                                       class="w-full rounded-[1.4rem] border border-poodle-100 bg-white px-6 py-5 text-base font-black text-poodle-900 outline-none transition-all placeholder:text-poodle-200 focus:border-poodle-800 focus:ring-4 focus:ring-poodle-800/15"
                                       placeholder="이름을 입력해주세요">
                            </div>
                            <div class="space-y-3">
                                <label for="welcomeNickname" class="block text-[15px] md:text-lg font-black text-poodle-700">
                                    닉네임을 입력해주세요 <span class="text-red-400">*</span>
                                </label>
                                <input type="text" id="welcomeNickname" name="nickname" required
                                       th:value="${currentProfile.temporaryNickname ? '' : currentProfile.nickname}"
                                       class="w-full rounded-[1.4rem] border border-poodle-100 bg-white px-6 py-5 text-base font-black text-poodle-900 outline-none transition-all placeholder:text-poodle-200 focus:border-poodle-800 focus:ring-4 focus:ring-poodle-800/15"
                                       placeholder="닉네임을 입력해주세요">
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div class="space-y-3">
                                <label for="welcomePhoneNumber" class="block text-[15px] md:text-lg font-black text-poodle-700">
                                    연락처를 입력해주세요 <span class="text-red-400">*</span>
                                </label>
                                <input type="tel" id="welcomePhoneNumber" name="phoneNumber" required inputmode="numeric" autocomplete="tel-national"
                                       th:value="${currentProfile.phoneNumber}"
                                       class="w-full rounded-[1.4rem] border border-poodle-100 bg-white px-6 py-5 text-base font-black text-poodle-900 outline-none transition-all placeholder:text-poodle-200 focus:border-poodle-800 focus:ring-4 focus:ring-poodle-800/15"
                                       placeholder="010-0000-0000">
                            </div>
                            <div class="space-y-3">
                                <label for="welcomeBirthDate" class="block text-[15px] md:text-lg font-black text-poodle-700">
                                    생년월일을 입력해주세요 <span class="text-red-400">*</span>
                                </label>
                                <input type="date" id="welcomeBirthDate" name="birthDate" required
                                       th:value="${currentProfile.birthDate != null ? #temporals.format(currentProfile.birthDate, 'yyyy-MM-dd') : ''}"
                                       class="w-full rounded-[1.4rem] border border-poodle-100 bg-white px-6 py-5 text-base font-black text-poodle-900 outline-none transition-all focus:border-poodle-800 focus:ring-4 focus:ring-poodle-800/15">
                            </div>
                        </div>

                        <div class="space-y-3">
                            <label class="block text-[15px] md:text-lg font-black text-poodle-700">
                                성별을 선택해주세요 <span class="text-red-400">*</span>
                            </label>
                            <input type="hidden" id="welcomeGender" name="gender" required>
                            <div id="welcomeGenderOptions" class="grid grid-cols-2 gap-4"></div>
                        </div>
                    </section>

                    <section data-welcome-step="2" class="hidden space-y-6">
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
                            <div class="space-y-3">
                                <label class="block text-[15px] md:text-lg font-black text-poodle-700">
                                    포지션을 선택해주세요 <span class="text-red-400">*</span>
                                </label>
                                <input type="hidden" id="welcomePosition" name="position" required>
                                <div id="welcomePositionDropdownWrap" class="relative">
                                    <button type="button" id="welcomePositionDropdownBtn" onclick="toggleWelcomePositionDropdown()"
                                            class="inline-flex w-full items-center justify-between rounded-[1.4rem] border border-poodle-100 bg-white px-5 py-5 text-base font-black text-poodle-900 outline-none transition-all hover:border-poodle-800/20 hover:text-poodle-800">
                                        <span id="welcomePositionSelectedText">포지션</span>
                                        <i id="welcomePositionDropdownIcon" class="fa-solid fa-chevron-down text-sm text-poodle-300 transition-all duration-300"></i>
                                    </button>
                                    <div id="welcomePositionDropdownMenu"
                                         class="hidden welcome-dropdown-menu absolute left-0 right-0 top-full z-20 mt-3 max-h-72 overflow-y-auto overscroll-contain rounded-[1.6rem] border border-poodle-100 bg-white p-4 shadow-[0_25px_60px_rgba(62,39,35,0.12)]">
                                        <div id="welcomePositionOptions" class="grid grid-cols-2 gap-2"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="space-y-3">
                                <label class="block text-[15px] md:text-lg font-black text-poodle-700">
                                    경력을 선택해주세요 <span class="text-red-400">*</span>
                                </label>
                                <input type="hidden" id="welcomeExperienceYears" name="experienceYears" required>
                                <div id="welcomeExperienceDropdownWrap" class="relative">
                                    <button type="button" id="welcomeExperienceDropdownBtn" onclick="toggleWelcomeExperienceDropdown()"
                                            class="inline-flex w-full items-center justify-between rounded-[1.4rem] border border-poodle-100 bg-white px-5 py-5 text-base font-black text-poodle-900 outline-none transition-all hover:border-poodle-800/20 hover:text-poodle-800">
                                        <span id="welcomeExperienceSelectedText">경력</span>
                                        <i id="welcomeExperienceDropdownIcon" class="fa-solid fa-chevron-down text-sm text-poodle-300 transition-all duration-300"></i>
                                    </button>
                                    <div id="welcomeExperienceDropdownMenu"
                                         class="hidden welcome-dropdown-menu absolute left-0 right-0 top-full z-20 mt-3 max-h-72 overflow-y-auto overscroll-contain rounded-[1.6rem] border border-poodle-100 bg-white p-4 shadow-[0_25px_60px_rgba(62,39,35,0.12)]">
                                        <div id="welcomeExperienceOptions" class="grid grid-cols-3 gap-2"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-3">
                            <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                                <label for="welcomeOrganization" class="block text-[15px] md:text-lg font-black text-poodle-700">
                                    소속을 입력해주세요
                                </label>
                                <div id="welcomeOrgVisibleOptions" class="inline-flex items-center gap-3"></div>
                            </div>
                            <input type="text" id="welcomeOrganization" name="organization"
                                   th:value="${currentProfile.organization}"
                                   class="w-full rounded-[1.4rem] border border-poodle-100 bg-white px-5 py-5 text-base font-black text-poodle-900 outline-none transition-all placeholder:text-poodle-200 focus:border-poodle-800 focus:ring-4 focus:ring-poodle-800/15"
                                   placeholder="소속 학교 또는 직장 이름을 입력해주세요">
                        </div>
                    </section>

                    <section data-welcome-step="3" class="hidden space-y-6">
                        <div class="space-y-3">
                            <label class="block text-[15px] md:text-lg font-black text-poodle-700">
                                기술스택을 선택해주세요 <span class="text-red-400">*</span>
                            </label>
                            <input type="hidden" id="welcomeTechStack" required>
                            <div id="welcomeTechStackOptions" class="flex max-h-72 flex-wrap gap-3 overflow-y-auto rounded-[1.4rem] border border-poodle-100 bg-white p-4"></div>
                        </div>
                    </section>

                    <div class="mt-8 flex items-center justify-between border-t border-poodle-100 pt-8 pb-2 md:mt-10 md:pt-10">
                        <button type="button" id="welcomePrevButton"
                                class="hidden h-14 items-center gap-2 rounded-2xl border border-poodle-100 bg-white px-7 text-sm font-black text-poodle-400 transition-all hover:bg-poodle-50 hover:text-poodle-700">
                            <i class="fa-solid fa-chevron-left text-[10px]"></i>
                            이전
                        </button>
                        <div class="ml-auto">
                            <button type="button" id="welcomeNextButton"
                                    class="flex h-14 items-center gap-3 rounded-2xl bg-poodle-800 px-10 text-sm font-black text-white shadow-[0_15px_30px_-5px_rgba(78,52,46,0.25)] transition-all hover:bg-meatball active:scale-95">
                                다음
                                <i class="fa-solid fa-chevron-right text-[10px]"></i>
                            </button>
                            <button type="submit" id="welcomeSubmitButton"
                                    class="hidden h-14 items-center gap-3 rounded-2xl bg-poodle-800 px-10 text-sm font-black text-white shadow-[0_15px_30px_-5px_rgba(78,52,46,0.25)] transition-all hover:bg-meatball active:scale-95">
                                시작하기
                                <i class="fa-solid fa-paw text-xs"></i>
                            </button>
                        </div>
                    </div>
                </form>
            </div>

        </div>
    </div>

	    <script th:if="${isLoggedIn && currentProfile != null && session.needsProfile == true}" th:inline="javascript">
            const welcomeGenderOptions = ['남자', '여자'];
            const welcomeExperienceOptions = [
                { value: '0', label: '0년' },
                { value: '1', label: '1년' },
                { value: '2', label: '2년' },
                { value: '3', label: '3년' },
                { value: '4', label: '4년' },
                { value: '5', label: '5년' },
                { value: '6', label: '6년' },
                { value: '7', label: '7년' },
                { value: '8', label: '8년' },
                { value: '9', label: '9년' },
                { value: '10', label: '10년 이상' }
            ];
            const welcomeStepCopy = {
                1: {
                    title: '기본 정보를 입력해주세요',
                    subtitle: '이름, 닉네임, 연락처, 생년월일, 성별을 먼저 입력해 주세요.'
                },
                2: {
                    title: '포지션과 경력을 알려주세요',
                    subtitle: '활동할 포지션과 소속 공개 여부를 설정해 주세요.'
                },
                3: {
                    title: '기술스택을 선택해주세요',
                    subtitle: '선택한 기술스택을 기준으로 더 맞는 프로젝트를 추천해드릴게요.'
                }
            };
            let welcomeCurrentStep = 1;
            const welcomeState = {
                name: /*[[${currentProfile.editableAccountName}]]*/ '',
                nickname: /*[[${currentProfile.temporaryNickname ? '' : currentProfile.nickname}]]*/ '',
                phoneNumber: /*[[${currentProfile.phoneNumber}]]*/ '',
                birthDate: /*[[${currentProfile.birthDate != null ? #temporals.format(currentProfile.birthDate, 'yyyy-MM-dd') : ''}]]*/ '',
                gender: normalizeWelcomeGenderForUi(/*[[${currentProfile.gender}]]*/ ''),
                position: /*[[${currentProfile.position}]]*/ '',
                experienceYears: normalizeWelcomeExperienceValue(/*[[${currentProfile.experienceYears}]]*/ ''),
                organization: /*[[${currentProfile.organization}]]*/ '',
                orgVisible: /*[[${currentProfile.orgVisible != null ? currentProfile.orgVisible : true}]]*/ true,
                techStacks: /*[[${currentProfile.techStackNames}]]*/ []
            };

            function normalizeWelcomeGenderForUi(value) {
                if (!value) return '';
                if (['남', '남성', '남자', 'male', 'Male', 'M', 'm'].includes(String(value))) {
                    return '남자';
                }
                if (['여', '여성', '여자', 'female', 'Female', 'F', 'f'].includes(String(value))) {
                    return '여자';
                }
                return '';
            }

            function normalizeWelcomeExperienceValue(value) {
                const normalized = String(value || '').trim();
                switch (normalized) {
                    case '0':
                    case '0년':
                    case '신입':
                        return '0';
                    case '1':
                    case '1년':
                    case '1년 미만':
                    case '1~3년':
                        return '1';
                    case '2':
                    case '2년':
                        return '2';
                    case '3':
                    case '3년':
                    case '3~5년':
                        return '3';
                    case '4':
                    case '4년':
                        return '4';
                    case '5':
                    case '5년':
                    case '5년 이상':
                        return '5';
                    case '6':
                    case '6년':
                        return '6';
                    case '7':
                    case '7년':
                        return '7';
                    case '8':
                    case '8년':
                        return '8';
                    case '9':
                    case '9년':
                        return '9';
                    case '10':
                    case '10년 이상':
                        return '10';
                    default:
                        return '';
                }
            }

            function getWelcomeExperienceLabel(value) {
                return welcomeExperienceOptions.find(option => option.value === String(value || ''))?.label || '경력을 선택해주세요';
            }

            function formatWelcomePhoneNumber(value) {
                const digits = String(value || '').replace(/\D/g, '').slice(0, 11);
                if (!digits) return '';
                if (digits.startsWith('02')) {
                    if (digits.length <= 2) return digits;
                    if (digits.length <= 5) return `${digits.slice(0, 2)}-${digits.slice(2)}`;
                    if (digits.length <= 9) return `${digits.slice(0, 2)}-${digits.slice(2, digits.length - 4)}-${digits.slice(-4)}`;
                    return `${digits.slice(0, 2)}-${digits.slice(2, 6)}-${digits.slice(6, 10)}`;
                }
                if (digits.length <= 3) return digits;
                if (digits.length <= 6) return `${digits.slice(0, 3)}-${digits.slice(3)}`;
                if (digits.length <= 10) return `${digits.slice(0, 3)}-${digits.slice(3, digits.length - 4)}-${digits.slice(-4)}`;
                return `${digits.slice(0, 3)}-${digits.slice(3, 7)}-${digits.slice(7, 11)}`;
            }

            function lockWelcomeModalScroll() {
                const html = document.documentElement;
                const body = document.body;
                if (!html || !body) return;
                if (!body.dataset.welcomePrevOverflow) {
                    body.dataset.welcomePrevOverflow = body.style.overflow || '';
                }
                if (!html.dataset.welcomePrevOverflow) {
                    html.dataset.welcomePrevOverflow = html.style.overflow || '';
                }
                body.style.overflow = 'hidden';
                html.style.overflow = 'hidden';
            }

            function unlockWelcomeModalScroll() {
                const html = document.documentElement;
                const body = document.body;
                if (!html || !body) return;
                body.style.overflow = body.dataset.welcomePrevOverflow ?? '';
                html.style.overflow = html.dataset.welcomePrevOverflow ?? '';
                delete body.dataset.welcomePrevOverflow;
                delete html.dataset.welcomePrevOverflow;
            }

            async function closeWelcomeProfileModal() {
                closeWelcomePositionDropdown();
                closeWelcomeExperienceDropdown();
                try {
                    await meetballFetch('/api/auth/logout', {
                        method: 'POST',
                        credentials: 'same-origin'
                    });
                } catch (error) {
                    console.error('Failed to cancel onboarding session:', error);
                } finally {
                    unlockWelcomeModalScroll();
                    document.getElementById('welcomeProfileModal')?.style.setProperty('display', 'none');
                    window.location.replace('/');
                }
            }

            function syncWelcomeFields() {
                const nameInput = document.getElementById('welcomeName');
                const nicknameInput = document.getElementById('welcomeNickname');
                const phoneNumberInput = document.getElementById('welcomePhoneNumber');
                const birthDateInput = document.getElementById('welcomeBirthDate');
                const genderInput = document.getElementById('welcomeGender');
                const positionInput = document.getElementById('welcomePosition');
                const experienceInput = document.getElementById('welcomeExperienceYears');
                const organizationInput = document.getElementById('welcomeOrganization');
                const techStackInput = document.getElementById('welcomeTechStack');

                if (nameInput) nameInput.value = welcomeState.name || '';
                if (nicknameInput) nicknameInput.value = welcomeState.nickname || '';
                if (phoneNumberInput) phoneNumberInput.value = formatWelcomePhoneNumber(welcomeState.phoneNumber || '');
                if (birthDateInput) birthDateInput.value = welcomeState.birthDate || '';
                if (genderInput) genderInput.value = welcomeState.gender || '';
                if (positionInput) positionInput.value = welcomeState.position || '';
                if (experienceInput) experienceInput.value = welcomeState.experienceYears || '';
                if (organizationInput) organizationInput.value = welcomeState.organization || '';
                if (techStackInput) techStackInput.value = welcomeState.techStacks.join(', ');
            }

            function renderWelcomeGenderOptions() {
                const container = document.getElementById('welcomeGenderOptions');
                if (!container) return;
                container.innerHTML = welcomeGenderOptions.map(option => {
                    const selected = welcomeState.gender === option;
                    const selectedClass = selected
                        ? 'border-poodle-800 bg-poodle-800 text-white shadow-sm'
                        : 'border-poodle-100 bg-white text-poodle-500 hover:border-poodle-800 hover:text-poodle-900';
                    return `<button type="button" data-welcome-gender="${window.meetballEscapeHtml(option)}" class="rounded-[1.4rem] border px-4 py-4 text-base font-black transition-all ${selectedClass}">${window.meetballEscapeHtml(option)}</button>`;
                }).join('');
                container.querySelectorAll('[data-welcome-gender]').forEach(button => {
                    button.addEventListener('click', () => {
                        welcomeState.gender = button.dataset.welcomeGender;
                        syncWelcomeFields();
                        renderWelcomeGenderOptions();
                    });
                });
            }

            function renderWelcomeOrgVisibleOptions() {
                const container = document.getElementById('welcomeOrgVisibleOptions');
                if (!container) return;
                const isPublic = Boolean(welcomeState.orgVisible);
                container.innerHTML = `
                    <button type="button" id="welcomeOrgVisibleSwitch"
                            class="relative inline-flex h-12 w-24 items-center rounded-full border transition-all ${isPublic ? 'border-meatball bg-meatball shadow-[0_14px_28px_rgba(255,107,53,0.22)]' : 'border-poodle-100 bg-poodle-100'}"
                            aria-pressed="${isPublic}" aria-label="소속 공개 여부 전환">
                        <span class="absolute left-1 top-1 flex h-10 w-10 items-center justify-center rounded-full bg-white shadow-md transition-transform duration-300 ${isPublic ? 'translate-x-12' : 'translate-x-0'}">
                            <i class="fa-solid ${isPublic ? 'fa-lock-open text-meatball' : 'fa-lock text-poodle-300'} text-sm"></i>
                        </span>
                    </button>
                    <div class="text-right">
                        <p class="text-sm font-black ${isPublic ? 'text-meatball' : 'text-poodle-400'}">${isPublic ? '공개' : '비공개'}</p>
                        <p class="text-[11px] font-bold text-poodle-300">소속 공개 여부</p>
                    </div>
                `;
                container.querySelector('#welcomeOrgVisibleSwitch')?.addEventListener('click', () => {
                    welcomeState.orgVisible = !welcomeState.orgVisible;
                    renderWelcomeOrgVisibleOptions();
                });
            }

            function updateWelcomePositionButtonLabel() {
                const selectedText = document.getElementById('welcomePositionSelectedText');
                if (!selectedText) return;
                selectedText.textContent = welcomeState.position || '포지션을 선택해주세요';
            }

            function syncWelcomeDropdownScrollState() {
                const content = document.getElementById('welcomeProfileContent');
                if (!content) return;
                const hasOpenDropdown = ['welcomePositionDropdownMenu', 'welcomeExperienceDropdownMenu'].some(id => {
                    const element = document.getElementById(id);
                    return element && !element.classList.contains('hidden');
                });
                content.classList.toggle('overflow-y-hidden', hasOpenDropdown);
                content.classList.toggle('overflow-y-auto', !hasOpenDropdown);
            }

            function toggleWelcomePositionDropdown() {
                const menu = document.getElementById('welcomePositionDropdownMenu');
                const icon = document.getElementById('welcomePositionDropdownIcon');
                if (!menu) return;
                const nextOpen = menu.classList.contains('hidden');
                closeWelcomeExperienceDropdown();
                menu.classList.toggle('hidden', !nextOpen);
                icon?.classList.toggle('rotate-180', nextOpen);
                syncWelcomeDropdownScrollState();
            }

            function closeWelcomePositionDropdown() {
                document.getElementById('welcomePositionDropdownMenu')?.classList.add('hidden');
                document.getElementById('welcomePositionDropdownIcon')?.classList.remove('rotate-180');
                syncWelcomeDropdownScrollState();
            }

            function renderWelcomePositionOptions() {
                const container = document.getElementById('welcomePositionOptions');
                if (!container) return;
                container.innerHTML = window.meetballPositionOptions.map(position => {
                    const selected = welcomeState.position === position;
                    const selectedClass = selected
                        ? 'border-poodle-800 bg-poodle-800 text-white shadow-sm'
                        : 'border-poodle-100 bg-poodle-50 text-poodle-600 hover:border-poodle-800 hover:text-poodle-900';
                    return `<button type="button" data-position="${window.meetballEscapeHtml(position)}" class="rounded-[1rem] border px-2 py-2.5 text-[13px] font-black transition-all ${selectedClass}">${window.meetballEscapeHtml(position)}</button>`;
                }).join('');
                container.querySelectorAll('[data-position]').forEach(button => {
                    button.addEventListener('click', () => {
                        welcomeState.position = button.dataset.position;
                        syncWelcomeFields();
                        updateWelcomePositionButtonLabel();
                        renderWelcomePositionOptions();
                        closeWelcomePositionDropdown();
                    });
                });
            }

            function updateWelcomeExperienceButtonLabel() {
                const selectedText = document.getElementById('welcomeExperienceSelectedText');
                if (!selectedText) return;
                selectedText.textContent = getWelcomeExperienceLabel(welcomeState.experienceYears);
            }

            function toggleWelcomeExperienceDropdown() {
                const menu = document.getElementById('welcomeExperienceDropdownMenu');
                const icon = document.getElementById('welcomeExperienceDropdownIcon');
                if (!menu) return;
                const nextOpen = menu.classList.contains('hidden');
                closeWelcomePositionDropdown();
                menu.classList.toggle('hidden', !nextOpen);
                icon?.classList.toggle('rotate-180', nextOpen);
                syncWelcomeDropdownScrollState();
            }

            function closeWelcomeExperienceDropdown() {
                document.getElementById('welcomeExperienceDropdownMenu')?.classList.add('hidden');
                document.getElementById('welcomeExperienceDropdownIcon')?.classList.remove('rotate-180');
                syncWelcomeDropdownScrollState();
            }

            function renderWelcomeExperienceOptions() {
                const container = document.getElementById('welcomeExperienceOptions');
                if (!container) return;
                container.innerHTML = welcomeExperienceOptions.map(option => {
                    const selected = welcomeState.experienceYears === option.value;
                    const selectedClass = selected
                        ? 'border-poodle-800 bg-poodle-800 text-white shadow-sm'
                        : 'border-poodle-100 bg-poodle-50 text-poodle-600 hover:border-poodle-800 hover:text-poodle-900';
                    return `<button type="button" data-experience="${window.meetballEscapeHtml(option.value)}" class="rounded-[1rem] border px-2 py-2.5 text-center text-[13px] font-black transition-all ${selectedClass}">${window.meetballEscapeHtml(option.label)}</button>`;
                }).join('');
                container.querySelectorAll('[data-experience]').forEach(button => {
                    button.addEventListener('click', () => {
                        welcomeState.experienceYears = button.dataset.experience;
                        syncWelcomeFields();
                        updateWelcomeExperienceButtonLabel();
                        renderWelcomeExperienceOptions();
                        closeWelcomeExperienceDropdown();
                    });
                });
            }

            function updateWelcomeTechStackButton(button, tech) {
                if (!button) return;
                const selected = welcomeState.techStacks.includes(tech);
                button.innerHTML = window.meetballTechStackChipHtml(tech, {
                    selected,
                    className: 'inline-flex items-center gap-2 px-3 py-2 rounded-full border text-[10px] font-black'
                });
                button.setAttribute('aria-pressed', selected ? 'true' : 'false');
            }

            function renderWelcomeTechStackOptions() {
                const container = document.getElementById('welcomeTechStackOptions');
                if (!container) return;
                const existingButtons = container.querySelectorAll('[data-tech]');

                if (existingButtons.length !== window.meetballTechStackOptions.length) {
                    container.innerHTML = window.meetballTechStackOptions.map(tech =>
                        `<button type="button" data-tech="${window.meetballEscapeHtml(tech)}"></button>`
                    ).join('');
                    container.querySelectorAll('[data-tech]').forEach(button => {
                        button.addEventListener('click', () => toggleWelcomeTechStack(button.dataset.tech, button));
                    });
                }

                container.querySelectorAll('[data-tech]').forEach(button => {
                    updateWelcomeTechStackButton(button, button.dataset.tech);
                });
                syncWelcomeFields();
            }

            function toggleWelcomeTechStack(tech, button) {
                const index = welcomeState.techStacks.indexOf(tech);
                if (index >= 0) {
                    welcomeState.techStacks.splice(index, 1);
                } else {
                    welcomeState.techStacks.push(tech);
                }
                updateWelcomeTechStackButton(button, tech);
                syncWelcomeFields();
            }

            function updateWelcomeStepUi() {
                closeWelcomePositionDropdown();
                closeWelcomeExperienceDropdown();
                document.querySelectorAll('[data-welcome-step]').forEach(section => {
                    section.classList.toggle('hidden', Number(section.dataset.welcomeStep) !== welcomeCurrentStep);
                });

                document.querySelectorAll('[data-step-indicator]').forEach(indicator => {
                    const step = Number(indicator.dataset.stepIndicator);
                    const completed = step < welcomeCurrentStep;
                    const active = step === welcomeCurrentStep;
                    indicator.classList.toggle('bg-poodle-800', active || completed);
                    indicator.classList.toggle('text-white', active || completed);
                    indicator.classList.toggle('bg-poodle-100', !active && !completed);
                    indicator.classList.toggle('text-poodle-300', !active && !completed);
                });

                document.querySelectorAll('[data-step-line]').forEach(line => {
                    const step = Number(line.dataset.stepLine);
                    const active = step < welcomeCurrentStep;
                    line.classList.toggle('bg-poodle-800', active);
                    line.classList.toggle('bg-poodle-100', !active);
                });

                const headlineNode = document.getElementById('welcomeHeadline');
                const subtitleNode = document.getElementById('welcomeSubtitle');
                const prevButton = document.getElementById('welcomePrevButton');
                const nextButton = document.getElementById('welcomeNextButton');
                const submitButton = document.getElementById('welcomeSubmitButton');
                if (headlineNode) headlineNode.textContent = welcomeStepCopy[welcomeCurrentStep]?.title || '';
                if (subtitleNode) subtitleNode.textContent = welcomeStepCopy[welcomeCurrentStep]?.subtitle || '';
                if (prevButton) prevButton.classList.toggle('hidden', welcomeCurrentStep === 1);
                if (nextButton) nextButton.classList.toggle('hidden', welcomeCurrentStep === 3);
                if (submitButton) submitButton.classList.toggle('hidden', welcomeCurrentStep !== 3);
            }

            async function validateWelcomeStep(step) {
                if (step === 1) {
                    welcomeState.name = document.getElementById('welcomeName')?.value.trim() || '';
                    welcomeState.nickname = document.getElementById('welcomeNickname')?.value.trim() || '';
                    welcomeState.phoneNumber = formatWelcomePhoneNumber(document.getElementById('welcomePhoneNumber')?.value || '');
                    welcomeState.birthDate = document.getElementById('welcomeBirthDate')?.value || '';
                    if (!welcomeState.name) {
                        await meetballAlert('이름을 입력해주세요.');
                        return false;
                    }
                    if (!welcomeState.nickname) {
                        await meetballAlert('닉네임을 입력해주세요.');
                        return false;
                    }
                    if (!welcomeState.phoneNumber) {
                        await meetballAlert('전화번호를 입력해주세요.');
                        return false;
                    }
                    if (welcomeState.phoneNumber.replace(/\D/g, '').length < 9) {
                        await meetballAlert('전화번호 형식을 다시 확인해주세요.');
                        return false;
                    }
                    if (!welcomeState.birthDate) {
                        await meetballAlert('생년월일을 입력해주세요.');
                        return false;
                    }
                    if (!welcomeState.gender) {
                        await meetballAlert('성별을 선택해주세요.');
                        return false;
                    }
                    return true;
                }

                if (step === 2) {
                    welcomeState.organization = document.getElementById('welcomeOrganization')?.value.trim() || '';
                    if (!welcomeState.position) {
                        await meetballAlert('포지션을 선택해주세요.');
                        return false;
                    }
                    if (!welcomeState.experienceYears) {
                        await meetballAlert('경력을 선택해주세요.');
                        return false;
                    }
                    return true;
                }

                if (step === 3 && welcomeState.techStacks.length === 0) {
                    await meetballAlert('기술 스택을 1개 이상 선택해주세요.');
                    return false;
                }

                return true;
            }

            syncWelcomeFields();
            lockWelcomeModalScroll();
            renderWelcomeGenderOptions();
            renderWelcomeOrgVisibleOptions();
            renderWelcomePositionOptions();
            renderWelcomeExperienceOptions();
            updateWelcomePositionButtonLabel();
            updateWelcomeExperienceButtonLabel();
            renderWelcomeTechStackOptions();
            updateWelcomeStepUi();

            document.getElementById('welcomeName')?.addEventListener('input', (event) => {
                welcomeState.name = event.target.value;
            });
            document.getElementById('welcomeNickname')?.addEventListener('input', (event) => {
                welcomeState.nickname = event.target.value;
            });
            document.getElementById('welcomePhoneNumber')?.addEventListener('input', (event) => {
                const formatted = formatWelcomePhoneNumber(event.target.value);
                event.target.value = formatted;
                welcomeState.phoneNumber = formatted;
            });
            document.getElementById('welcomeBirthDate')?.addEventListener('change', (event) => {
                welcomeState.birthDate = event.target.value;
            });
            document.getElementById('welcomeOrganization')?.addEventListener('input', (event) => {
                welcomeState.organization = event.target.value;
            });

            document.addEventListener('click', (event) => {
                if (!event.target.closest('#welcomePositionDropdownWrap')) {
                    closeWelcomePositionDropdown();
                }
                if (!event.target.closest('#welcomeExperienceDropdownWrap')) {
                    closeWelcomeExperienceDropdown();
                }
            });

            document.getElementById('welcomePrevButton')?.addEventListener('click', () => {
                welcomeCurrentStep = Math.max(1, welcomeCurrentStep - 1);
                updateWelcomeStepUi();
            });

            document.getElementById('welcomeNextButton')?.addEventListener('click', async () => {
                const valid = await validateWelcomeStep(welcomeCurrentStep);
                if (!valid) {
                    return;
                }
                welcomeCurrentStep = Math.min(3, welcomeCurrentStep + 1);
                updateWelcomeStepUi();
            });

            document.getElementById('welcomeProfileForm')?.addEventListener('submit', async (e) => {
                e.preventDefault();

                for (const step of [1, 2, 3]) {
                    const valid = await validateWelcomeStep(step);
                    if (!valid) {
                        welcomeCurrentStep = step;
                        updateWelcomeStepUi();
                        return;
                    }
                }

                const payload = {
                    name: document.getElementById('welcomeName')?.value.trim() || '',
                    nickname: document.getElementById('welcomeNickname')?.value.trim() || '',
                    phoneNumber: formatWelcomePhoneNumber(document.getElementById('welcomePhoneNumber')?.value || ''),
                    birthDate: document.getElementById('welcomeBirthDate')?.value || '',
                    gender: welcomeState.gender,
                    position: welcomeState.position,
                    experienceYears: welcomeState.experienceYears,
                    organization: document.getElementById('welcomeOrganization')?.value.trim() || '',
                    orgVisible: Boolean(welcomeState.orgVisible),
                    techStacks: [...welcomeState.techStacks]
                };

                try {
                    const response = await meetballFetch('/api/mypage/onboarding', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        unlockWelcomeModalScroll();
                        document.getElementById('welcomeProfileModal').style.display = 'none';
                        window.location.reload();
                        return;
                    }

                    const errorMsg = await response.text();
                    await meetballAlert('저장 실패: ' + errorMsg, { type: 'error' });
                } catch (err) {
                    console.error(err);
                    await meetballAlert('서버와 통신 중 오류가 발생했습니다.', { type: 'error' });
                }
            });
    </script>
    </th:block>
</body>
</html>
