<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="commonHead(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:if="${_csrf != null}" th:content="${_csrf != null ? _csrf.token : ''}">
    <meta name="_csrf_header" th:if="${_csrf != null}" th:content="${_csrf != null ? _csrf.headerName : ''}">
    <title th:text="${title} + ' - Meetball'">Meetball</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard+Variable:wght@100..900&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script th:inline="javascript">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        poodle: {
                            50: '#F7F5F4',
                            100: '#EFEBE9',
                            200: '#D7CCC8',
                            300: '#A1887F',
                            400: '#8D6E63',
                            500: '#795548',
                            600: '#6D4C41',
                            700: '#5D4037',
                            800: '#4E342E',
                            900: '#3E2723',
                        },
                        meatball: {
                            DEFAULT: '#FF6B35',
                            50: '#FFF1ED',
                            100: '#FFE1D6',
                            200: '#FFC1AD',
                            300: '#FFA082',
                            400: '#FF8159',
                            500: '#FF6B35',
                            600: '#FF541A',
                            700: '#E64400',
                            800: '#BF3900',
                            900: '#992E00',
                        },
                        cream: '#EFEBE9',
                        cocoa: '#4E342E'
                    },
                    borderRadius: {
                        '4xl': '2rem',
                        '5xl': '3rem',
                    },
                    fontFamily: {
                        sans: ['"Pretendard Variable"', 'Pretendard', 'sans-serif'],
                    },
                    animation: {
                        'bounce-subtle': 'bounce-subtle 3s infinite',
                        'fade-in-up': 'fadeInUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards',
                        'modal-up': 'modalUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
                        'shine': 'shine 2s linear infinite',
                        'tail-wag': 'tail-wag 0.5s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        'tail-wag': {
                            'from': { transform: 'rotate(-10deg)' },
                            'to': { transform: 'rotate(10deg)' },
                        },
                        'bounce-subtle': {
                            '0%, 100%': { transform: 'translateY(-2%)' },
                            '50%': { transform: 'translateY(0)' },
                        },
                        'fadeInUp': {
                            'from': { opacity: '0', transform: 'translateY(30px)' },
                            'to': { opacity: '1', transform: 'translateY(0)' },
                        },
                        'modalUp': {
                            'from': { opacity: '0', transform: 'translateY(40px) scale(0.98)' },
                            'to': { opacity: '1', transform: 'translateY(0) scale(1)' },
                        },
                        'shine': {
                            '0%': { backgroundPosition: '-200% 0' },
                            '100%': { backgroundPosition: '200% 0' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        /* Global CSS Reset & Premium Scrollbar */
        * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        :root {
            --meetball-page-bg: #FDFBFA;
            --meetball-button-bg: #4E342E;
            --meetball-button-hover: #FF6B35;
            --meetball-button-text: #FFFFFF;
        }

        html {
            scrollbar-gutter: stable both-edges;
        }

        body {
            background-color: var(--meetball-page-bg);
            color: #4E342E;
            font-size: 14px;
            line-height: 1.5;
            overflow-x: clip;
        }

        body.bg-poodle-50,
        body[class~="bg-poodle-50"] {
            background-color: var(--meetball-page-bg) !important;
        }

        ::selection {
            background: #FFE9D3;
            color: #653728;
        }

        .meetball-card {
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(78, 52, 46, 0.08);
            box-shadow: 0 20px 52px rgba(78, 52, 46, 0.08);
        }

        .meetball-cream-panel {
            background: #F7F5F4;
            border: 1px solid rgba(78, 52, 46, 0.08);
        }

        .text-poodle-200 {
            color: #8D6E63 !important;
        }

        .text-poodle-300 {
            color: #795548 !important;
        }

        .text-poodle-400 {
            color: #6D4C41 !important;
        }

        .text-xs,
        .text-\[9px\],
        .text-\[10px\],
        .text-\[11px\],
        .text-\[12px\],
        .text-\[13px\] {
            font-size: 0.875rem !important;
            line-height: 1.45 !important;
        }

        .fa-solid,
        .fa-regular,
        .fa-brands {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: max(1.5rem, 1em) !important;
            line-height: 1 !important;
        }

        svg:not([width]):not([height]) {
            min-width: 1.5rem;
            min-height: 1.5rem;
        }

        button[class*="bg-poodle-6"],
        button[class*="bg-poodle-7"],
        button[class*="bg-poodle-8"],
        button[class*="bg-poodle-9"],
        button[class*="bg-meatball"],
        a[class*="bg-poodle-6"],
        a[class*="bg-poodle-7"],
        a[class*="bg-poodle-8"],
        a[class*="bg-poodle-9"],
        a[class*="bg-meatball"] {
            background-color: var(--meetball-button-bg) !important;
            color: var(--meetball-button-text) !important;
            border-color: transparent !important;
        }

        button[class*="bg-poodle-6"]:hover,
        button[class*="bg-poodle-7"]:hover,
        button[class*="bg-poodle-8"]:hover,
        button[class*="bg-poodle-9"]:hover,
        button[class*="bg-meatball"]:hover,
        a[class*="bg-poodle-6"]:hover,
        a[class*="bg-poodle-7"]:hover,
        a[class*="bg-poodle-8"]:hover,
        a[class*="bg-poodle-9"]:hover,
        a[class*="bg-meatball"]:hover {
            background-color: var(--meetball-button-hover) !important;
            color: var(--meetball-button-text) !important;
        }
        
        .progress-bar-shine {
            background-size: 200% 100%;
            animation: shine 2s linear infinite;
            background-image: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
        }
    </style>

    <script>
        window.meetballEscapeHtml = function(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        };

        window.meetballSafeUrl = function(value, fallback = '#') {
            const raw = String(value ?? '').trim();
            if (!raw) return fallback;
            if (/[<>"'\u0000-\u001F\u007F]/.test(raw)) return fallback;
            if (raw.startsWith('/')) return raw.startsWith('//') ? fallback : raw;
            try {
                const url = new URL(raw);
                return ['http:', 'https:'].includes(url.protocol) ? url.href : fallback;
            } catch (error) {
                return fallback;
            }
        };

        window.meetballPositionOptions = /*[[${meetballPositionOptions}]]*/ [
            '프론트엔드', '백엔드', '풀스택', '디자이너', 'IOS', '안드로이드', '임베디드SW',
            '게임', '서버', '데브옵스', '매니저(PM)', '기획자', '마케터', '사업',
            '데이터/AI', '보안', 'DBA', 'QA', '기타'
        ];

        window.meetballProjectPurposeOptions = /*[[${meetballProjectPurposeOptions}]]*/ [
            { code: 'PROJECT', label: '프로젝트' },
            { code: 'STUDY', label: '스터디' },
            { code: 'HACKATHON', label: '해커톤' },
            { code: 'CONTEST', label: '공모전' },
            { code: 'STARTUP', label: '스타트업' },
            { code: 'ENTERPRISE_LINK', label: '기업연계' },
            { code: 'GOVERNMENT_LINK', label: '정부연계' }
        ];

        window.meetballTechStackOptions = /*[[${meetballTechStackOptions}]]*/ [
            'JavaScript', 'TypeScript', 'React', 'Vue', 'Nodejs', 'Spring', 'Java', 'Nextjs',
            'Nestjs', 'Express', 'Go', 'C', 'Python', 'Django', 'Swift', 'Kotlin',
            'MySQL', 'MongoDB', 'php', 'GraphQL', 'Firebase', 'ReactNative', 'Unity',
            'Flutter', 'AWS', 'Kubernetes', 'Docker', 'Git', 'Figma', 'Zeplin', 'Jest', 'Svelte'
        ];

        window.meetballTechStackCategories = /*[[${meetballTechStackCategories}]]*/ {
            '인기': ['JavaScript', 'TypeScript', 'React', 'Spring', 'Java', 'Nextjs', 'Figma', 'AWS'],
            '프론트엔드': ['JavaScript', 'TypeScript', 'React', 'Vue', 'Nextjs', 'Svelte'],
            '백엔드': ['Nodejs', 'Spring', 'Java', 'Nestjs', 'Express', 'Go', 'Python', 'Django', 'php', 'GraphQL'],
            '모바일': ['Swift', 'Kotlin', 'ReactNative', 'Flutter'],
            '기타': ['MySQL', 'MongoDB', 'Firebase', 'Unity', 'AWS', 'Kubernetes', 'Docker', 'Git', 'Figma', 'Zeplin', 'Jest', 'C'],
            '모두보기': window.meetballTechStackOptions
        };
        if (!window.meetballTechStackCategories['모두보기']) {
            window.meetballTechStackCategories['모두보기'] = window.meetballTechStackOptions;
        }

        window.meetballTechStackMeta = /*[[${meetballTechStackMeta}]]*/ {
            JavaScript: { label: 'JS', icon: '/img/tech-stack/javascript.svg', accent: '#F7DF1E', text: '#2D2D2D', bg: '#FFF8CC' },
            TypeScript: { label: 'TS', icon: '/img/tech-stack/typescript.svg', accent: '#3178C6', text: '#FFFFFF', bg: '#3178C6' },
            React: { icon: '/img/tech-stack/react.svg', accent: '#61DAFB', text: '#15AABF', bg: '#ECFEFF' },
            Vue: { icon: '/img/tech-stack/vue.svg', accent: '#42B883', text: '#2F855A', bg: '#ECFDF5' },
            Nodejs: { icon: '/img/tech-stack/nodejs.svg', accent: '#6CC24A', text: '#44883E', bg: '#F0FDF4' },
            Spring: { label: 'S', icon: '/img/tech-stack/spring.svg', accent: '#6DB33F', text: '#6DB33F', bg: '#F0FDF4' },
            Java: { icon: '/img/tech-stack/java.svg', accent: '#E76F00', text: '#E76F00', bg: '#FFF7ED' },
            Nextjs: { label: 'N', icon: '/img/tech-stack/nextjs.svg', accent: '#000000', text: '#FFFFFF', bg: '#000000' },
            Nestjs: { label: 'N', icon: '/img/tech-stack/nestjs.svg', accent: '#E0234E', text: '#E0234E', bg: '#FFF1F2' },
            Express: { label: 'ex', icon: '/img/tech-stack/express.svg', accent: '#111827', text: '#111827', bg: '#F9FAFB' },
            Go: { label: 'Go', icon: '/img/tech-stack/go.svg', accent: '#00ADD8', text: '#00ADD8', bg: '#ECFEFF' },
            C: { label: 'C', icon: '/img/tech-stack/c.svg', accent: '#5C8DBC', text: '#315C8A', bg: '#EFF6FF' },
            Python: { icon: '/img/tech-stack/python.svg', accent: '#3776AB', text: '#3776AB', bg: '#EFF6FF' },
            Django: { label: 'dj', icon: '/img/tech-stack/django.svg', accent: '#0C4B33', text: '#0C4B33', bg: '#ECFDF5' },
            Swift: { icon: '/img/tech-stack/swift.svg', accent: '#FA7343', text: '#EA580C', bg: '#FFF7ED' },
            Kotlin: { label: 'K', icon: '/img/tech-stack/kotlin.svg', accent: '#7F52FF', text: '#7F52FF', bg: '#F5F3FF' },
            MySQL: { label: 'My', icon: '/img/tech-stack/mysql.svg', accent: '#00758F', text: '#00758F', bg: '#ECFEFF' },
            MongoDB: { label: 'M', icon: '/img/tech-stack/mongodb.svg', accent: '#47A248', text: '#2F7D32', bg: '#F0FDF4' },
            php: { label: 'php', icon: '/img/tech-stack/php.svg', accent: '#777BB4', text: '#5B5F9E', bg: '#F5F3FF' },
            GraphQL: { label: 'G', icon: '/img/tech-stack/graphql.svg', accent: '#E10098', text: '#E10098', bg: '#FDF2F8' },
            Firebase: { label: 'F', icon: '/img/tech-stack/firebase.svg', accent: '#FFCA28', text: '#F57C00', bg: '#FFFBEB' },
            ReactNative: { icon: '/img/tech-stack/reactnative.svg', accent: '#61DAFB', text: '#15AABF', bg: '#ECFEFF' },
            Unity: { icon: '/img/tech-stack/unity.svg', accent: '#111827', text: '#111827', bg: '#F9FAFB' },
            Flutter: { label: 'F', icon: '/img/tech-stack/flutter.svg', accent: '#54C5F8', text: '#027DFD', bg: '#EFF6FF' },
            AWS: { icon: '/img/tech-stack/aws.svg', accent: '#FF9900', text: '#232F3E', bg: '#FFF7ED' },
            Kubernetes: { label: 'K8s', icon: '/img/tech-stack/kubernetes.svg', accent: '#326CE5', text: '#326CE5', bg: '#EFF6FF' },
            Docker: { icon: '/img/tech-stack/docker.svg', accent: '#2496ED', text: '#0B75C9', bg: '#EFF6FF' },
            Git: { icon: '/img/tech-stack/git.svg', accent: '#F05032', text: '#E24329', bg: '#FFF1F2' },
            Figma: { icon: '/img/tech-stack/figma.svg', accent: '#A259FF', text: '#A259FF', bg: '#FAF5FF' },
            Zeplin: { label: 'Z', icon: '/img/tech-stack/zeplin.svg', accent: '#FDBD39', text: '#D97706', bg: '#FFFBEB' },
            Jest: { label: 'J', icon: '/img/tech-stack/jest.svg', accent: '#99425B', text: '#99425B', bg: '#FFF1F2' },
            Svelte: { label: 'S', icon: '/img/tech-stack/svelte.svg', accent: '#FF3E00', text: '#FF3E00', bg: '#FFF7ED' }
        };

        window.meetballTechStackLogoHtml = function(tech, selected = false) {
            const safeTech = window.meetballEscapeHtml(tech);
            const meta = window.meetballTechStackMeta[tech] || {
                label: safeTech.slice(0, 2).toUpperCase(),
                accent: '#9CA3AF',
                text: '#374151',
                bg: '#F9FAFB'
            };
            const iconValue = typeof meta.icon === 'string' ? meta.icon.trim() : '';
            const isImageIcon = iconValue.startsWith('/img/') || iconValue.endsWith('.svg');
            const content = iconValue
                ? (isImageIcon
                    ? `<img src="${window.meetballEscapeHtml(iconValue)}" alt="${safeTech} logo" class="w-5 h-5 object-contain" loading="lazy">`
                    : `<i class="${window.meetballEscapeHtml(iconValue)} text-lg"></i>`)
                : `<span class="text-[11px] font-black leading-none">${window.meetballEscapeHtml(meta.label)}</span>`;
            return `
                <span class="w-9 h-9 rounded-full border-2 flex items-center justify-center shrink-0"
                      style="border-color:${selected ? 'rgba(255,255,255,0.36)' : meta.accent}; color:${meta.text}; background:${meta.bg};">
                    ${content}
                </span>
            `;
        };

        window.meetballTechStackChipHtml = function(tech, options = {}) {
            const selected = Boolean(options.selected);
            const safeTech = window.meetballEscapeHtml(tech);
            const baseClass = options.className || 'inline-flex items-center gap-2 px-3 py-2 rounded-full border text-xs font-black transition-all';
            const stateClass = selected
                ? ' bg-poodle-900 text-white border-poodle-900 shadow-lg shadow-poodle-900/10'
                : ' bg-white text-poodle-700 border-poodle-100';
            return `<span class="${baseClass}${stateClass}" data-tech-chip="${safeTech}">${window.meetballTechStackLogoHtml(tech, selected)}<span>${safeTech}</span></span>`;
        };

        window.meetballEnhanceStaticTechChips = function(root = document) {
            root.querySelectorAll('[data-tech-chip]').forEach(node => {
                if (node.dataset.enhanced === 'true') return;
                const tech = node.getAttribute('data-tech-chip') || node.textContent.trim();
                node.innerHTML = `${window.meetballTechStackLogoHtml(tech)}<span>${window.meetballEscapeHtml(tech)}</span>`;
                node.classList.add('inline-flex', 'items-center', 'gap-2');
                node.dataset.enhanced = 'true';
            });
        };

        document.addEventListener('DOMContentLoaded', () => window.meetballEnhanceStaticTechChips());

        window.meetballFetch = function(input, init = {}) {
            const method = (init.method || 'GET').toUpperCase();
            const safeMethod = ['GET', 'HEAD', 'OPTIONS', 'TRACE'].includes(method);
            const headers = new Headers(init.headers || {});

            if (!safeMethod) {
                const token = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');
                const headerName = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content');
                if (token && headerName && !headers.has(headerName)) {
                    headers.set(headerName, token);
                }
            }

            return fetch(input, { ...init, headers });
        };

        window.meetballDialog = function(options = {}) {
            return new Promise(resolve => {
                document.getElementById('meetballGlobalDialog')?.remove();

                const type = options.type || 'alert';
                const hasPrompt = Boolean(options.prompt);
                const previousOverflow = document.body?.style.overflow || '';
                const modal = document.createElement('div');
                modal.id = 'meetballGlobalDialog';
                modal.className = 'fixed inset-0 z-[300] flex items-center justify-center p-6';
                modal.setAttribute('role', 'dialog');
                modal.setAttribute('aria-modal', 'true');

                modal.innerHTML = `
                    <div data-dialog-backdrop class="absolute inset-0 bg-poodle-900/60 backdrop-blur-md"></div>
                    <div class="relative w-full max-w-md bg-white rounded-[2.5rem] shadow-[0_40px_90px_rgba(45,27,23,0.24)] border border-white overflow-hidden animate-modal-up">
                        <div class="h-2 bg-gradient-to-r from-meatball via-poodle-300 to-meatball"></div>
                        <div class="p-9 space-y-7">
                            <div class="flex items-start gap-5">
                                <div data-dialog-icon class="w-12 h-12 rounded-2xl bg-poodle-50 text-meatball flex items-center justify-center shrink-0">
                                    <i class="fa-solid fa-circle-info"></i>
                                </div>
                                <div class="min-w-0">
                                    <h2 data-dialog-title class="text-2xl font-black text-poodle-900 tracking-tight"></h2>
                                    <p data-dialog-message class="mt-3 text-sm font-bold text-poodle-500 leading-relaxed whitespace-pre-line"></p>
                                </div>
                            </div>
                            <div data-dialog-prompt-wrap class="hidden">
                                <input data-dialog-prompt class="w-full px-5 py-4 bg-poodle-50 border border-poodle-100 rounded-2xl text-sm font-bold text-poodle-800 outline-none focus:bg-white focus:border-meatball/40 transition-all">
                            </div>
                            <div class="flex gap-3 pt-2">
                                <button type="button" data-dialog-cancel class="hidden flex-1 py-4 bg-poodle-50 text-poodle-400 rounded-2xl text-sm font-black hover:bg-poodle-100 hover:text-poodle-700 transition-all"></button>
                                <button type="button" data-dialog-confirm class="flex-1 py-4 bg-poodle-600 text-white rounded-2xl text-sm font-black shadow-xl shadow-poodle-600/15 hover:bg-meatball hover:text-poodle-900 transition-all"></button>
                            </div>
                        </div>
                    </div>
                `;

                const titleNode = modal.querySelector('[data-dialog-title]');
                const messageNode = modal.querySelector('[data-dialog-message]');
                const confirmButton = modal.querySelector('[data-dialog-confirm]');
                const cancelButton = modal.querySelector('[data-dialog-cancel]');
                const promptWrap = modal.querySelector('[data-dialog-prompt-wrap]');
                const promptInput = modal.querySelector('[data-dialog-prompt]');
                const icon = modal.querySelector('[data-dialog-icon] i');

                titleNode.textContent = options.title || (type === 'confirm' ? '확인' : type === 'prompt' ? '공유 링크' : '알림');
                messageNode.textContent = options.message || '';
                confirmButton.textContent = options.confirmText || '확인';

                if (type === 'confirm') icon.className = 'fa-solid fa-question';
                if (type === 'prompt') icon.className = 'fa-solid fa-link';
                if (type === 'error') icon.className = 'fa-solid fa-triangle-exclamation';

                if (options.cancelText) {
                    cancelButton.textContent = options.cancelText;
                    cancelButton.classList.remove('hidden');
                }

                if (hasPrompt) {
                    promptWrap.classList.remove('hidden');
                    promptInput.value = options.promptValue || '';
                    promptInput.placeholder = options.promptPlaceholder || '';
                }

                let settled = false;
                const close = result => {
                    if (settled) return;
                    settled = true;
                    document.removeEventListener('keydown', onKeyDown);
                    modal.remove();
                    if (document.body) document.body.style.overflow = previousOverflow;
                    resolve(result);
                };
                const onKeyDown = event => {
                    if (event.key === 'Escape') close(hasPrompt || options.cancelText ? null : true);
                    if (event.key === 'Enter' && hasPrompt && document.activeElement === promptInput) {
                        close(promptInput.value);
                    }
                };

                cancelButton.addEventListener('click', () => close(hasPrompt ? null : false));
                confirmButton.addEventListener('click', () => close(hasPrompt ? promptInput.value : true));
                modal.querySelector('[data-dialog-backdrop]').addEventListener('click', () => close(hasPrompt || options.cancelText ? null : true));
                document.addEventListener('keydown', onKeyDown);
                document.body.appendChild(modal);
                document.body.style.overflow = 'hidden';

                const focusTarget = hasPrompt ? promptInput : confirmButton;
                setTimeout(() => {
                    focusTarget.focus();
                    if (hasPrompt) focusTarget.select();
                }, 20);
            });
        };

        window.meetballAlert = function(message, options = {}) {
            return window.meetballDialog({
                title: options.title || '알림',
                message,
                confirmText: options.confirmText || '확인',
                type: options.type || 'alert'
            });
        };

        window.meetballConfirm = function(message, options = {}) {
            return window.meetballDialog({
                title: options.title || '확인',
                message,
                confirmText: options.confirmText || '확인',
                cancelText: options.cancelText || '취소',
                type: 'confirm'
            }).then(Boolean);
        };

        window.meetballPrompt = function(message, defaultValue = '', options = {}) {
            return window.meetballDialog({
                title: options.title || '입력',
                message,
                confirmText: options.confirmText || '확인',
                cancelText: options.cancelText || '닫기',
                prompt: true,
                promptValue: defaultValue,
                promptPlaceholder: options.promptPlaceholder || '',
                type: 'prompt'
            });
        };
    </script>
</head>
</html>
