<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${project.title + ' - Meetball'}">프로젝트 상세 - Meetball</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard+Variable:wght@100..900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#fdf8f6',
                            100: '#f2e8e5',
                            500: '#D2691E',
                            600: '#b45a17',
                            800: '#8B5A2B',
                            900: '#5c3a21',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#fdf8f6] text-gray-900">
<header th:replace="~{fragments/header :: mainHeader}"></header>

<main class="container mx-auto px-4 py-8">
    <div class="max-w-6xl mx-auto space-y-8">
        <section class="relative h-[24rem] rounded-[2rem] overflow-hidden shadow-xl">
            <img th:src="${project.thumbnailUrl}" th:alt="${project.title}" src="https://picsum.photos/seed/health/1200/600" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
            <div class="absolute bottom-10 left-10 right-10 text-white">
                <div class="flex flex-wrap items-center gap-3 mb-5">
                    <span th:text="${project.projectType}" class="px-4 py-1.5 bg-brand-600 rounded-lg text-xs font-black">사이드 프로젝트</span>
                    <span th:text="${project.position}" class="px-4 py-1.5 bg-white/20 backdrop-blur-md rounded-lg text-xs font-black">백엔드</span>
                    <span th:text="${project.deadlineLabel}" class="px-4 py-1.5 bg-white/20 backdrop-blur-md rounded-lg text-xs font-black">D-14</span>
                </div>
                <h1 th:text="${project.title}" class="text-4xl md:text-5xl font-black tracking-tight mb-4">프로젝트 제목</h1>
                <p class="text-white/70 font-medium">
                    등록일: <span th:text="${project.createdDateLabel}">2026.04.20</span>
                </p>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            <section class="lg:col-span-8 space-y-8">
                <article class="bg-white rounded-[2rem] p-8 border border-gray-100 shadow-sm">
                    <div class="flex items-center gap-3 mb-6">
                        <i class="fa-solid fa-file-lines text-brand-600 text-xl"></i>
                        <h2 class="text-2xl font-black text-gray-900">프로젝트 소개</h2>
                    </div>
                    <p th:text="${project.description}" class="text-gray-700 leading-relaxed font-medium">프로젝트 설명</p>
                </article>

                <article class="bg-white rounded-[2rem] p-8 border border-gray-100 shadow-sm">
                    <div class="flex items-center gap-3 mb-6">
                        <i class="fa-solid fa-layer-group text-brand-600 text-xl"></i>
                        <h2 class="text-2xl font-black text-gray-900">기술 스택</h2>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <span th:each="techStack : ${project.techStacks}" th:text="${techStack}" class="px-4 py-2 bg-brand-50 text-brand-800 rounded-xl text-xs font-black border border-brand-100">Spring Boot</span>
                    </div>
                </article>
            </section>

            <aside class="lg:col-span-4">
                <div class="bg-white rounded-[2rem] p-8 border border-gray-100 shadow-sm sticky top-24 space-y-6">
                    <div>
                        <p class="text-xs font-black text-gray-400 uppercase tracking-widest mb-3">리더</p>
                        <div class="flex items-center gap-3">
                            <img th:src="${project.leaderAvatarUrl}" th:alt="${project.leaderName}" src="https://api.dicebear.com/7.x/adventurer/svg?seed=poodle" class="w-12 h-12 rounded-xl shadow-sm bg-brand-50">
                            <div>
                                <p th:text="${project.leaderName}" class="font-black text-gray-900">김밋볼</p>
                                <p th:text="${project.leaderRole}" class="text-sm text-gray-500 font-medium">Backend Developer</p>
                            </div>
                        </div>
                    </div>

                    <div class="pt-4 border-t border-gray-50">
                        <p class="text-xs font-black text-gray-400 uppercase tracking-widest mb-3">모집 현황</p>
                        <div class="w-full h-2 bg-gray-100 rounded-full overflow-hidden">
                            <div class="h-full bg-brand-600 rounded-full" th:style="'width:' + ${project.progressPercent} + '%'"></div>
                        </div>
                        <p class="mt-3 text-sm font-black text-brand-800">
                            <span th:text="${project.currentRecruitment}">0</span> /
                            <span th:text="${project.totalRecruitment}">0</span>명 모집 중
                        </p>
                    </div>

                    <button type="button" class="w-full py-4 bg-brand-800 text-white rounded-2xl font-black hover:bg-brand-900 transition-colors">
                        프로젝트 지원하기
                    </button>
                    <a th:href="@{/}" class="block text-center py-3 bg-gray-50 text-gray-500 rounded-xl text-sm font-black hover:bg-gray-100 transition-colors">
                        목록으로 돌아가기
                    </a>
                </div>
            </aside>
        </div>
    </div>
</main>
</body>
</html>
