<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로젝트 등록 - Meetball</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard+Variable:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="bg-[#fdf8f6] text-gray-900 flex flex-col min-h-screen">
    <header th:replace="~{fragments/header :: mainHeader}"></header>

    <main class="flex-grow container mx-auto px-4 py-12">
        <div id="view-write" class="page-view active">
            <div class="max-w-4xl mx-auto">
                <h1 class="text-3xl font-black text-gray-900 mb-8">새 프로젝트 모집하기</h1>

                <div class="bg-white rounded-[2rem] p-8 md:p-12 border border-gray-100 shadow-sm space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <!-- 모집 인원 -->
                        <div>
                            <label class="block text-sm font-black text-gray-700 mb-3">모집 인원 <span
                                    class="text-red-500">*</span></label>
                            <select id="writeMembers"
                                class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm font-bold text-gray-700 outline-none focus:bg-white focus:border-brand-500">
                                <option value="인원 미정">인원 미정</option>
                                <option value="1명">1명</option>
                                <option value="2명">2명</option>
                                <option value="3명">3명</option>
                                <option value="4명 이상">4명 이상</option>
                            </select>
                        </div>

                        <!-- 진행 방식 -->
                        <div>
                            <label class="block text-sm font-black text-gray-700 mb-3">진행 방식 <span
                                    class="text-red-500">*</span></label>
                            <select id="writeMethod"
                                class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm font-bold text-gray-700 outline-none focus:bg-white focus:border-brand-500">
                                <option value="온라인">온라인</option>
                                <option value="오프라인">오프라인</option>
                                <option value="온/오프라인">온/오프라인 혼합</option>
                            </select>
                        </div>
                    </div>

                    <!-- 기술 스택 -->
                    <div>
                        <label class="block text-sm font-black text-gray-700 mb-3">사용 예정 기술 스택</label>
                        <div class="flex flex-wrap gap-2" id="write-tech-select">
                            <!-- JS 렌더링 -->
                        </div>
                    </div>

                    <!-- 제목 -->
                    <div>
                        <label class="block text-sm font-black text-gray-700 mb-3">프로젝트 제목 <span
                                class="text-red-500">*</span></label>
                        <input type="text" id="writeTitle" placeholder="프로젝트를 잘 나타내는 멋진 제목을 작성해주세요."
                            class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm font-bold text-gray-800 outline-none focus:bg-white focus:border-brand-500 transition-colors">
                    </div>

                    <!-- 본문 내용 -->
                    <div>
                        <label class="block text-sm font-black text-gray-700 mb-3">프로젝트 상세 내용 <span
                                class="text-red-500">*</span></label>
                        <textarea id="writeContent" rows="10" placeholder="프로젝트의 목적, 주요 기능, 우대 사항 등을 자유롭게 작성해주세요."
                            class="w-full bg-gray-50 border border-gray-200 rounded-xl p-5 text-sm font-medium text-gray-700 outline-none focus:bg-white focus:border-brand-500 transition-colors resize-y"></textarea>
                    </div>

                    <!-- 버튼 -->
                    <div class="flex justify-end gap-3 pt-4 border-t border-gray-100">
                        <button onclick="history.back()"
                            class="px-6 py-3 bg-gray-100 text-gray-600 font-bold rounded-xl text-sm hover:bg-gray-200 transition-colors">취소</button>
                        <button onclick="submitNewProject()"
                            class="px-8 py-3 bg-brand-800 text-white font-bold rounded-xl text-sm hover:bg-brand-900 transition-colors shadow-md">모집글
                            등록하기</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: mainFooter}"></footer>

    <script th:inline="javascript">
        const allTechStacks = [
            "React", "Vue", "TypeScript", "Node.js", "Spring Boot", 
            "Python", "Swift", "Flutter", "Figma", "AWS", "Docker"
        ];
        let selectedTechs = [];

        function renderWriteTechSelect() {
            const container = document.getElementById('write-tech-select');
            container.innerHTML = allTechStacks.map(tech => `
                <button onclick="toggleWriteTech('${tech}')" 
                    class="tech-pill px-4 py-2 rounded-full border border-gray-200 text-xs font-bold transition-all ${selectedTechs.includes(tech) ? 'active' : 'text-gray-500 bg-white hover:border-brand-300'}">
                    ${tech}
                </button>
            `).join('');
        }

        function toggleWriteTech(tech) {
            if (selectedTechs.includes(tech)) {
                selectedTechs = selectedTechs.filter(t => t !== tech);
            } else {
                selectedTechs.push(tech);
            }
            renderWriteTechSelect();
        }

        function submitNewProject() {
            const title = document.getElementById('writeTitle').value;
            if (!title) {
                alert('제목을 입력해주세요.');
                return;
            }
            alert('성공적으로 등록되었습니다!');
            location.href = '/';
        }

        window.onload = renderWriteTechSelect;
    </script>
</body>
</html>
