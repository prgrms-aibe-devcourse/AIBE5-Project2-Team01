<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: commonHead('프로젝트 관리')}"></head>

<body class="text-poodle-900">
    <header th:replace="~{fragments/header :: mainHeader}"></header>

    <main class="container mx-auto px-4 py-16">
        <div class="flex flex-col lg:flex-row gap-8 items-end justify-between mb-12">
            <div>
                <h1 class="text-4xl font-black text-poodle-900 tracking-tighter mb-3">프로젝트 관리</h1>
                <p class="text-poodle-400 font-bold italic">미트볼 푸들과 함께 팀원들을 고르고 프로젝트를 성공적으로 이끄세요.</p>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-12">
            <!-- Project Management Card -->
            <div class="bg-white rounded-5xl border border-poodle-50 shadow-sm overflow-hidden">
                <div class="p-10 bg-poodle-50/50 border-b border-poodle-50 flex items-center justify-between flex-wrap gap-6 text-center sm:text-left">
                    <div class="flex flex-col sm:flex-row items-center gap-6">
                        <img src="https://picsum.photos/seed/food/200" class="w-20 h-20 rounded-3xl object-cover shadow-lg border-2 border-white">
                        <div>
                            <span class="px-3 py-1 bg-meatball text-white rounded-lg text-[10px] font-black uppercase tracking-widest mb-2 inline-block">Recruiting</span>
                            <h2 class="text-2xl font-black text-poodle-900 leading-tight">AI 기반 맛집 추천 서비스</h2>
                        </div>
                    </div>
                    <div class="flex gap-3 w-full sm:w-auto">
                        <button class="flex-grow sm:flex-grow-0 px-6 py-3 bg-white border border-poodle-100 text-poodle-400 rounded-2xl font-black text-sm hover:bg-poodle-50 transition-colors">수정</button>
                        <button class="flex-grow sm:flex-grow-0 px-6 py-3 bg-poodle-700 text-white rounded-2xl font-black text-sm shadow-xl shadow-poodle-700/10 hover:bg-poodle-900 transition-colors">모집 마감</button>
                    </div>
                </div>

                <div class="p-10 space-y-12">
                    <div>
                        <div class="flex items-center justify-between mb-8">
                            <h3 class="text-xl font-black text-poodle-900 flex items-center gap-3">
                                <i class="fa-solid fa-users text-meatball"></i>
                                지원자 현황 <span class="bg-poodle-100 text-poodle-600 px-3 py-1 rounded-full text-xs ml-1 italic">2명</span>
                            </h3>
                            <button class="text-[10px] font-black text-poodle-300 uppercase tracking-widest hover:text-meatball transition-colors">전체 보기 <i class="fa-solid fa-chevron-right ml-1"></i></button>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            <!-- Applicant Card 1 -->
                            <div class="p-8 rounded-4xl bg-poodle-50/20 border border-poodle-50 group hover:border-meatball/20 transition-all">
                                <div class="flex items-center gap-4 mb-8 text-left">
                                    <div class="relative">
                                        <img src="https://picsum.photos/seed/user2/100" class="w-14 h-14 rounded-2xl shadow-sm border border-white">
                                        <div class="absolute -top-1 -right-1 w-4 h-4 bg-meatball rounded-full border-2 border-white animate-pulse"></div>
                                    </div>
                                    <div class="flex-grow">
                                        <h4 class="font-black text-poodle-900 leading-tight">디자인요정</h4>
                                        <span class="text-[10px] font-black text-poodle-300 uppercase tracking-widest italic leading-none">UI/UX Designer</span>
                                    </div>
                                </div>
                                <p class="text-sm text-poodle-400 font-medium line-clamp-2 mb-8 leading-relaxed italic text-left">"안녕하세요! 맛집 추천 앱 디자인에 정말 관심이 많습니다..."</p>
                                <button onclick="openApplicantModal('디자인요정', 'UI/UX Designer', '안녕하세요! 맛집 추천 앱 디자인에 정말 관심이 많습니다. 피그마 사용 숙련도가 높고 팀 프로젝트 경험도 다수 있습니다. 함께하고 싶어요!', 'https://picsum.photos/seed/user2/100')" 
                                    class="w-full py-4 bg-white border border-poodle-100 text-poodle-600 text-xs font-black rounded-2xl hover:bg-poodle-50 hover:border-meatball transition-all uppercase tracking-widest">상세 보기</button>
                            </div>

                            <!-- Applicant Card 2 -->
                            <div class="p-8 rounded-4xl bg-poodle-50/20 border border-poodle-50 group hover:border-meatball/20 transition-all">
                                <div class="flex items-center gap-4 mb-8 text-left">
                                    <div class="relative">
                                        <img src="https://picsum.photos/seed/user4/100" class="w-14 h-14 rounded-2xl shadow-sm border border-white">
                                        <div class="absolute -top-1 -right-1 w-4 h-4 bg-meatball rounded-full border-2 border-white animate-pulse"></div>
                                    </div>
                                    <div class="flex-grow">
                                        <h4 class="font-black text-poodle-900 leading-tight">서버마스터</h4>
                                        <span class="text-[10px] font-black text-poodle-300 uppercase tracking-widest italic leading-none">Backend Master</span>
                                    </div>
                                </div>
                                <p class="text-sm text-poodle-400 font-medium line-clamp-2 mb-8 leading-relaxed italic text-left">"Node.js 백엔드 개발자입니다. 대규모 트래픽 처리에 자신 있습니다."</p>
                                <button onclick="openApplicantModal('서버마스터', 'Backend Master', 'Node.js 백엔드 개발자입니다. 대규모 트래픽 처리에 자신 있습니다. 안정적인 서버 아키텍처 설계를 좋아해요!', 'https://picsum.photos/seed/user4/100')" 
                                    class="w-full py-4 bg-white border border-poodle-100 text-poodle-600 text-xs font-black rounded-2xl hover:bg-poodle-50 hover:border-meatball transition-all uppercase tracking-widest">상세 보기</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 🐾 Applicant Detail Modal -->
    <div id="applicantModal" class="fixed inset-0 z-[100] hidden">
        <div class="absolute inset-0 bg-poodle-900/40 backdrop-blur-sm transition-opacity" onclick="closeApplicantModal()"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4 pointer-events-none">
            <div class="bg-white w-full max-w-xl rounded-[3rem] shadow-[0_32px_64px_-12px_rgba(62,39,35,0.2)] overflow-hidden pointer-events-auto transform transition-all animate-modal-up">
                <div class="relative p-10 pb-6 border-b border-poodle-50 text-center">
                    <button onclick="closeApplicantModal()" class="absolute top-10 right-10 w-10 h-10 bg-poodle-50 text-poodle-300 rounded-full flex items-center justify-center hover:bg-poodle-100 transition-all">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                    <div class="inline-flex w-16 h-16 bg-blue-50 text-blue-500 rounded-2xl items-center justify-center mb-4">
                        <i class="fa-solid fa-file-invoice text-2xl"></i>
                    </div>
                    <h2 class="text-3xl font-black text-poodle-900 tracking-tight">지원자 상세 프로필</h2>
                </div>

                <div class="p-10 space-y-10 max-h-[60vh] overflow-y-auto no-scrollbar">
                    <div class="flex items-center gap-6 p-8 bg-poodle-50/50 rounded-[2.5rem] border border-poodle-100">
                        <img id="modalImg" src="" class="w-20 h-20 bg-white rounded-2xl shadow-sm border border-poodle-50">
                        <div class="space-y-2">
                            <h4 id="modalName" class="text-2xl font-black text-poodle-900">지원자명</h4>
                            <div class="flex items-center gap-2">
                                <span id="modalRole" class="px-3 py-1 bg-meatball/10 text-meatball rounded-lg text-[10px] font-black uppercase tracking-widest">POSITION</span>
                                <span class="bg-poodle-50 text-poodle-300 px-2.5 py-1 rounded-lg text-[9px] font-black uppercase tracking-tighter shadow-sm border border-poodle-100">Verified</span>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <h5 class="text-xs font-black text-poodle-300 uppercase tracking-[0.2em] italic ml-1">Application Message</h5>
                        <div id="modalMsg" class="p-8 bg-poodle-50/30 border-2 border-transparent hover:border-meatball/10 rounded-[2rem] font-bold text-poodle-600 leading-relaxed text-sm italic transition-all">
                            메시지 내용이 여기에 표시됩니다.
                        </div>
                    </div>
                </div>

                <div class="p-10 pt-0 flex gap-4">
                    <button onclick="closeApplicantModal()" class="flex-1 py-5 bg-poodle-50 text-red-400 rounded-2xl font-black text-sm hover:bg-red-50 transition-all uppercase tracking-widest">Reject</button>
                    <button class="flex-[2] py-5 bg-meatball text-white rounded-2xl font-black text-sm shadow-xl shadow-meatball/20 hover:scale-[1.02] active:scale-[0.98] transition-all uppercase tracking-widest">Accept</button>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/footer :: mainFooter}"></footer>

    <style>
        /* 🎨 Manage Page UI Expansion */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

    <script>
        function openApplicantModal(name, role, msg, img) {
            document.getElementById('modalName').innerText = name;
            document.getElementById('modalRole').innerText = role;
            document.getElementById('modalMsg').innerText = `"${msg}"`;
            document.getElementById('modalImg').src = img;
            
            document.getElementById('applicantModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeApplicantModal() {
            document.getElementById('applicantModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
