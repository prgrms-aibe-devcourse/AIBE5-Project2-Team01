<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: commonHead('프로젝트 관리')}"></head>

<body class="text-poodle-900">
    <header th:replace="~{fragments/header :: mainHeader}"></header>
    <input type="hidden" id="projectId" th:value="${projectId}">

    <main class="container mx-auto px-4 py-16">
        <div class="flex flex-col lg:flex-row gap-8 items-end justify-between mb-12">
            <div>
                <h1 class="text-4xl font-black text-poodle-900 tracking-tighter mb-3">프로젝트 관리</h1>
                <p class="text-poodle-400 font-bold italic">미트볼 푸들과 함께 팀원들을 고르고 프로젝트를 성공적으로 이끄세요.</p>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-12">
            <!-- Project Management Card -->
            <div class="bg-white rounded-5xl border border-poodle-50 shadow-sm overflow-hidden">
                <div
                    class="p-10 bg-poodle-50/50 border-b border-poodle-50 flex items-center justify-between flex-wrap gap-6 text-center sm:text-left">
                    <div class="flex flex-col sm:flex-row items-center gap-6">
                        <img src="https://picsum.photos/seed/food/200"
                            class="w-20 h-20 rounded-3xl object-cover shadow-lg border-2 border-white">
                        <div>
                            <span
                                class="px-3 py-1 bg-meatball text-white rounded-lg text-[10px] font-black uppercase tracking-widest mb-2 inline-block">Recruiting</span>
                            <h2 class="text-2xl font-black text-poodle-900 leading-tight">AI 기반 맛집 추천 서비스</h2>
                        </div>
                    </div>
                    <div class="flex gap-3 w-full sm:w-auto">
                        <button onclick="deleteProject()"
                            class="flex-grow sm:flex-grow-0 px-6 py-3 bg-red-50 border border-red-200 text-red-500 rounded-2xl font-black text-sm hover:bg-red-100 transition-colors">프로젝트 삭제</button>
                        <button
                            class="flex-grow sm:flex-grow-0 px-6 py-3 bg-white border border-poodle-100 text-poodle-400 rounded-2xl font-black text-sm hover:bg-poodle-50 transition-colors">수정</button>
                        <button onclick="closeProject()"
                            class="flex-grow sm:flex-grow-0 px-6 py-3 bg-poodle-700 text-white rounded-2xl font-black text-sm shadow-xl shadow-poodle-700/10 hover:bg-poodle-900 transition-colors">모집
                            마감</button>
                    </div>
                </div>

                <div class="p-10 space-y-12">
                    <div>
                        <div class="flex items-center justify-between mb-8">
                            <h3 class="text-xl font-black text-poodle-900 flex items-center gap-3">
                                <i class="fa-solid fa-users text-meatball"></i>
                                지원자 현황 <span id="applicant-count"
                                    class="bg-poodle-100 text-poodle-600 px-3 py-1 rounded-full text-xs ml-1 italic">0명</span>
                            </h3>
                            <button
                                class="text-[10px] font-black text-poodle-300 uppercase tracking-widest hover:text-meatball transition-colors">전체
                                보기 <i class="fa-solid fa-chevron-right ml-1"></i></button>
                        </div>

                        <div id="applications-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            <!-- JS Rendered -->
                        </div>
                    </div>

                    <!-- 첨부파일 관리 섹션 (추가) -->
                    <div class="mt-12 pt-12 border-t border-poodle-50">
                        <div class="flex items-center justify-between mb-8">
                            <h3 class="text-xl font-black text-poodle-900 flex items-center gap-3">
                                <i class="fa-solid fa-paperclip text-meatball"></i>
                                첨부파일 관리
                            </h3>
                        </div>

                        <!-- 업로드 폼 -->
                        <div
                            class="p-8 rounded-4xl bg-poodle-50/20 border-2 border-dashed border-poodle-100 hover:border-meatball/30 transition-all text-center">
                            <form id="attachmentForm" class="flex flex-col items-center gap-4">
                                <div
                                    class="w-16 h-16 bg-white rounded-full flex items-center justify-center text-poodle-300 shadow-sm mb-2">
                                    <i class="fa-solid fa-cloud-arrow-up text-2xl"></i>
                                </div>
                                <div>
                                    <p class="font-black text-poodle-900">클릭하거나 파일을 드래그하여 업로드하세요</p>
                                    <p class="text-xs text-poodle-400 font-bold mt-1">포트폴리오, 기획서 등 모든 파일 업로드 가능</p>
                                </div>
                                <input type="file" id="fileInput" name="file" class="hidden"
                                    onchange="uploadAttachment()" />
                                <button type="button" onclick="document.getElementById('fileInput').click()"
                                    class="mt-4 px-8 py-3 bg-white border border-poodle-200 text-poodle-600 rounded-2xl font-black text-sm hover:bg-poodle-50 hover:border-meatball hover:text-meatball transition-all">
                                    파일 선택
                                </button>
                            </form>
                        </div>

                        <!-- 업로드된 파일 목록 -->
                        <div class="mt-8 space-y-4" id="attachmentList">
                            <!-- JS를 통해 동적으로 로드되는 첨부파일 항목들 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 🐾 Applicant Detail Modal -->
    <div id="applicantModal" class="fixed inset-0 z-[100] hidden">
        <div class="absolute inset-0 bg-poodle-900/40 backdrop-blur-sm transition-opacity"
            onclick="closeApplicantModal()"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4 pointer-events-none">
            <div
                class="bg-white w-full max-w-xl rounded-[3rem] shadow-[0_32px_64px_-12px_rgba(62,39,35,0.2)] overflow-hidden pointer-events-auto transform transition-all animate-modal-up">
                <div class="relative p-10 pb-6 border-b border-poodle-50 text-center">
                    <button onclick="closeApplicantModal()"
                        class="absolute top-10 right-10 w-10 h-10 bg-poodle-50 text-poodle-300 rounded-full flex items-center justify-center hover:bg-poodle-100 transition-all">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                    <div
                        class="inline-flex w-16 h-16 bg-blue-50 text-blue-500 rounded-2xl items-center justify-center mb-4">
                        <i class="fa-solid fa-file-invoice text-2xl"></i>
                    </div>
                    <h2 class="text-3xl font-black text-poodle-900 tracking-tight">지원자 상세 프로필</h2>
                </div>

                <div class="p-10 space-y-10 max-h-[60vh] overflow-y-auto no-scrollbar">
                    <div class="flex items-center gap-6 p-8 bg-poodle-50/50 rounded-[2.5rem] border border-poodle-100">
                        <img id="modalImg" src=""
                            class="w-20 h-20 bg-white rounded-2xl shadow-sm border border-poodle-50">
                        <div class="space-y-2">
                            <h4 id="modalName" class="text-2xl font-black text-poodle-900">지원자명</h4>
                            <div class="flex items-center gap-2">
                                <span id="modalRole"
                                    class="px-3 py-1 bg-meatball/10 text-meatball rounded-lg text-[10px] font-black uppercase tracking-widest">POSITION</span>
                                <span
                                    class="bg-poodle-50 text-poodle-300 px-2.5 py-1 rounded-lg text-[9px] font-black uppercase tracking-tighter shadow-sm border border-poodle-100">Verified</span>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <h5 class="text-xs font-black text-poodle-300 uppercase tracking-[0.2em] italic ml-1">
                            Application Message</h5>
                        <div id="modalMsg"
                            class="p-8 bg-poodle-50/30 border-2 border-transparent hover:border-meatball/10 rounded-[2rem] font-bold text-poodle-600 leading-relaxed text-sm italic transition-all">
                            메시지 내용이 여기에 표시됩니다.
                        </div>
                    </div>
                </div>

                <div class="p-10 pt-0 flex gap-4">
                    <input type="hidden" id="modalApplicationId" />
                    <button onclick="updateStatus('REJECTED')"
                        class="flex-1 py-5 bg-poodle-50 text-red-400 rounded-2xl font-black text-sm hover:bg-red-50 transition-all uppercase tracking-widest">거절</button>
                    <button onclick="updateStatus('ACCEPTED')"
                        class="flex-[2] py-5 bg-meatball text-white rounded-2xl font-black text-sm shadow-xl shadow-meatball/20 hover:scale-[1.02] active:scale-[0.98] transition-all uppercase tracking-widest">승인</button>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/footer :: mainFooter}"></footer>

    <style>
        /* 🎨 Manage Page UI Expansion */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>

    <script>
        const escapeHtml = window.meetballEscapeHtml;
        const safeUrl = window.meetballSafeUrl;
        window.applicationDetails = {};

        function openApplicantModal(id, name, role, msg, img) {
            document.getElementById('modalApplicationId').value = id;
            document.getElementById('modalName').innerText = name;
            document.getElementById('modalRole').innerText = role;
            document.getElementById('modalMsg').innerText = `"${msg}"`;
            document.getElementById('modalImg').src = img;

            document.getElementById('applicantModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function openApplicantModalById(id) {
            const app = window.applicationDetails[id];
            if (!app) return;
            openApplicantModal(app.id, app.userNickname || '', app.position || '', app.message || '', app.avatarUrl || '');
        }

        function closeApplicantModal() {
            document.getElementById('applicantModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        async function updateStatus(newStatus) {
            const applicationId = document.getElementById('modalApplicationId').value;
            if (!applicationId) return;

            try {
                const response = await meetballFetch(`/api/applications/${applicationId}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });

                if (response.ok) {
                    alert('상태가 변경되었습니다.');
                    closeApplicantModal();
                    fetchApplications(); // 목록 새로고침
                } else {
                    const error = await response.text();
                    alert('변경 실패: ' + error);
                }
            } catch (err) {
                console.error(err);
                alert('오류가 발생했습니다.');
            }
        }

        async function fetchApplications() {
            const projectId = document.getElementById('projectId')?.value || new URL(window.location.href).pathname.split('/')[2];
            console.log('Fetching applications for project:', projectId);
            if(!projectId) return;

            try {
                const res = await fetch(`/api/projects/${projectId}/applications`);
                if (!res.ok) throw new Error('조회 실패');

                const apps = await res.json();
                
                // Show count
                const countSpan = document.getElementById('applicant-count');
                if (countSpan) countSpan.innerText = apps.length + '명';

                const grid = document.getElementById('applications-grid');
                if (!grid) return;

                if (apps.length === 0) {
                    grid.innerHTML = '<div class="col-span-full p-8 text-center text-poodle-400 font-bold">지원자가 없습니다.</div>';
                    return;
                }

                window.applicationDetails = {};
                grid.innerHTML = apps.map(app => {
                    const id = Number(app.id);
                    const userNickname = app.userNickname || '';
                    const position = app.position || '';
                    const message = app.message || '';
                    const avatarUrl = `https://api.dicebear.com/7.x/adventurer/svg?seed=${encodeURIComponent(userNickname || 'applicant')}`;
                    window.applicationDetails[id] = { ...app, avatarUrl };
                    let statusBadge = '';
                    if(app.status === 'ACCEPTED') statusBadge = '<span class="absolute -top-3 left-1/2 -translate-x-1/2 px-3 py-1 bg-green-500 text-white rounded-full text-[10px] font-black uppercase">승인됨</span>';
                    if(app.status === 'REJECTED') statusBadge = '<span class="absolute -top-3 left-1/2 -translate-x-1/2 px-3 py-1 bg-poodle-300 text-white rounded-full text-[10px] font-black uppercase">거절됨</span>';

                    return `
                    <div class="p-8 rounded-4xl bg-poodle-50/20 border border-poodle-50 group hover:border-meatball/20 transition-all relative">
                        ${statusBadge}
                        <div class="flex items-center gap-4 mb-8 text-left mt-2">
                            <div class="relative">
                                <img src="${avatarUrl}" class="w-14 h-14 rounded-2xl shadow-sm border border-white bg-poodle-50">
                            </div>
                            <div class="flex-grow">
                                <h4 class="font-black text-poodle-900 leading-tight">${escapeHtml(userNickname)}</h4>
                                <span class="text-[10px] font-black text-poodle-300 uppercase tracking-widest italic leading-none">${escapeHtml(position)}</span>
                            </div>
                        </div>
                        <p class="text-sm text-poodle-400 font-medium line-clamp-2 mb-8 leading-relaxed italic text-left">
                            "${escapeHtml(message)}"
                        </p>
                        <button onclick="openApplicantModalById(${id})"
                            class="w-full py-4 bg-white border border-poodle-100 text-poodle-600 text-xs font-black rounded-2xl hover:bg-poodle-50 hover:border-meatball transition-all uppercase tracking-widest">
                            상세 보기
                        </button>
                    </div>
                    `;
                }).join('');
            } catch (e) {
                console.error(e);
            }
        }
        // 첨부파일 관리 스크립트 연결
        // ==========================================

        async function fetchAttachments() {
            const projectId = document.getElementById('projectId')?.value || new URL(window.location.href).pathname.split('/')[2];
            if (!projectId) return;
            try {
                const response = await fetch(`/api/projects/${projectId}/attachments`);
                if (!response.ok) throw new Error('파일 목록 조회 실패');

                const files = await response.json();
                renderAttachments(files, projectId);
            } catch (error) {
                console.error(error);
            }
        }

        function renderAttachments(files, projectId) {
            const listDiv = document.getElementById('attachmentList');
            if (!files || files.length === 0) {
                listDiv.innerHTML = `<p class="text-center text-poodle-400 font-bold py-4">등록된 첨부파일이 없습니다.</p>`;
                return;
            }

            listDiv.innerHTML = files.map(f => {
                const fileName = escapeHtml(f.originalFileName || '첨부파일');
                const uploadedAt = f.createdAt || f.uploadedAt;
                const uploadedLabel = uploadedAt ? new Date(uploadedAt).toLocaleDateString() : '-';
                const downloadProjectId = encodeURIComponent(String(projectId));
                const attachmentId = encodeURIComponent(String(f.id ?? ''));
                return `
                <div class="flex items-center justify-between p-4 bg-white border border-poodle-50 rounded-2xl shadow-sm">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-poodle-50 text-meatball rounded-xl flex items-center justify-center">
                            <i class="fa-solid fa-file"></i>
                        </div>
                        <div>
                            <p class="font-black text-poodle-900 text-sm">${fileName}</p>
                            <p class="text-[10px] text-poodle-400 font-bold uppercase">Uploaded at ${escapeHtml(uploadedLabel)}</p>
                        </div>
                    </div>
                    <a href="${escapeHtml(safeUrl(`/api/projects/${downloadProjectId}/attachments/${attachmentId}/download`))}" 
                       class="w-8 h-8 bg-poodle-50 text-poodle-400 hover:bg-meatball hover:text-white rounded-lg flex items-center justify-center transition-all">
                        <i class="fa-solid fa-download text-xs"></i>
                    </a>
                </div>
            `;
            }).join('');
        }

        async function uploadAttachment() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if (!file) return;

            const projectId = document.getElementById('projectId').value;
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await meetballFetch(`/api/projects/${projectId}/attachments`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    alert('파일 업로드에 성공했습니다.');
                    fetchAttachments(); // 목록 갱신
                } else {
                    alert(response.status === 401 ? '로그인이 필요합니다.' : '파일 업로드 실패 (권한 없음 또는 서버 오류)');
                }
            } catch (error) {
                console.error('업로드 에러:', error);
                alert('업로드 중 오류가 발생했습니다.');
            } finally {
                fileInput.value = ''; // 초기화
            }
        }

        async function deleteProject() {
            if (!confirm('정말 이 프로젝트를 삭제하시겠습니까? 삭제 후에는 복구할 수 없습니다.')) return;
            
            const projectId = document.getElementById('projectId')?.value || new URLSearchParams(window.location.search).get('projectId');
            if(!projectId) return;

            try {
                const response = await meetballFetch(`/api/projects/${projectId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    alert('프로젝트가 성공적으로 삭제되었습니다.');
                    window.location.href = '/user/mypage'; // 삭제 후 마이페이지로 이동
                } else {
                    alert('프로젝트 삭제에 실패했습니다.');
                }
            } catch (err) {
                console.error('Delete error', err);
                alert('서버 오류가 발생했습니다.');
            }
        }

        async function closeProject() {
            if (!confirm('이 프로젝트의 모집을 마감하시겠습니까?')) return;
            
            const projectId = document.getElementById('projectId')?.value || new URLSearchParams(window.location.search).get('projectId');
            if(!projectId) return;

            try {
                // 1. 기존 프로젝트 정보 조회
                const getRes = await fetch(`/api/projects/${projectId}`);
                if (!getRes.ok) {
                    alert('프로젝트 정보를 불러오는데 실패했습니다.');
                    return;
                }
                const projectData = await getRes.json();
                
                // 2. closed 속성만 변경하여 PUT 요청
                projectData.closed = true;

                const putRes = await meetballFetch(`/api/projects/${projectId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(projectData)
                });

                if (putRes.ok) {
                    alert('모집이 마감되었습니다.');
                    window.location.reload(); // 상태 반영을 위해 새로고침
                } else {
                    alert('모집 마감 처리에 실패했습니다.');
                }
            } catch (err) {
                console.error('Close error', err);
                alert('서버 오류가 발생했습니다.');
            }
        }

        // 페이지 로드 시 첨부파일 및 지원자 목록 조회
        document.addEventListener('DOMContentLoaded', () => {
            fetchAttachments();
            fetchApplications();
        });
    </script>
</body>

</html>
