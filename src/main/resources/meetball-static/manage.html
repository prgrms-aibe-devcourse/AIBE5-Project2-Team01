<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로젝트 관리 - Meetball</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard+Variable:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-900">
    <!-- Nav -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100">
        <div class="container mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <a href="index.html" class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-xl">M</div>
                    <span class="text-xl font-extrabold tracking-tight text-indigo-900">Meetball</span>
                </a>
            </div>
            <div class="flex items-center gap-6">
                <span class="text-sm font-bold text-gray-400">Manage Center</span>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-12">
        <div class="flex flex-col lg:flex-row gap-8 items-start mb-12">
            <div class="flex-grow">
                <h1 class="text-3xl font-black text-gray-900 tracking-tight mb-2">프로젝트 관리</h1>
                <p class="text-gray-500 font-medium italic">리더로서 팀원들을 고르고 프로젝트를 성공적으로 이끄세요.</p>
            </div>
            <button onclick="location.href='register.html'" class="px-8 py-4 bg-white border border-gray-100 rounded-2xl font-bold text-indigo-600 shadow-sm hover:bg-gray-50 transition-all flex items-center gap-2">
                <i class="fa-solid fa-plus text-xs"></i> 새 프로젝트 등록
            </button>
        </div>

        <div class="grid grid-cols-1 gap-12">
            <!-- Project Management Card -->
            <div class="bg-white rounded-[3rem] border border-gray-100 shadow-sm overflow-hidden">
                <div class="p-10 bg-indigo-50/30 border-b border-indigo-50 flex items-center justify-between flex-wrap gap-6">
                    <div class="flex items-center gap-6">
                        <img src="https://picsum.photos/seed/food/200" class="w-16 h-16 rounded-2xl object-cover shadow-md border-2 border-white">
                        <div>
                            <span class="px-3 py-1 bg-indigo-600 text-white rounded-full text-[10px] font-black uppercase tracking-widest mb-2 inline-block">Recruiting</span>
                            <h2 class="text-xl font-black text-gray-900">AI 기반 맛집 추천 서비스</h2>
                        </div>
                    </div>
                    <div class="flex gap-3">
                        <button class="px-5 py-2.5 bg-white border border-indigo-100 text-indigo-600 rounded-xl font-bold text-sm hover:bg-indigo-50 transition-colors">수정</button>
                        <button class="px-5 py-2.5 bg-indigo-600 text-white rounded-xl font-bold text-sm shadow-md hover:bg-indigo-700 transition-colors">모집 마감</button>
                    </div>
                </div>

                <div class="p-10 space-y-10">
                    <div>
                        <div class="flex items-center justify-between mb-8">
                            <h3 class="text-lg font-black text-gray-900 flex items-center gap-2">
                                <i class="fa-solid fa-users text-indigo-600"></i>
                                지원자 현황 <span class="bg-indigo-100 text-indigo-600 px-3 py-1 rounded-full text-xs ml-1 italic">3명</span>
                            </h3>
                            <button class="text-xs font-black text-gray-400 uppercase tracking-widest hover:text-indigo-600">전체 보기 <i class="fa-solid fa-chevron-right ml-1"></i></button>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            <!-- Applicant Card -->
                            <div class="p-6 rounded-[2rem] bg-gray-50 border border-gray-100 group hover:border-indigo-200 transition-all">
                                <div class="flex items-center gap-4 mb-6">
                                    <img src="https://picsum.photos/seed/user2/100" class="w-12 h-12 rounded-xl shadow-sm">
                                    <div>
                                        <h4 class="font-bold text-gray-900 leading-tight">디자인요정</h4>
                                        <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest italic">Designer</span>
                                    </div>
                                    <div class="ml-auto w-8 h-8 bg-white rounded-lg flex items-center justify-center text-orange-500 border border-orange-50">
                                        <i class="fa-solid fa-star text-[10px]"></i>
                                    </div>
                                </div>
                                <p class="text-xs text-gray-500 font-medium line-clamp-2 mb-6 leading-relaxed">안녕하세요! 맛집 추천 앱 디자인에 정말 관심이 많습니다. 피그마 사용 숙련도가 높아요.</p>
                                <div class="flex gap-2">
                                    <button class="flex-grow py-3 bg-white border border-gray-100 text-red-500 text-xs font-black rounded-xl hover:bg-red-50 transition-colors uppercase tracking-widest">Reject</button>
                                    <button class="flex-grow py-3 bg-indigo-600 text-white text-xs font-black rounded-xl hover:bg-indigo-700 shadow-md shadow-indigo-100 transition-colors uppercase tracking-widest">Accept</button>
                                </div>
                            </div>

                            <div class="p-6 rounded-[2rem] bg-gray-50 border border-gray-100 group hover:border-indigo-200 transition-all">
                                <div class="flex items-center gap-4 mb-6">
                                    <img src="https://picsum.photos/seed/user4/100" class="w-12 h-12 rounded-xl shadow-sm">
                                    <div>
                                        <h4 class="font-bold text-gray-900 leading-tight">서버마스터</h4>
                                        <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest italic">Backend</span>
                                    </div>
                                    <div class="ml-auto w-8 h-8 bg-white rounded-lg flex items-center justify-center text-orange-500 border border-orange-50">
                                        <i class="fa-solid fa-star text-[10px]"></i>
                                    </div>
                                </div>
                                <p class="text-xs text-gray-500 font-medium line-clamp-2 mb-6 leading-relaxed">Node.js 백엔드 개발자입니다. 대규모 트래픽 처리에 자신 있습니다.</p>
                                <div class="flex gap-2">
                                    <button class="flex-grow py-3 bg-white border border-gray-100 text-red-500 text-xs font-black rounded-xl hover:bg-red-50">Reject</button>
                                    <button class="flex-grow py-3 bg-indigo-600 text-white text-xs font-black rounded-xl hover:bg-indigo-700 shadow-md shadow-indigo-100">Accept</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-12 text-center">
        <p class="text-[10px] font-black text-gray-300 tracking-[0.3em] uppercase">Built for Champions</p>
    </footer>
</body>
</html>
